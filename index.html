<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mespelbrunn">
<meta name="theme-color" content="#E8D9BA">
<link rel="manifest" href="manifest.json">
<title>Schloss Mespelbrunn — Audio Guide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Georgia,serif;background:#F5EDD9;color:#2C1810;display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.hdr{background:#E8D9BA;padding:env(safe-area-inset-top,12px) 16px 0;border-bottom:2px solid #C4A882;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-top:12px;margin-bottom:10px}
.castle-lbl{font-size:11px;font-weight:700;color:#6B3A1F;letter-spacing:2px;text-transform:uppercase;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* LANGUAGE BUTTONS */
.lang-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.lb{padding:6px 12px;border-radius:20px;border:1.5px solid #C4A882;background:transparent;color:#8B6F47;font-size:12px;cursor:pointer;transition:all .15s;min-height:34px;font-family:-apple-system,sans-serif}
.lb.on{background:#A0522D;border-color:#A0522D;color:#FDFAF5;font-weight:700}

/* ROOM GRID */
.room-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;padding-bottom:10px}
.rg{padding:4px 2px;border-radius:6px;border:1.5px solid #C4A882;background:transparent;color:#8B6F47;font-size:10px;cursor:pointer;text-align:center;transition:all .15s;min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.rg.on{background:#A0522D;border-color:#A0522D;color:#FDFAF5}
.rg-num{font-weight:700;font-size:12px}
.rg-icon{font-size:12px}

/* BODY */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 24px;background:#F5EDD9}

/* TIP */
.tip{background:#EDE0C4;border-radius:10px;padding:10px 13px;font-size:13px;color:#6B3A1F;display:flex;gap:8px;margin-bottom:14px;border:1px solid #D4B896;align-items:flex-start;font-style:italic}

/* ROOM HERO */
.room-hero{background:#FDFAF5;border-radius:14px;border:1.5px solid #C4A882;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(106,58,31,0.1)}
.room-img{height:200px;background:#E8D9BA;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.room-img img{width:100%;height:100%;object-fit:cover;object-position:center 40%;position:absolute;top:0;left:0}
.room-badge{position:absolute;top:10px;left:12px;background:rgba(44,24,16,0.85);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#F5EDD9;z-index:1;font-family:-apple-system,sans-serif}
.room-emoji{font-size:56px;position:relative;z-index:1}
.room-body{padding:14px}
.room-name{font-size:20px;font-weight:700;color:#2C1810;margin-bottom:3px;font-family:Georgia,serif}
.room-sub{font-size:12px;color:#8B6F47;margin-bottom:10px;font-style:italic}
.room-text{font-size:14px;color:#3D2010;line-height:1.8;max-height:84px;overflow:hidden;transition:max-height .3s}
.room-text.open{max-height:800px}
.read-more{background:transparent;border:none;color:#A0522D;font-size:12px;cursor:pointer;margin-top:6px;padding:0;min-height:34px;display:block;font-family:-apple-system,sans-serif}

/* PLAYER */
.player{background:#EDE0C4;border-radius:14px;padding:14px;margin-bottom:14px;border:1.5px solid #C4A882;box-shadow:0 2px 6px rgba(106,58,31,0.08)}
.player-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.p-icon{width:42px;height:42px;border-radius:50%;background:#A0522D;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.p-meta{flex:1;min-width:0}
.p-name{font-size:13px;font-weight:600;color:#2C1810;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:Georgia,serif}
.p-lang{font-size:11px;color:#8B6F47;margin-top:2px;font-family:-apple-system,sans-serif}

/* PROGRESS */
.prog-wrap{margin-bottom:12px}
.prog-bg{height:5px;background:#D4B896;border-radius:3px;cursor:pointer;position:relative;margin-bottom:6px}
.prog-fill{height:5px;background:#A0522D;border-radius:3px;width:0%;position:relative}
.prog-dot{width:14px;height:14px;background:#6B3A1F;border-radius:50%;position:absolute;right:-7px;top:-4.5px;box-shadow:0 0 0 3px rgba(160,82,45,0.25)}
.time-row{display:flex;justify-content:space-between;font-size:11px;color:#8B6F47;font-family:-apple-system,sans-serif}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:12px}
.cbtn{background:transparent;border:none;cursor:pointer;color:#8B6F47;font-size:26px;padding:10px;border-radius:50%;min-width:52px;min-height:52px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cbtn:active{background:rgba(160,82,45,0.15);color:#A0522D}
.play-btn{width:64px;height:64px;background:#A0522D;border-radius:50%;border:none;cursor:pointer;color:#FDFAF5;font-size:24px;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 3px 10px rgba(160,82,45,0.4)}
.play-btn:active{background:#6B3A1F;transform:scale(0.96)}

/* SPEAKING BADGE */
.speak-badge{display:none;align-items:center;gap:7px;background:rgba(160,82,45,0.12);border-radius:8px;padding:6px 12px;font-size:12px;color:#A0522D;font-family:-apple-system,sans-serif}
.speak-badge.on{display:flex}
.dot1,.dot2,.dot3{width:5px;height:5px;background:#A0522D;border-radius:50%;animation:bop 1.2s infinite}
.dot2{animation-delay:.2s}.dot3{animation-delay:.4s}
@keyframes bop{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.2)}}

/* NAV */
.nav-row{display:flex;gap:10px}
.nbtn{flex:1;padding:14px;border-radius:12px;border:1.5px solid #C4A882;background:#EDE0C4;color:#6B3A1F;font-size:14px;font-weight:600;cursor:pointer;min-height:50px;transition:all .15s;font-family:-apple-system,sans-serif}
.nbtn:active{background:#D4B896}
.nbtn.nxt{background:#A0522D;border-color:#A0522D;color:#FDFAF5}
.nbtn.nxt:active{background:#6B3A1F}
.nbtn:disabled{opacity:.35;cursor:default}

/* PIN SCREEN */
#pinScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#F5EDD9;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.pin-castle{font-size:64px;margin-bottom:16px}
.pin-title{font-size:13px;font-weight:700;color:#6B3A1F;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-family:-apple-system,sans-serif}
.pin-sub{font-size:13px;color:#8B6F47;margin-bottom:40px;text-align:center;font-family:-apple-system,sans-serif}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #C4A882;background:transparent;transition:all .2s}
.pin-dot.filled{background:#A0522D;border-color:#A0522D}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:260px}
.pin-btn{height:72px;border-radius:14px;border:1.5px solid #C4A882;background:#EDE0C4;color:#2C1810;font-size:24px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif}
.pin-btn:active{background:#A0522D;border-color:#A0522D;color:#FDFAF5;transform:scale(0.95)}
.pin-btn.del{font-size:18px;color:#8B6F47}
.pin-btn.empty{border:none;background:transparent;cursor:default}
.pin-error{color:#8B1A00;font-size:13px;margin-top:16px;opacity:0;transition:opacity .3s;font-family:-apple-system,sans-serif}
.pin-error.on{opacity:1}
</style>
</head>

const rooms = [{"id": 1,"icon": "🌳","key": "einführung","names": {"en": "Welcome","fr": "Bienvenue","es": "Bienvenida","it": "Benvenuto","ja": "ようこそ","zh": "欢迎"},"subs": {"en": "Introduction under the oak","fr": "Introduction sous le chêne","es": "Introducción bajo el roble","it": "Introduzione sotto la quercia","ja": "樫の木の下で","zh": "橡树下的欢迎词"},"tips": {"en": "No photos in the upper rooms — the family still lives here.","fr": "Pas de photos dans les salles supérieures — la famille y vit encore.","es": "No se permiten fotos arriba — la familia sigue viviendo aquí.","it": "Niente foto nelle sale superiori — la famiglia vive ancora qui.","ja": "上の部屋は撮影禁止——家族が今も暮らしています。","zh": "上层房间禁止拍照——家族至今仍居住于此。"},"texts": {"en": "Good day... my name is... and I am delighted to take you on our tour through Mespelbrunn Castle today. Before we go into the castle together, I would like to point out that this castle is inhabited, so photographs may not be taken in the rooms, and of course nothing may be touched, eaten, or drunk. You can leave your bags and backpacks downstairs, so please keep only your valuables with you. You will see that the Count's family has left the rooms as they were once used, and indeed still are used today, meaning you will experience the living atmosphere of the castle rather than a 'museum feeling.' Please follow me now into the historic Knights' Hall. Photography is still permitted in the Knights' Hall, but no longer upstairs in the living and festival halls. Thank you very much for your understanding!","fr": "Bonjour... je m'appelle... et j'ai le plaisir de vous accompagner aujourd'hui dans notre visite du château de Mespelbrunn. Avant d'entrer ensemble dans le château, je tiens à vous signaler que ce château est habité, qu'il est donc interdit de prendre des photos dans les pièces et qu'il est bien entendu interdit de toucher quoi que ce soit, de manger ou de boire. Vous pouvez déposer vos sacs et sacs à dos en bas, et ne garder sur vous que vos objets de valeur. Vous constaterez que la famille comtale a laissé les pièces telles qu'elles étaient autrefois utilisées, et telles qu'elles le sont d'ailleurs encore aujourd'hui ; vous ressentirez ainsi l'atmosphère de vie du château plutôt qu'une véritable 'ambiance de musée'. Veuillez maintenant me suivre dans la salle des chevaliers, salle historique. Il est encore permis de photographier dans la salle des chevaliers, mais ce n'est plus le cas à l'étage, dans les salles d'habitation et de fête ! Merci beaucoup de votre compréhension !","es": "Buenos días... mi nombre es... y hoy tengo el placer de acompañarles en nuestra visita por el castillo de Mespelbrunn. Antes de entrar juntos en el castillo, quisiera advertirles que este castillo está habitado, por lo que no se pueden hacer fotografías en las salas y, por supuesto, no se puede tocar nada ni comer ni beber. Pueden dejar sus bolsos y mochilas abajo, así que les rogamos que lleven consigo únicamente sus objetos de valor. Verán que la familia condal ha dejado las habitaciones tal como se usaban antiguamente y como, de hecho, todavía se usan hoy, es decir, se les transmitirá el ambiente de vida del castillo y no tanto una 'sensación de museo'. Les ruego que ahora me sigan a la histórica Sala de los Caballeros... En la Sala de los Caballeros aún está permitido fotografiar, ¡pero arriba, en las salas de habitación y de fiestas, ya no! Muchas gracias por su comprensión.","it": "Buongiorno... mi chiamo... e oggi ho il piacere di accompagnarvi nella nostra visita al castello di Mespelbrunn. Prima di entrare insieme nel castello, vorrei segnalarvi che questo castello è abitato, quindi nelle stanze non è consentito scattare fotografie e, naturalmente, non si può toccare nulla né mangiare o bere. Potete lasciare borse e zaini qui sotto, quindi vi chiediamo di portare con voi soltanto i vostri oggetti di valore. Vedrete che la famiglia comitale ha lasciato gli ambienti come venivano usati in passato e come, in effetti, vengono ancora utilizzati oggi, cosicché vi sarà trasmessa l'atmosfera di vita del castello piuttosto che una vera e propria 'sensazione da museo'. Vi prego ora di seguirmi nella storica Sala dei Cavalieri... Nella Sala dei Cavalieri è ancora consentito fotografare, ma di sopra, nelle sale di soggiorno e di rappresentanza, non più! Grazie mille per la vostra comprensione!","ja": "こんにちは…私の名前は…です。本日はメスペルブルン城の見学にご案内できることを大変嬉しく思います。一緒に城内へ入る前に、一つお伝えしておきたいことがございます。この城は現在も人が住んでおりますので、各部屋での写真撮影はご遠慮いただいております。もちろん、物に触れたり、飲食をすることもできません。バッグやリュックサックは下の階に置いていただき、貴重品のみをお持ちください。伯爵家がこれらの部屋を、かつて使われていたまま、そして現在も実際に使われているままの状態で残していることにお気づきになるでしょう。つまり、ここでは「博物館的な雰囲気」というよりも、城での暮らしそのものの空気を感じていただけます。それでは、歴史ある騎士の間へご案内いたします。騎士の間ではまだ撮影が許可されていますが、上階の居住用や祝宴用の部屋ではもう許可されておりません。ご理解いただき、誠にありがとうございます。","zh": "各位好……我叫……今天能为大家导览梅斯佩尔布伦城堡，我感到非常荣幸。在我们一起进入城堡之前，我想提醒大家：这座城堡目前仍有人居住，因此各房间内不允许拍照，当然也不允许触碰任何物品，更不能在室内饮食。请将背包和手提包放在楼下，随身只携带贵重物品即可。您会发现，伯爵家族将这些房间保留为昔日使用的样子，而且如今依然在使用，也就是说，您在这里感受到的，将是城堡真实的生活气息，而不仅仅是“博物馆式”的氛围。现在请跟我进入历史悠久的骑士厅。在骑士厅内仍可以拍照，但到了楼上的起居厅和宴会厅就不再允许了！非常感谢大家的理解！"}},{"id": 2,"icon": "⚔️","key": "rittersaal","names": {"en": "Knights' Hall","fr": "Salle des Chevaliers","es": "Sala de los Caballeros","it": "Sala dei Cavalieri","ja": "騎士の間","zh": "骑士大厅"},"subs": {"en": "Over 600 years of one family's story","fr": "Plus de 600 ans d'histoire familiale","es": "Más de 600 años de historia familiar","it": "Oltre 600 anni di storia di una famiglia","ja": "600年以上にわたる一族の物語","zh": "一个家族600余年的历史"},"tips": {"en": "Photography is still permitted here — but not in the upper rooms.","fr": "La photographie est encore autorisée ici — mais pas dans les salles supérieures.","es": "La fotografía todavía está permitida aquí — pero no en las salas superiores.","it": "La fotografia è ancora consentita qui — ma non nelle sale superiori.","ja": "ここではまだ写真撮影が可能です——しかし上の部屋では撮影できません。","zh": "这里仍允许拍照——但上层房间不允许。"},"texts": {"en": "Mespelbrunn Castle and the Count's family look back on a history of more than 600 years. The founding charter of 1 May 1412 tells us that Haman Echter I received the abandoned settlement and farmstead at 'Espelborn,' together with the surrounding forests, as a gift from his Prince-Elector John II of Mainz for special services rendered. Haman Echter was the Electoral Mainz Vicedom, or governor, in Aschaffenburg. In earlier times, the entire Spessart region belonged to the Electorate of Mainz, and many members of the Echter family served in its administration. Here, beside a stream and a pond, Haman I built the first moated castle and a chapel. Of that original castle, only the tower and the foundation walls of the chapel survive today.\n\nThe Knights' Hall is the largest room in the castle, and you will notice that it has neither stoves nor fireplaces. For centuries it served as the unheated gathering place of the household: used preferably for Holy Mass, great hunting feasts, balls, addresses by the lord of the house, and even court proceedings of the so-called minor jurisdiction, which did not include capital crimes.\n\nLooking around, the red sandstone work immediately catches the eye. It is original, dating from the Renaissance period, just like the historic coffered wooden ceiling. The small basin between two pillars is connected to the spring at Espelborn on the edge of the forest, which gave the castle its name. The pillars carved with hands, like the artistically crafted little sandstone figures distributed throughout the house, on the main portal, in the courtyard, and on the fireplaces, are meant to bear witness to the protection of the house against evil powers, or demons. A charming legend says: 'As long as these pillars stand, no harm shall come to the family here.' The sandstone portal depicts the Crucifixion, and beneath the cross itself you can see the builders, Peter Echter and his wife Gertraud.\n\nThe cabinet to the left is an Augsburg chest from the 17th century, dated 1674, while the other is a Frankfurt wave-front cabinet from the late 18th century.\n\nThe helmets and suits of armor date from the Thirty Years' War and have a shape reminiscent of a bell. On some of them you can still impressively make out the notches left by combat.\n\nOn the walls of the hall hang the breastplates, and between them halberds and pikes from the late 17th century.\n\nThe long table and the chairs date from the 1930s. In the mid-19th century, the windows on the west side were adorned with two family trees: on the right, the ancestral line of Maria Ottilia, the last Echter heiress of Mespelbrunn. The male line of the Echter family died out in 1665, shortly after the Thirty Years' War. On the left you see the family tree of Philipp Ludwig von Ingelheim, who married Maria Ottilia in 1648. With imperial permission, the names and coats of arms of the two noble families were united, so that today's owners bear both names: Counts of Ingelheim called Echter of and to Mespelbrunn.\n\nThe ancestral line can be read as follows: at the bottom is Maria Ottilia's coat of arms, and above it lie the arms of her parents, grandparents, great-grandparents, and so on. Philipp Ludwig's ancestral line reads the same way.\n\nAbove the entrance hangs a memorial plaque. It is the funeral shield of Count Albrecht von Ingelheim, who died in 2006. You can see his portrait on the opposite side, next to the chapel. He served thirty years as mayor of Mespelbrunn and for many years was a member of the district council of Aschaffenburg and the regional council of Lower Franconia, before being elected its president in 2001. Since his death, his eldest daughter, Marie-Antoinette, Countess of Ingelheim called Echter of and to Mespelbrunn, married Baroness von Geyr zu Schweppenburg, has been the owner of Mespelbrunn Castle. The castle is open from the end of March to November; in autumn and winter, renovation work is carried out, for example the restoration of the fireplaces and floors in 2017, and the roofs of the towers in 2021. Although the house is inhabited all year round, only parts of it can be heated.","fr": "Le château de Mespelbrunn et la famille comtale peuvent se prévaloir d'une histoire de plus de 600 ans. L'acte de fondation du 1er mai 1412 rapporte que Haman Echter Ier reçut la friche et la ferme d'« Espelborn », avec les forêts environnantes, en don de son prince-électeur Jean II de Mayence, pour services particuliers rendus. Haman Echter était vicedom, c'est-à-dire gouverneur, de l'Électorat de Mayence à Aschaffenburg. Autrefois, tout le Spessart appartenait à l'Électorat de Mayence, et de nombreux membres de la famille Echter étaient au service de celui-ci. Haman Ier fit construire ici, près d'un ruisseau et d'un étang, le premier château entouré d'eau, ainsi qu'une chapelle. De ce premier château ne subsistent aujourd'hui que la tour et les fondations de la chapelle.\n\nLa Salle des Chevaliers est la plus grande pièce du château ; on remarque qu'elle ne possède ni poêle ni cheminée. Pendant des siècles, elle fut le lieu de réunion non chauffé de la maison : utilisée de préférence pour la messe, les grandes fêtes de chasse, les bals, les discours du maître de maison, et même pour des audiences judiciaires relevant de la « petite juridiction », qui ne comprenait pas les crimes capitaux.\n\nEn regardant autour de nous, les ouvrages en grès rouge attirent immédiatement le regard. Ils datent encore de la Renaissance, tout comme le plafond historique à caissons de bois. Le petit bassin entre deux colonnes est relié à la source de l'Espelborn, en lisière de forêt, qui a donné son nom au château. Les colonnes ornées de mains, ainsi que les petites figures en grès artistiquement travaillées disséminées dans toute la maison, sur le portail principal, dans la cour intérieure et sur les cheminées, sont censées témoigner de la protection de la maison contre les puissances maléfiques, les démons. Une jolie légende dit : « Tant que ces colonnes resteront debout, aucun malheur n'arrivera à la famille ici. » Le portail en grès représente la Crucifixion, et sous la croix même, on aperçoit les bâtisseurs, Peter Echter et son épouse Gertraud.\n\nL'armoire à gauche est un coffre d'Augsbourg du XVIIe siècle, daté de 1674 ; l'autre est une armoire ondulée de Francfort, de la fin du XVIIIe siècle.\n\nLes casques et armures datent de la guerre de Trente Ans et ont une forme évoquant une cloche. Sur certains d'entre eux, on distingue encore de manière impressionnante les entailles laissées par les combats.\n\nSur les murs de la salle sont accrochées les cuirasses, et entre elles des hallebardes et des piques de la fin du XVIIe siècle.\n\nLa longue table et les chaises datent des années 1930. Au milieu du XIXe siècle, les fenêtres du côté ouest furent ornées de deux arbres généalogiques : à droite, la lignée ancestrale de Maria Ottilia, la dernière héritière de la famille Echter de Mespelbrunn. La lignée masculine des Echter s'éteignit en 1665, peu après la guerre de Trente Ans. À gauche, vous voyez l'arbre généalogique de Philipp Ludwig von Ingelheim, qui épousa Maria Ottilia en 1648. Avec l'autorisation impériale, les noms et les armoiries des deux familles nobles furent réunis, de sorte que les propriétaires actuels portent les deux noms : comtes d'Ingelheim, dits Echter de et à Mespelbrunn.\n\nLa lignée ancestrale se lit ainsi : en bas se trouvent les armoiries de Maria Ottilia, au-dessus celles de ses parents, grands-parents, arrière-grands-parents, et ainsi de suite. La lignée de Philipp Ludwig se lit de la même manière.\n\nAu-dessus de l'entrée est suspendu un panneau commémoratif. C'est l'écu funéraire du comte Albrecht von Ingelheim, décédé en 2006. Vous pouvez voir son portrait du côté opposé, près de la chapelle. Il fut maire de Mespelbrunn pendant trente ans et longtemps membre du conseil d'arrondissement d'Aschaffenburg et du conseil régional de Basse-Franconie, avant d'en être élu président en 2001. Depuis son décès, sa fille aînée, Marie-Antoinette, comtesse d'Ingelheim dite Echter de et à Mespelbrunn, épouse de la baronne von Geyr zu Schweppenburg, est propriétaire du château de Mespelbrunn. Le château est ouvert de fin mars à novembre ; en automne et en hiver, des travaux de rénovation sont effectués, par exemple la restauration des cheminées et des sols en 2017, et des toits des tours en 2021. Bien que la maison soit habitée toute l'année, seules certaines parties peuvent être chauffées.","es": "El castillo de Mespelbrunn y la familia condal pueden mirar atrás a una historia de más de 600 años. El acta fundacional del 1 de mayo de 1412 relata que Haman Echter I recibió el yermo y la heredad de 'Espelborn', junto con los bosques circundantes, como regalo de su príncipe elector Juan II de Maguncia por servicios especiales prestados. Haman Echter era vicedomo, es decir, gobernador, del Electorado de Maguncia en Aschaffenburg. Antiguamente, todo el Spessart pertenecía al Electorado de Maguncia, y muchos miembros de la familia Echter estuvieron a su servicio. Aquí, junto a un arroyo y un estanque, Haman I construyó el primer castillo rodeado de agua y una capilla. De aquel primer castillo solo se conservan hoy la torre y los cimientos de la capilla.\n\nLa Sala de los Caballeros es la sala más grande del castillo, y llama la atención que no dispone ni de estufas ni de chimeneas. Durante siglos fue el lugar de reunión sin calefacción de la casa: utilizado preferentemente para la Santa Misa, grandes fiestas de caza, bailes, discursos del señor de la casa e incluso para vistas judiciales de la llamada 'jurisdicción menor', que no incluía delitos capitales.\n\nMiremos ahora a nuestro alrededor: enseguida llaman la atención los trabajos en arenisca roja. Son originales de la época renacentista, igual que el histórico techo artesonado de madera. La pequeña pila entre dos columnas está relacionada con el manantial del Espelborn, en el borde del bosque, que dio nombre al castillo. Las columnas con las manos talladas, así como las pequeñas figuras de arenisca trabajadas artísticamente que se encuentran repartidas por toda la casa (portal principal, patio interior, chimeneas), están destinadas a dar testimonio de la protección de la casa frente a poderes malignos, es decir, demonios. Una bonita leyenda dice: 'Mientras estas columnas permanezcan en pie, ningún mal le sucederá a la familia aquí.' El portal de arenisca muestra la Crucifixión, y bajo la misma cruz se ve a los constructores, Peter Echter y su esposa Gertraud.\n\nEl armario de la izquierda es un arcón de Augsburgo del siglo XVII (fechado en 1674); el otro es un armario ondulado de Fráncfort de finales del siglo XVIII.\n\nLos cascos y armaduras proceden de la Guerra de los Treinta Años y tienen una forma que recuerda a una campana. En algunos todavía pueden apreciarse de forma impresionante las marcas dejadas por los combates.\n\nEn las paredes de la sala se encuentran las corazas, y entre ellas alabardas y picas de finales del siglo XVII.\n\nLa larga mesa y las sillas datan de los años treinta del siglo XX. A mediados del siglo XIX, las ventanas del lado oeste se decoraron con dos árboles genealógicos; a la derecha, la línea ancestral de Maria Ottilia, la última heredera Echter de Mespelbrunn. La línea masculina de los Echter se extinguió en 1665, poco después de la Guerra de los Treinta Años. A la izquierda se ve el árbol genealógico de Philipp Ludwig von Ingelheim, quien se casó con Maria Ottilia en 1648. Con permiso imperial, se unieron los nombres y los escudos de armas de ambas familias nobles, de modo que los propietarios actuales llevan ambos nombres: condes de Ingelheim, llamados Echter de y a Mespelbrunn.\n\nLa línea ancestral se lee así: abajo está el escudo de armas de Maria Ottilia, encima los de sus padres, abuelos, bisabuelos, etcétera. De la misma manera se lee la línea ancestral de Philipp Ludwig.\n\nSobre la entrada cuelga un panel conmemorativo. Es el escudo funerario del conde Albrecht von Ingelheim, fallecido en 2006. Su retrato puede verse en el lado opuesto, junto a la capilla. Fue alcalde de Mespelbrunn durante treinta años y, durante muchos años, miembro del consejo de distrito de Aschaffenburg y del consejo regional de Baja Franconia, antes de ser elegido su presidente en 2001. Desde su muerte, su hija mayor, Marie-Antoinette, condesa de Ingelheim llamada Echter de y a Mespelbrunn, casada con la baronesa von Geyr zu Schweppenburg, es la propietaria del castillo de Mespelbrunn. El castillo está abierto desde finales de marzo hasta noviembre; en otoño e invierno se llevan a cabo trabajos de renovación (por ejemplo, en 2017 la restauración de las chimeneas y suelos, y en 2021 los tejados de las torres). Aunque la casa está habitada todo el año, solo se puede calentar en parte.","it": "Il castello di Mespelbrunn e la famiglia comitale possono guardare indietro a una storia di oltre 600 anni. L'atto di fondazione del 1° maggio 1412 racconta che Haman Echter I ricevette il terreno incolto e la fattoria presso 'Espelborn', insieme ai boschi circostanti, in dono dal suo principe elettore Giovanni II di Magonza per servizi particolari resi. Haman Echter era vicedomino, cioè governatore, dell'Elettorato di Magonza ad Aschaffenburg. In passato l'intero Spessart apparteneva all'Elettorato di Magonza, e molti membri della famiglia Echter erano al servizio di quest'ultimo. Qui, presso un ruscello e uno stagno, Haman I costruì il primo castello circondato dall'acqua e una cappella. Di quel primo castello oggi rimangono solo la torre e le fondamenta della cappella.\n\nLa Sala dei Cavalieri è la stanza più grande del castello, e si nota che non dispone né di stufe né di camini. Per secoli fu il luogo di ritrovo non riscaldato della casa: utilizzato preferibilmente per la Santa Messa, grandi feste di caccia, balli, discorsi del signore della casa e persino per udienze giudiziarie della cosiddetta 'giurisdizione minore', che non comprendeva i reati capitali.\n\nGuardiamoci ora attorno: subito attirano l'attenzione le lavorazioni in arenaria rossa. Sono originali del periodo rinascimentale, proprio come il soffitto storico a cassettoni in legno. La piccola vasca tra due colonne è collegata alla sorgente dell'Espelborn, ai margini del bosco, che diede il nome al castello. Le colonne con le mani scolpite, così come le piccole figure in arenaria lavorate artisticamente, distribuite in tutta la casa (portale principale, corte interna, camini), dovrebbero testimoniare la protezione della casa dai poteri maligni, i demoni. Una bella leggenda dice: 'Fino a quando queste colonne resteranno in piedi, nessun male colpirà la famiglia qui.' Il portale in arenaria mostra la Crocifissione, e proprio sotto la croce si vedono i costruttori, Peter Echter e sua moglie Gertraud.\n\nL'armadio a sinistra è una cassapanca di Augusta del XVII secolo (datata 1674), l'altro è un armadio ondulato di Francoforte della fine del XVIII secolo.\n\nGli elmi e le armature risalgono alla Guerra dei Trent'anni e hanno una forma che ricorda una campana. Su alcuni si possono ancora notare in modo impressionante le tacche lasciate dai combattimenti.\n\nSulle pareti della sala si trovano le corazze, e tra di esse alabarde e picche della fine del XVII secolo.\n\nLa lunga tavola e le sedie risalgono agli anni Trenta del Novecento. A metà del XIX secolo le finestre del lato ovest furono decorate con due alberi genealogici; a destra la linea ancestrale di Maria Ottilia, ultima erede degli Echter di Mespelbrunn. La linea maschile degli Echter si estinse nel 1665, poco dopo la Guerra dei Trent'anni. A sinistra si vede l'albero genealogico di Philipp Ludwig von Ingelheim, che sposò Maria Ottilia nel 1648. Con il permesso imperiale, i nomi e gli stemmi delle due famiglie nobili furono uniti, così che gli attuali proprietari portano entrambi i nomi: conti di Ingelheim detti Echter di e a Mespelbrunn.\n\nLa linea ancestrale si legge così: in basso c'è lo stemma di Maria Ottilia, sopra quelli dei suoi genitori, nonni, bisnonni, e così via. Allo stesso modo si legge anche la linea ancestrale di Philipp Ludwig.\n\nSopra l'ingresso è appesa una targa commemorativa. È lo stemma funebre del conte Albrecht von Ingelheim, deceduto nel 2006. Il suo ritratto si può vedere sul lato opposto, vicino alla cappella. Fu sindaco di Mespelbrunn per trent'anni e per molti anni membro del consiglio distrettuale di Aschaffenburg e del consiglio regionale della Bassa Franconia, prima di essere eletto suo presidente nel 2001. Dalla sua morte, sua figlia maggiore, Marie-Antoinette, contessa di Ingelheim detta Echter di e a Mespelbrunn, sposata baronessa von Geyr zu Schweppenburg, è proprietaria del castello di Mespelbrunn. Il castello è aperto da fine marzo a novembre; in autunno e in inverno vengono effettuati lavori di ristrutturazione (ad esempio nel 2017 il restauro dei camini e dei pavimenti, e nel 2021 i tetti delle torri). Sebbene la casa sia abitata tutto l'anno, può essere riscaldata solo in parte.","ja": "メスペルブルン城と伯爵家は、600年以上にわたる歴史を持っています。1412年5月1日の創設証書には、ハマン・エヒター一世が、周囲の森林とともに「エスペルボルン」と呼ばれる荒れ地と農場を、特別な功績への褒賞として、選帝侯マインツのヨハン二世から贈られたことが記されています。ハマン・エヒターはアシャッフェンブルクにおけるマインツ選帝侯領の副統治官、いわば総督でした。かつてシュペッサルト一帯はすべてマインツ選帝侯領に属しており、エヒター家の多くの者がその統治機構に仕えていました。ハマン一世はここ、小川と池のほとりに、最初の水城と礼拝堂を建てました。この最初の城のうち、現在まで残っているのは塔と礼拝堂の基礎部分のみです。\n\n騎士の間は城内で最も大きな部屋で、暖炉もストーブも備えていないことにお気づきになるでしょう。何世紀にもわたり、この邸宅の暖房のない集会場として使われてきました。主にミサ、大規模な狩猟祭、舞踏会、家長の演説、さらには裁判、いわゆる重罪を含まない「小裁判権」の審理にも用いられました。\n\n見渡しますと、赤い砂岩細工がすぐに目に入ります。これらはルネサンス期のものがそのまま残っており、歴史的な格子天井も同様です。二本の柱の間にある小さな水盤は、城名の由来となった、森の縁にあるエスペルボルンの泉とつながっています。手の形をした柱や、邸内各所、正面玄関、内庭、暖炉などに見られる、芸術的に作られた小さな砂岩の彫像は、邪悪な力、つまり悪魔から家を守る守護の象徴とされています。「これらの柱が立っている限り、この家の家族には災いが及ばない」という、美しい伝説も残っています。砂岩の門には十字架刑の場面が描かれ、十字架の下には建築者であるペーター・エヒターとその妻ゲルトラウトの姿が見えます。\n\n左側の戸棚は17世紀のアウクスブルク製の箪笥（1674年の銘あり）、もう一方は18世紀後半のフランクフルト製の波形前面を持つ戸棚です。\n\n兜と甲冑は三十年戦争時代のもので、鐘のような形をしています。一部には戦闘で受けた傷跡が今も印象的に残っています。\n\n大広間の壁には胸甲が掛けられ、その間には17世紀後半のハルバードと槍があります。\n\n長いテーブルと椅子は1930年代のものです。19世紀半ばには、西側の窓に二つの家系図が描かれました。右側はメスペルブルンの最後のエヒター家の女性継承者、マリア・オティーリアの系譜です。エヒター家の男系は三十年戦争の直後、1665年に絶えました。左側にはフィリップ・ルートヴィヒ・フォン・インゲルハイムの家系図があります。彼は1648年にマリア・オティーリアと結婚しました。皇帝の許可を得て、両貴族家の名前と紋章が統合され、現在の城の所有者は両方の名を名乗っています。インゲルハイム伯爵、通称メスペルブルンのエヒター家です。\n\n家系図は次のように読みます。一番下にマリア・オティーリアの紋章があり、その上に両親、祖父母、曽祖父母の紋章が順に重なっています。フィリップ・ルートヴィヒの系譜も同様の読み方です。\n\n入口の上には記念の銘板が掛けられています。これは2006年に亡くなったアルブレヒト・フォン・インゲルハイム伯爵の追悼盾です。彼の肖像は礼拝堂の隣、反対側の壁にあります。彼は30年間メスペルブルンの市長を務め、長年アシャッフェンブルク郡議会および下フランケン地方議会の議員であり、2001年にはその議長に選出されました。彼の死後、長女のマリー・アントワネット（インゲルハイム伯爵夫人、通称メスペルブルンのエヒター家、フォン・ゲイア・ツー・シュヴェッペンブルク男爵夫人）がメスペルブルン城の所有者となりました。城は3月末から11月まで開館しており、秋と冬には改修工事が行われます。例えば2017年には暖炉と床の修復、2021年には塔の屋根の修復が行われました。この邸宅は一年中人が住んでいますが、暖房が可能なのは一部のみです。","zh": "梅斯佩尔布伦城堡及其伯爵家族的历史已超过六百年。1412年5月1日的建立证书记载，哈曼·埃希特一世因特殊功绩，从美因茨选帝侯约翰二世那里获得了“埃斯佩尔博恩”附近的一处荒地和庄园，连同周边的森林，作为赏赐。哈曼·埃希特当时是美因茨选侯领驻阿沙芬堡的副总督。早年，整个施佩萨特森林地区都属于美因茨选侯领，许多埃希特家族成员都在其治下任职。哈曼一世在这里，紧邻一条溪流和一座池塘，建造了最早的水上城堡和一座礼拜堂。如今，那座最初的城堡仅余塔楼和礼拜堂的地基。\n\n骑士厅是城堡中最大的房间，您会注意到这里既没有炉灶，也没有壁炉。几个世纪以来，它一直是这座宅邸里无法供暖的集会场所：主要用于举行弥撒、盛大的狩猎庆典、舞会、家主的演讲，甚至还曾在此举行审判，即所谓“轻罪审判权”范围内的案件，不包括重罪。\n\n我们环顾四周，红色的砂岩工艺立刻引人注目。它们与历史悠久的木质格子天花板一样，都是文艺复兴时期遗留下来的原件。两根柱子之间的小水池，与城堡边缘森林中的埃斯佩尔博恩泉水相连，正是这泉水赋予了城堡其名。而那些雕有手形的柱子，以及散布在整座宅邸中、雕刻精美的小型砂岩人像（出现在正门、内庭和壁炉处），则被认为是用来守护宅邸、抵御邪恶力量（恶魔）的象征。一个动人的传说讲道：“只要这些柱子还立着，这个家族在此就不会遭遇灾难。”砂岩门楼上雕刻着十字受难图，十字架下方可以看到这座建筑的建造者，彼得·埃希特和他的妻子格特劳德。\n\n左边的柜子是一件17世纪的奥格斯堡式柜子（标有1674年），另一件则是18世纪晚期法兰克福风格的波浪形前面柜。\n\n那些头盔与盔甲来自三十年战争时期，造型让人联想到一只钟。其中一些至今仍能清晰看到战斗留下的凹痕，由此也衍生出一句德语俗语，意为“我要给你狠狠一击”。\n\n大厅墙上挂着胸甲，胸甲之间是17世纪晚期的长戟和长枪。\n\n长桌和椅子来自20世纪30年代。19世纪中期，西侧的窗户上装饰了两幅家谱图：右边是玛丽亚·奥蒂利亚的家系图，她是梅斯佩尔布伦末代埃希特家族的女继承人。埃希特家族的男性血脉在三十年战争结束后不久，于1665年断绝。左边您能看到菲利普·路德维希·冯·因格尔海姆的家系图。他于1648年与玛丽亚·奥蒂利亚成婚。经皇帝特许，两大贵族家族的姓氏与纹章得以合并，因此如今的城堡主人同时承袭两个姓氏：因格尔海姆伯爵，亦称梅斯佩尔布伦的埃希特家族。\n\n家系图的解读方式如下：最下方是玛丽亚·奥蒂利亚的纹章，其上依次是她的父母、祖父母、曾祖父母等人的纹章。菲利普·路德维希的家系图也按同样方式解读。\n\n入口上方挂着一块纪念牌，是2006年逝世的阿尔布雷希特·冯·因格尔海姆伯爵的安魂牌。他的画像就在对面，礼拜堂旁边。他曾任梅斯佩尔布伦市长长达三十年，并长期担任阿沙芬堡县议会及下弗兰肯行政区议会议员，于2001年当选该议会议长。他去世后，其长女玛丽－安托瓦内特（因格尔海姆女伯爵，亦称梅斯佩尔布伦的埃希特家族，嫁为冯·盖尔·楚·施韦彭堡男爵夫人）成为梅斯佩尔布伦城堡的所有人。城堡每年三月底至十一月对外开放，秋冬季节则进行修缮工作，例如2017年修复了壁炉与地板，2021年修复了塔楼屋顶。这座宅邸全年都有人居住，但只有部分区域可以供暖。"}},{"id": 3,"icon": "⛪","key": "kapelle","names": {"en": "Chapel","fr": "Chapelle","es": "Capilla","it": "Cappella","ja": "礼拝堂","zh": "礼拜堂"},"subs": {"en": "Baptisms, weddings & 600 years of faith","fr": "Baptêmes, mariages & 600 ans de foi","es": "Bautizos, bodas y 600 años de fe","it": "Battesimi, matrimoni e 600 anni di fede","ja": "洗礼、結婚、600年の信仰","zh": "洗礼、婚礼与600年的信仰"},"tips": {"en": "Julius Echter was baptised here on 18 March 1545 — he later founded the University of Würzburg.","fr": "Julius Echter fut baptisé ici le 18 mars 1545 — il fonda plus tard l'Université de Würzburg.","es": "Julius Echter fue bautizado aquí el 18 de marzo de 1545 — más tarde fundó la Universidad de Wurzburgo.","it": "Julius Echter fu battezzato qui il 18 marzo 1545 — fondò in seguito l'Università di Würzburg.","ja": "ユリウス・エヒターは1545年3月18日にここで洗礼を受けました——後にヴュルツブルク大学を設立しました。","zh": "尤利乌斯·埃克特于1545年3月18日在此受洗——后来创立了维尔茨堡大学。"},"texts": {"en": "Let us now take a look into the Chapel. It belongs to the first construction phase of the castle. Haman I Echter simultaneously founded a benefice, with field and forest, endowed to support the maintenance of a priest. Many descendants of the Echter family were baptized and married in this chapel. Among others, Julius Echter was baptized here on his birthday, 18 March 1545. He was the second son of Peter Echter and would later become Prince-Bishop of Würzburg and Duke in Franconia in 1573.\n\nThe precious stained glass images date from the 15th century, depicting Saint Valentine and the Adoration of a Holy King in gold. The small tower, with its star-ribbed vault, is still furnished in late Gothic style. The wall paintings date from 1729 and show the twelve Apostles and the four Evangelists. The beautiful alabaster altar was probably acquired around 1600 and is the work of the Franconian master Michael Kern. Until 1976, Holy Mass was celebrated here every Sunday with the last castle chaplain, Father Müller. Devotions and Masses are still held today, though increasingly in the Chapel of St. Mary of the Snows, which sits above the valley and which you probably saw on the drive up. Weddings for couples from all over the world also take place there. Feel free to take a look at the beautifully embroidered cope behind glass from the 17th century; it impressively displays the Echter coat of arms. Copes were worn for devotions and processions. Please follow me now out into the courtyard at the main portal.","fr": "Jetons maintenant un coup d'œil dans la Chapelle. Elle appartient à la première phase de construction du château. Haman Ier Echter fonda en même temps un bénéfice, avec champs et forêt, destiné à l'entretien d'un prêtre. De nombreux descendants de la famille Echter furent baptisés et/ou mariés dans cette chapelle. C'est ici, entre autres, que Julius Echter fut baptisé le jour de sa naissance, le 18 mars 1545. Il était le deuxième fils de Peter Echter et devint plus tard prince-évêque de Würzburg et duc de Franconie en 1573.\n\nLes précieux vitraux datent du XVe siècle (saint Valentin, adoration d'un saint roi, en or). La petite tour, avec sa voûte étoilée, est encore aménagée dans le style gothique tardif. Les peintures murales datent de 1729 et représentent les douze apôtres et les quatre évangélistes. Le magnifique autel en albâtre fut probablement acquis vers 1600 et est l'œuvre du maître franconien Michael Kern. Jusqu'en 1976, la messe y était célébrée chaque dimanche par le dernier chapelain du château, le père Müller. Aujourd'hui encore, des offices et des messes y sont célébrés, mais de plus en plus souvent dans la chapelle Sainte-Marie-des-Neiges, qui domine la vallée et que vous avez probablement aperçue en arrivant. Des mariages y sont également célébrés pour des couples venus du monde entier. N'hésitez pas à jeter un œil à la chape brodée sous verre, du XVIIe siècle, qui présente de manière impressionnante les armoiries de la famille Echter ; les chapes étaient portées lors des offices et des processions. Veuillez maintenant me suivre à l'extérieur, dans la cour intérieure, devant le portail principal.","es": "Echemos ahora un vistazo a la Capilla. Pertenece a la primera fase de construcción del castillo. Haman I Echter fundó al mismo tiempo un beneficio, con campo y bosque, dotado para el sustento de un sacerdote. En esta capilla fueron bautizados y/o casados numerosos descendientes de los Echter. Entre otros, aquí fue bautizado Julius Echter el día de su nacimiento, el 18 de marzo de 1545. Era el segundo hijo de Peter Echter y más tarde se convertiría en príncipe-obispo de Wurzburgo y duque de Franconia en 1573.\n\nLas valiosas vidrieras datan del siglo XV (san Valentín, adoración de un santo rey, en oro). La pequeña torre, con su bóveda estrellada, está decorada todavía en estilo gótico tardío. Las pinturas murales se realizaron en 1729 y muestran a los doce apóstoles y los cuatro evangelistas. El precioso altar de alabastro fue probablemente adquirido hacia 1600 y es obra del maestro franconio Michael Kern. Hasta 1976 se celebraba aquí la Santa Misa cada domingo con el último capellán del castillo, el padre Müller. Todavía hoy se celebran devociones y misas, aunque cada vez más en la capilla de Santa María de las Nieves, que se alza sobre el valle y que probablemente vieron en el camino de acceso. Allí también se celebran bodas para parejas de todo el mundo. Échenle un vistazo, si lo desean, a la hermosa capa pluvial bordada bajo cristal, del siglo XVII; muestra de forma impresionante el escudo de armas de los Echter; las capas pluviales se llevaban en devociones y procesiones. Les ruego que ahora me sigan al patio interior, hasta el portal principal.","it": "Diamo ora uno sguardo alla Cappella. Appartiene alla prima fase costruttiva del castello. Haman I Echter fondò contemporaneamente un beneficio, con campi e boschi, destinato al sostentamento di un sacerdote. In questa cappella furono battezzati e/o sposati numerosi discendenti degli Echter. Tra gli altri, qui fu battezzato Julius Echter nel giorno della sua nascita, il 18 marzo 1545. Era il secondo figlio di Peter Echter e in seguito sarebbe diventato principe-vescovo di Würzburg e duca di Franconia nel 1573.\n\nLe preziose vetrate risalgono al XV secolo (san Valentino, adorazione di un santo re, in oro). La piccola torre, con la sua volta a stella, è ancora arredata in stile tardogotico. Gli affreschi parietali risalgono al 1729 e mostrano i dodici apostoli e i quattro evangelisti. Il meraviglioso altare in alabastro fu probabilmente acquistato verso il 1600 ed è opera del maestro francone Michael Kern. Fino al 1976 qui si celebrava la Santa Messa ogni domenica con l'ultimo cappellano del castello, padre Müller. Ancora oggi si tengono funzioni e messe, anche se sempre più spesso nella cappella di Santa Maria della Neve, che domina la valle e che probabilmente avete visto durante l'arrivo. Anche lì si celebrano matrimoni per coppie provenienti da tutto il mondo. Date pure uno sguardo al bellissimo piviale ricamato sotto vetro, del XVII secolo; mostra in modo impressionante lo stemma degli Echter; i piviali venivano indossati durante funzioni e processioni. Vi prego ora di seguirmi all'esterno, nel cortile interno, verso il portale principale.","ja": "それでは礼拝堂をご覧いただきましょう。礼拝堂は城の最初の建築段階に属しています。ハマン一世・エヒターは同時に、聖職者の生活を支えるための田畑と森を伴うベネフィキウム（聖職禄）を設立しました。この礼拝堂では、エヒター家の多くの子孫が洗礼を受け、また結婚式を挙げました。中でもユリウス・エヒターは、1545年3月18日、まさに自身の誕生日にここで洗礼を受けました。彼はペーター・エヒターの次男であり、後に1573年、ヴュルツブルクの司教公およびフランケン公となりました。\n\n貴重なステンドグラスは15世紀のもので、聖ヴァレンティヌスや、黄金の聖王の礼拝の場面が描かれています。小さな塔は星形のヴォールト天井を持ち、今もなお後期ゴシック様式で整えられています。壁画は1729年に描かれ、12人の使徒と4人の福音書記者を表しています。美しいアラバスター製の祭壇は、おそらく1600年頃に取得されたもので、フランケン地方の名匠ミヒャエル・ケルンの作品です。1976年までは、最後の城付き司祭ミュラー神父によって、毎週日曜にここで聖ミサが行われていました。現在も祈祷やミサは行われていますが、谷を見下ろす丘の上に建つ「聖マリア雪の聖堂」で行われることが多くなっています。おそらく城へ向かう道中でご覧になったことでしょう。そこでは世界各国からの新郎新婦の結婚式も行われています。ガラスの向こうにある、17世紀の美しい刺繍が施された聖歌隊用マントもぜひご覧ください。エヒター家の紋章が印象的に描かれています。このようなマントは祈祷や行列の際に着用されました。それでは、内庭の正面玄関へご案内いたします。","zh": "现在让我们看看礼拜堂。它属于城堡最初的建筑阶段。哈曼一世·埃希特同时设立了一份圣职禄，附带田地与森林，用以供养一位神父的生活。许多埃希特家族的后代曾在这座礼拜堂受洗或举行婚礼。其中，尤利乌斯·埃希特正是在他生日当天，即1545年3月18日，在此受洗。他是彼得·埃希特的次子，后来于1573年成为维尔茨堡采邑主教及法兰克尼亚公爵。\n\n珍贵的彩色玻璃画像来自15世纪，描绘了圣瓦伦丁以及一位金色圣王朝拜的场景。这座小塔楼带有星形拱顶，依然保留着哥特晚期风格的装饰。墙上的壁画绘于1729年，描绘了十二使徒与四位福音传道者。这座精美的雪花石膏祭坛大约于1600年左右购置，是法兰克尼亚名匠米夏埃尔·凯恩的作品。直到1976年，每逢周日，最后一位城堡牧师米勒神父都会在此主持弥撒。如今，这里仍举行祈祷和弥撒，但更多已转移至山谷之上的圣玛丽雪地礼拜堂，您在驱车上山时大概已经见过它。来自世界各地的新人也会在那里举行婚礼。也请留意一下玻璃后面那件绣工精美的17世纪唱诗袍，上面醒目地展示着埃希特家族的纹章；唱诗袍是在祈祷与游行仪式中穿着的礼服。现在请跟随我走出礼拜堂，前往内庭的正门。"}},{"id": 4,"icon": "🏯","key": "hof","names": {"en": "Courtyard & Main Portal","fr": "Cour & Portail Principal","es": "Patio y Portal Principal","it": "Cortile e Portale Principale","ja": "中庭と正門","zh": "内院与正门"},"subs": {"en": "The tower, the founders & their promise","fr": "La tour, les fondateurs & leur promesse","es": "La torre, los fundadores y su promesa","it": "La torre, i fondatori e la loro promessa","ja": "塔、創設者たち、そして誓い","zh": "塔楼、创始人与他们的誓言"},"tips": {"en": "The tower is 30 metres tall with walls two metres thick — and it was never conquered.","fr": "La tour mesure 30 mètres de haut avec des murs de deux mètres d'épaisseur — et elle ne fut jamais conquise.","es": "La torre tiene 30 metros de altura con muros de dos metros de grosor — y nunca fue conquistada.","it": "La torre è alta 30 metri con mura spesse due metri — e non fu mai conquistata.","ja": "塔は高さ30メートル、壁の厚さは2メートル——そして一度も攻め落とされたことがありません。","zh": "塔楼高30米，墙厚两米——从未被攻克。"},"texts": {"en": "Let us now step out into the courtyard in front of the main portal.\n\nOver the centuries the building grew and was altered by successive generations to suit their needs. A minor ice age forced the inhabitants to wall up corridors that had previously been open. The north wing, through which we will shortly walk together, was completed by Peter Echter III, as was the cross wing containing the service rooms, and with this the house took on its present form as a Renaissance castle. Mespelbrunn Castle is one of the few Renaissance castles still inhabited today by the family that built it. Thanks to its hidden location in the valley, away from towns, it remained undamaged by wars throughout the centuries.\n\nThe oldest part of the castle is the Tower. Together with the chapel, it was built by Haman I Echter from roughly 1412 to 1430, and was raised again in height during the 16th and 17th centuries. It measures about thirty meters and has walls two meters thick in its lower third. The original entrance, however, was on the first floor, where the staircase now leads up, the so-called high entrance. A tower of this kind is also called a keep. In the Middle Ages, a ladder would be leaned against towers built in this way and then drawn up afterward, keeping the family safe from attack.\n\nThe narrow iron ladder you now see mounted on the outside was only installed in modern times. Today, behind the thick walls on the ground floor, you find the family archive. Above it follows a guest room, then a chamber, a reading room, and high up a small library. These rooms were furnished in the 19th century. By today's standards they are somewhat inconvenient to use, since there is no running water and only an outhouse. The tower cannot be visited, as the staircases are very narrow and made of wood; it would be far too dangerous.\n\nIn 1906 the castle was equipped with running water. In the course of the modern era, the present living quarters also received an oil-fired central heating system and were electrified. The castle served as a filming location for the 1957 movie 'Das Wirtshaus im Spessart,' starring Liselotte Pulver. The entire northeast wing, with its magnificent large rooms, was first shown to interested travelers shortly before the First World War.\n\nHere, behind the wooden door marked with a heart, is today's wedding room, where since 2007 couples have been able to marry in a civil ceremony.\n\nNow let us look at the small figure in the corner. It is a so-called apotropaic figure, meant to ward off evil. The older castle guides used to tell that it was a joke by the architect, portraying himself naked but with broad shoulders, bearing the weight of responsibility for the building. With the castle resting on its shoulders, the figure symbolizes the protection of the house against evil powers, much like the grotesque faces at the entrance of the portal. Above the beautiful main portal you see a magnificent, masterfully crafted sculpture: it depicts the builders of the house, Peter Echter III and his wife Gertraud von Adelsheim, formerly Adolzheim. The numbers indicate their ages at the time of construction, forty-nine and forty-four. Above that is the year 1569, marking the completion of construction; they were the parents of Julius Echter, who was elected Prince-Bishop in Würzburg in 1573. On both sides you see the so-called proof of ancestry. In earlier times, when a nobleman married, his wife also had to prove that her four great-grandfathers had already belonged to the nobility. Above this you can still clearly read the house motto, or marriage vow: 'Marital love in God and steadfast loyalty bring happiness and blessing without any regret. With earnestness and diligence we trusted in God, and for the good of our own, built this house.' On both half-columns you can see stonemasons' marks. To this day, every stonemason has his own mark, which he carves into his work like a signature. The sandstone used here was quarried locally in Miltenberg. The bell dates from the 18th century and, like the other door fittings, is hand-forged. The double-headed eagle shows that the Echter family belonged to the Imperial Knighthood.\n\nIn the Staircase you see engravings by Elias Riedinger and hunting trophies from the Spessart forest: an impressive collection of antlers, but also a capercaillie, a cuckoo, a raven, a marten, and of course wild boar. Even a hundred years ago, capercaillie could still be hunted in Mespelbrunn. To successfully reintroduce them today, fifty thousand hectares of untouched nature would be needed; even hikers alone are not tolerated by this shy woodland bird. In the leaded glass windows you can recognize the coats of arms of the families from which the Countesses of Ingelheim of recent centuries descended. Just before we step into the dining hall, you will see on the left wall the beloved wolpertingers, known here as hares with horns.\n\nBefore we go upstairs, please leave your backpacks, walking sticks, helmets and similar items down here. These cannot be taken up into the museum. Upstairs, you may not lean or hold onto anything, and there are no seating facilities. No photographs.","fr": "Sortons à présent dans la Cour devant le portail principal.\n\nAu fil des siècles, le bâtiment s'est agrandi et a été transformé par les générations successives selon leurs besoins. Un petit âge glaciaire contraignit les habitants à fermer par des murs certains couloirs jusqu'alors ouverts. L'aile nord, par laquelle nous passerons bientôt ensemble, fut achevée par Peter Echter III, de même que l'aile transversale abritant les locaux d'exploitation, et c'est ainsi que la maison prit sa forme actuelle de château Renaissance. Le château de Mespelbrunn est l'un des rares châteaux Renaissance encore habités aujourd'hui par la famille qui l'a fait construire. Grâce à sa situation cachée dans la vallée, à l'écart des villes, il est resté épargné par les guerres au fil des siècles.\n\nLa partie la plus ancienne du château est la Tour. Construite avec la chapelle entre environ 1412 et 1430 par Haman Ier Echter, elle fut rehaussée à nouveau aux XVIe et XVIIe siècles. Elle mesure environ trente mètres et possède, dans son tiers inférieur, des murs de deux mètres d'épaisseur. L'entrée d'origine se trouvait toutefois au premier étage, là où mène aujourd'hui l'escalier, ce qu'on appelle une entrée haute. Une telle tour est aussi appelée donjon. Pour des tours construites de manière similaire, on appuyait autrefois, au Moyen Âge, une échelle, qu'on retirait ensuite, mettant ainsi la famille à l'abri des attaques.\n\nL'étroite échelle en fer que vous voyez maintenant fixée à l'extérieur n'a été installée qu'à l'époque moderne. Aujourd'hui, derrière les murs épais du rez-de-chaussée, se trouve les archives familiales. Au-dessus se trouve une chambre d'hôtes, puis une chambre, une salle de lecture, et tout en haut une petite bibliothèque. Ces pièces furent aménagées au XIXe siècle. Selon les standards actuels, leur usage est quelque peu malaisé, car il n'y a pas d'eau courante et seulement des toilettes sèches. On ne peut pas visiter la tour, car les escaliers sont très étroits et en bois ; ce serait beaucoup trop dangereux.\n\nEn 1906, le château fut équipé de l'eau courante. À l'époque moderne, l'aile d'habitation actuelle reçut également un chauffage central au fioul et fut électrifiée. (Le château servit de décor au film « L'auberge du Spessart » en 1957, avec Liselotte Pulver.) L'ensemble de l'aile nord-est, avec ses magnifiques grandes pièces, fut montré pour la première fois à des voyageurs intéressés peu avant la Première Guerre mondiale.\n\nIci, derrière la porte en bois marquée d'un cœur, se trouve aujourd'hui la salle des mariages, où, depuis 2007, les couples peuvent se marier civilement.\n\nRegardons maintenant le petit personnage dans le coin. Il s'agit d'une figure dite conjuratoire. Les anciens guides du château racontaient qu'il s'agissait d'une plaisanterie de l'architecte, se représentant lui-même nu, mais aux larges épaules, portant le poids de la responsabilité de la construction. Avec le château sur ses épaules, la figure symbolise la protection de la maison contre les puissances maléfiques, tout comme les grimaces à l'entrée du portail (chimères). Au-dessus du magnifique portail principal, vous voyez une splendide sculpture, d'une maîtrise artistique remarquable : elle représente les bâtisseurs de la maison, Peter Echter III et son épouse Gertraud von Adelsheim (autrefois Adolzheim). Les chiffres indiquent leur âge lors de la construction (49 ans pour lui, 44 pour elle). Au-dessus figure l'année 1569, année d'achèvement de la construction (ils sont les parents de Julius Echter, élu prince-évêque à Würzburg en 1573). Des deux côtés se trouve ce qu'on appelle la preuve de noblesse. Autrefois, lorsqu'un noble se mariait, son épouse devait elle aussi prouver que ses quatre arrière-grands-pères appartenaient déjà à la noblesse. Au-dessus, on peut encore bien lire la devise de la maison, ou le serment conjugal : « Amour conjugal en Dieu et fidélité constante apportent bonheur et bénédiction sans aucun regret. Avec sérieux et application, nous avons mis notre confiance en Dieu, et pour le bien des nôtres, nous avons construit cette maison. » Sur les deux demi-colonnes, vous voyez des marques de tailleurs de pierre. Aujourd'hui encore, chaque tailleur de pierre possède sa propre marque, qu'il grave dans son ouvrage comme une signature. Le grès utilisé ici fut extrait localement, à Miltenberg. La cloche date du XVIIIe siècle et, comme les autres ferrures de portes, est forgée à la main. L'aigle bicéphale indique que la famille Echter appartenait à la noblesse d'Empire immédiate.\n\nDans l'Escalier, vous voyez des gravures d'Elias Riedinger et des trophées de chasse du Spessart : une impressionnante collection de bois de cerfs, mais aussi un grand tétras, un coucou, un corbeau, une martre et bien sûr des sangliers. Il y a encore cent ans, on pouvait chasser le grand tétras à Mespelbrunn. Pour le réintroduire avec succès aujourd'hui, il faudrait une surface de 50 000 hectares de nature intacte ; même de simples promeneurs ne sont pas tolérés par ce volatile sauvage très farouche. Dans les vitraux au plomb, vous reconnaissez les armoiries des familles d'origine dont sont issues les comtesses d'Ingelheim des derniers siècles. Juste avant d'entrer dans la salle à manger, vous apercevez sur le mur de gauche les fameux wolpertinger, c'est-à-dire chez nous des lièvres à cornes !\n\nAvant de monter, veuillez déposer ici vos sacs à dos, cannes de marche, casques et autres objets similaires. Ces objets ne peuvent pas être emportés au musée à l'étage. À l'étage, il est interdit de s'appuyer ou de se tenir à quoi que ce soit, et il n'y a pas non plus de possibilité de s'asseoir. Pas de photos.","es": "Salgamos ahora al Patio frente al portal principal.\n\nA lo largo de los siglos, la construcción fue creciendo y siendo modificada por las generaciones según sus necesidades. Una pequeña edad de hielo obligó a los habitantes a cerrar con muros algunos pasillos que en parte aún estaban abiertos. El ala norte, por la que pasaremos juntos en breve, fue terminada por Peter Echter III, igual que el ala transversal con las dependencias de servicio, y así la casa adquirió su forma actual de castillo renacentista. El castillo de Mespelbrunn es uno de los pocos castillos renacentistas que hasta hoy sigue habitado por la familia que lo construyó. Gracias a su ubicación escondida en el valle, alejada de las ciudades, permaneció a salvo de las guerras a lo largo de los siglos.\n\nLa parte más antigua del castillo es la Torre. Construida junto con la capilla aproximadamente entre 1412 y 1430 por Haman I Echter, fue elevada de nuevo en los siglos XVI y XVII. Mide unos 30 metros y tiene, en su tercio inferior, muros de dos metros de espesor. La entrada original, sin embargo, estaba en la primera planta, donde ahora conduce la escalera (la llamada entrada elevada). A una torre de este tipo también se la llama torreón. En torres construidas de manera similar, en la Edad Media se apoyaba una escalera que después se retiraba, de modo que la familia quedaba protegida frente a ataques.\n\nLa estrecha escalera de hierro que ahora ven instalada en el exterior se colocó solo en época moderna. Hoy, detrás de los gruesos muros de la planta baja, se encuentra el archivo familiar. Encima sigue una habitación de invitados, luego una alcoba, una sala de lectura y, en lo más alto, una pequeña biblioteca. Estas estancias se habilitaron en el siglo XIX. Según los estándares actuales, resultan algo incómodas de usar, ya que no hay agua corriente y solo hay una letrina. No se puede visitar la torre, ya que las escaleras son muy estrechas y de madera; sería demasiado peligroso.\n\nEn 1906 el castillo se dotó de agua corriente. En el transcurso de la época moderna, el ala de habitación actual recibió también calefacción central de aceite y fue electrificada. (El castillo fue escenario de rodaje de la película 'La posada del Spessart' en 1957, con Liselotte Pulver.) La totalidad del ala noreste, con sus magníficas y grandes salas, se mostró por primera vez a viajeros interesados poco antes de la Primera Guerra Mundial.\n\nAquí, detrás de la puerta de madera con el corazón, se encuentra hoy la sala de bodas, donde desde 2007 las parejas pueden casarse civilmente.\n\nMiremos ahora la pequeña figura de la esquina. Es lo que se llama una figura apotropaica. Los antiguos guías del castillo contaban que era una broma del arquitecto, representándose a sí mismo desnudo, pero con anchos hombros y el peso de la responsabilidad de la construcción. Con el castillo sobre sus hombros, la figura simboliza la protección de la casa frente a poderes malignos, igual que las muecas en la entrada del portal (quimeras). Sobre el hermoso portal principal se ve una espléndida y magistral obra de escultura: muestra a los constructores de la casa, Peter Echter III y su esposa Gertraud von Adelsheim (antes Adolzheim). Las cifras indican la edad que tenían en el momento de la construcción (él 49, ella 44 años). Encima, el año 1569, año de finalización de la construcción (son los padres de Julius Echter, quien fue elegido príncipe-obispo en Wurzburgo en 1573). En ambos lados se encuentra la llamada prueba de nobleza. Antiguamente, cuando un noble se casaba, su esposa también debía demostrar que sus cuatro bisabuelos ya pertenecían a la nobleza. Encima todavía puede leerse bien el lema de la casa, o el voto matrimonial: 'El amor conyugal en Dios y la fidelidad constante traen felicidad y bendición sin ningún pesar. Con seriedad y diligencia confiamos en Dios, y para el bien de los nuestros construimos esta casa.' En ambas semicolumnas se ven marcas de canteros. Hoy en día, cada cantero sigue teniendo su propia marca, que grava en su obra como una firma. La arenisca utilizada aquí se extraía en la región, en Miltenberg. La campana data del siglo XVIII y, como las demás herrajes de las puertas, está forjada a mano. El águila bicéfala muestra que la familia Echter pertenecía a la Caballería Imperial Inmediata.\n\nEn la Escalera se ven grabados de Elias Riedinger y trofeos de caza del Spessart: una imponente colección de cuernas, pero también un urogallo, un cuco, un cuervo, una marta y, por supuesto, jabalíes. Hace cien años todavía se podía cazar el urogallo en Mespelbrunn. Si hoy se quisiera reintroducirlo con éxito, necesitaríamos una superficie de 50.000 hectáreas de naturaleza intacta; ya los simples excursionistas no son tolerados por esta tímida ave silvestre. En las ventanas emplomadas se reconocen los escudos de armas de las familias de origen de las que procedían las condesas de Ingelheim de los últimos siglos. Justo antes de entrar en el comedor, verán a mano izquierda en la pared los populares wolpertinger, que entre nosotros son liebres con cuernos.\n\nAntes de subir, les rogamos que dejen aquí sus mochilas, bastones de paseo, cascos y similares. Estos objetos no pueden subirse al museo. Arriba no se permite apoyarse ni sujetarse en ningún lugar, y tampoco hay asientos disponibles. No se permiten fotografías.","it": "Usciamo ora nella Corte davanti al portale principale.\n\nNel corso dei secoli l'edificio crebbe e fu modificato dalle generazioni successive secondo le loro esigenze. Una piccola era glaciale costrinse gli abitanti a chiudere con muri i corridoi in parte ancora aperti. L'ala nord, attraverso la quale passeremo presto insieme, fu completata da Peter Echter III, così come l'ala trasversale con i locali di servizio, e con ciò la casa assunse il suo aspetto attuale di castello rinascimentale. Il castello di Mespelbrunn è uno dei pochi castelli rinascimentali ancora oggi abitati dalla famiglia che lo fece costruire. Grazie alla sua posizione nascosta nella valle, lontana dalle città, è rimasto indenne dalle guerre nel corso dei secoli.\n\nLa parte più antica del castello è la Torre. Costruita insieme alla cappella circa tra il 1412 e il 1430 da Haman I Echter, fu nuovamente sopraelevata nei secoli XVI e XVII. Misura circa 30 metri e ha, nel terzo inferiore, mura spesse due metri. L'ingresso originale, tuttavia, si trovava al primo piano, dove ora conduce la scala (il cosiddetto ingresso alto). Una torre di questo tipo viene anche chiamata torrione. Per torri costruite in modo simile, nel Medioevo si appoggiava una scala che veniva poi ritirata, così la famiglia era al sicuro dagli attacchi.\n\nLa stretta scala di ferro che vedete ora montata all'esterno fu installata solo in epoca moderna. Oggi, dietro le mura spesse del piano terra, si trova l'archivio di famiglia. Sopra segue una camera per gli ospiti, poi una stanza, una sala di lettura e, in alto, una piccola biblioteca. Questi ambienti furono allestiti nel XIX secolo. Secondo gli standard odierni, il loro uso è piuttosto scomodo, poiché non c'è acqua corrente e c'è solo una latrina alla turca. Non è possibile visitare la torre, poiché le scale sono molto strette e in legno; sarebbe troppo pericoloso.\n\nNel 1906 il castello fu dotato di acqua corrente. Nel corso dell'epoca moderna, l'attuale ala abitativa ricevette anche un riscaldamento centrale a olio e fu elettrificata. (Il castello fu set cinematografico per il film 'La locanda dello Spessart' del 1957, con Liselotte Pulver.) L'intera ala nord-est, con le sue magnifiche e grandi sale, fu mostrata per la prima volta a viaggiatori interessati poco prima della Prima Guerra Mondiale.\n\nQui, dietro la porta di legno con il cuore, si trova oggi la sala dei matrimoni, dove dal 2007 le coppie possono sposarsi con rito civile.\n\nGuardiamo ora la piccola figura nell'angolo. È una cosiddetta figura apotropaica. Le guide più anziane del castello raccontavano che fosse uno scherzo dell'architetto, che si rappresentò nudo ma con spalle larghe e il peso della responsabilità della costruzione. Con il castello sulle spalle, la figura simboleggia la protezione della casa dai poteri maligni, così come le smorfie all'ingresso del portale (chimere). Sopra il bellissimo portale principale si vede una splendida opera scultorea, magistralmente realizzata: mostra i costruttori della casa, Peter Echter III e sua moglie Gertraud von Adelsheim (in precedenza Adolzheim). Le cifre indicano l'età al momento della costruzione (lui 49, lei 44 anni). Sopra l'anno 1569, anno di conclusione della costruzione (sono i genitori di Julius Echter, eletto principe-vescovo a Würzburg nel 1573). Su entrambi i lati si trova la cosiddetta prova di nobiltà. In passato, quando un nobile si sposava, anche sua moglie doveva dimostrare che i suoi quattro bisnonni appartenevano già alla nobiltà. Sopra si può ancora leggere bene il motto di casa, ovvero il giuramento matrimoniale: 'L'amore coniugale in Dio e la fedeltà costante portano felicità e benedizione senza alcun rimpianto. Con serietà e diligenza abbiamo confidato in Dio, e per il bene dei nostri abbiamo costruito questa casa.' Su entrambe le semicolonne si vedono i marchi degli scalpellini. Ancora oggi ogni scalpellino ha il proprio marchio, che incide nella sua opera come una firma. L'arenaria utilizzata qui veniva estratta nella zona, a Miltenberg. La campana risale al XVIII secolo ed è, come le altre ferramenta delle porte, forgiata a mano. L'aquila bicipite mostra che la famiglia Echter apparteneva alla Cavalleria Imperiale Immediata.\n\nNella Scala si vedono incisioni di Elias Riedinger e trofei di caccia dello Spessart: un'imponente collezione di corna di cervo, ma anche un gallo cedrone, un cuculo, un corvo, una martora e naturalmente cinghiali. Ancora cento anni fa a Mespelbrunn si poteva cacciare il gallo cedrone. Per reintrodurlo oggi con successo, avremmo bisogno di una superficie di 50.000 ettari di natura incontaminata; già i semplici escursionisti non sono tollerati da questo schivo volatile selvatico. Nelle vetrate piombate si riconoscono gli stemmi delle famiglie d'origine da cui discendevano le contesse di Ingelheim degli ultimi secoli. Poco prima di entrare nella sala da pranzo, vedrete sulla parete a sinistra i celebri wolpertinger, da noi: lepri con corna!\n\nPrima di salire, vi preghiamo di lasciare qui zaini, bastoni da passeggio, caschi e oggetti simili. Questi oggetti non possono essere portati di sopra nel museo. Di sopra non è permesso appoggiarsi o tenersi a nulla, e non ci sono nemmeno posti a sedere. Niente fotografie.","ja": "それでは正面玄関前の内庭へ出てみましょう。\n\n数世紀の間に建物は増築され、各世代の住人によって、必要に応じて改築されてきました。小氷期の到来により、住人たちは、かつては開放されていた通路の一部を壁で閉じる必要に迫られました。私たちがこれから一緒に通る北棟は、業務用の部屋を含む横棟と同様に、ペーター・エヒター三世によって完成され、これによって邸宅は現在のルネサンス様式の城としての姿を得ました。メスペルブルン城は、建築した一族が今なお住み続けている、数少ないルネサンス様式の城の一つです。谷間の隠れた場所にあり、都市から離れていたため、何世紀にもわたって戦火を免れてきました。\n\n城内で最も古い部分は塔です。礼拝堂とともに、1412年から1430年頃にかけてハマン一世・エヒターによって建てられ、16世紀から17世紀にかけてさらに高くされました。高さは約30メートルで、下層三分の一の壁は厚さ2メートルに及びます。しかし、もともとの入口は2階部分、現在階段が上っている場所にありました。いわゆる「高所入口」です。このような塔は「主塔（ベルクフリート）」とも呼ばれます。同様に建てられた塔では、中世には梯子を立てかけ、用が済むと引き上げることで、一族は外部からの攻撃から身を守っていました。\n\n現在外側に取り付けられている細い鉄の梯子は、近代に入ってから設置されたものです。現在、1階の厚い壁の内側には家族の文書庫があります。その上には客室があり、続いて小部屋、読書室、そして一番上には小さな図書室があります。これらの部屋は19世紀に整えられました。現在の基準からすると、水道がなく、トイレも簡易なものしかないため、使い勝手はあまり良くありません。階段が非常に狭く木造であるため、塔の内部を見学することはできません。あまりに危険だからです。\n\n1906年、城には水道が引かれました。近代化に伴い、現在の居住区には石油式の中央暖房も導入され、電化されました。この城は1957年の映画『シュペッサルトの宿屋』（リーゼロッテ・プルファー主演）の撮影地にもなりました。豪華な大広間が並ぶ北東棟全体は、第一次世界大戦直前に初めて、興味を持つ旅行者たちに公開されました。\n\nここ、心の形をした木製の扉の向こうには、現在、結婚式場があり、2007年以降、夫婦がここで民事婚を挙げられるようになっています。\n\nそれでは、角にある小さな人物像をご覧ください。これは「魔除け像」と呼ばれるものです。古くからのガイドたちの間では、この建築家が責任の重さを背負う自分自身を、裸ながら肩幅広く表現した、いわば一種の冗談だったと語られています。城を肩に担いだこの像は、玄関の魔除けの顔像と同様に、邪悪な力から家を守る象徴とされています。美しい正面玄関の上には、見事で芸術的な彫刻作品があります。これは邸宅の建築者であるペーター・エヒター三世とその妻ゲルトラウト・フォン・アーデルスハイム（旧姓アドルツハイム）を表しています。記された数字は建築当時の年齢を示しており、彼は49歳、彼女は44歳でした。その上にある1569年という年号は、建築完了の年を示しています。彼らは、1573年にヴュルツブルクで司教公に選ばれたユリウス・エヒターの両親です。両側には「血統証明」と呼ばれるものが見られます。かつて貴族が結婚する際には、妻側もまた、自分の四人の曽祖父がすでに貴族であったことを証明する必要がありました。その上には、今もはっきりと読み取れる家訓、いわば結婚の誓いの言葉があります。「神における夫婦の愛と変わらぬ誠実は、悔いのない幸福と祝福をもたらす。誠実さと勤勉さをもって、私たちは神を信頼し、身内の幸せのためにこの家を建てた。」両側の半円柱には石工の刻印が見られます。今日でも、石工は皆それぞれ自身の印を持ち、署名のようにそれを作品に刻みます。ここで使われた砂岩は、近隣のミルテンベルクで採掘されたものです。鐘は18世紀のもので、他の扉金具と同様、手作りの鍛造品です。双頭の鷲は、エヒター家が帝国騎士団に属していたことを示しています。\n\n階段ホールには、エリアス・リーディンガーの版画と、シュペッサルトの狩猟戦果の品々が見られます。見事な角のコレクションのほか、オオライチョウ、カッコウ、カラス、テン、そしてもちろんイノシシなどです。わずか100年前まで、メスペルブルンではオオライチョウの狩猟が行われていました。今日これを再導入しようとすれば、5万ヘクタールの自然のままの土地が必要となるでしょう。この警戒心の強い野鳥は、散歩する人がいるだけでも生息できないのです。鉛枠のステンドグラスには、過去数世紀のインゲルハイム伯爵夫人たちが生まれた家系の紋章が見えます。食堂に入る直前、左手の壁には、皆さんに人気の「ヴォルパーティンガー」、つまり角の生えたウサギの像もご覧いただけます。\n\n二階に上がる前に、リュックサック、ステッキ、ヘルメットなどはこちらに置いていってください。これらの物は二階の展示室には持ち込めません。二階では、どこにも寄りかかったり、つかまったりすることができず、座席もございません。撮影は禁止です。","zh": "现在让我们走出来，来到正门前的内庭。\n\n几个世纪以来，这座建筑不断扩建，并被历代家族成员依需要加以改造。一次小冰期迫使居住者将原本开放的部分走廊用墙体封闭起来。我们即将一同穿过的北翼，连同设有附属用房的横翼，皆由彼得·埃希特三世完成，由此这座宅邸获得了如今文艺复兴式城堡的样貌。梅斯佩尔布伦城堡是少数至今仍由其建造家族居住的文艺复兴式城堡之一。由于地处隐蔽的山谷之中，远离城市，它在历经数个世纪的战乱中始终未遭破坏。\n\n城堡中最古老的部分是塔楼。它与礼拜堂大约建于1412年至1430年间，由哈曼一世·埃希特建造，并在16、17世纪进一步加高。塔楼高约三十米，下三分之一处墙体厚达两米。然而，最初的入口设在二层，正是如今楼梯通向之处，被称为“高位入口”。这种类型的塔楼也被称为主塔。中世纪时，类似构造的塔楼通常会架起一把梯子，使用后随即收起，借此保护家族免受袭击。\n\n您如今所见、安装在外墙上的那把细窄铁梯，是近代才装设的。如今，地面层厚墙之后是家族档案室，往上依次是一间客房、一间小室、一间阅览室，再往上则是一座小型图书室。这些房间是在19世纪布置完成的。以今天的标准来看，使用起来颇为不便，因为这里没有自来水，只有一座旱厕。塔楼内部无法参观，因为楼梯极为狭窄且为木质结构，实在过于危险。\n\n1906年，城堡接通了自来水。随着时代的推进，如今的居住区也安装了燃油式中央供暖系统，并实现了电气化。这座城堡曾是1957年电影《施佩萨特森林客栈》的拍摄地，由丽泽洛特·普尔费尔主演。整座东北翼，连同其中宏伟的大房间，最早是在第一次世界大战前不久向感兴趣的旅客开放展示的。\n\n这里，这扇刻有心形图案的木门之后，便是如今的婚礼厅，自2007年起，新人可在此举行民事婚礼。\n\n现在让我们看看角落里那座小人像。它是一座所谓的“镶魔像”。年长的城堡向导们常说，这是建筑师的一个玩笑：他将自己塑造成裸体，但肩膀宽阔，象征着背负建造这座建筑的责任重担。这座人像将城堡扛在肩上，象征着守护宅邸、抵御邪恶力量，正如门廊入口处的那些怪面雕像一样。在这座美丽的正门上方，您可以看到一件辉煌而极具艺术造诣的雕刻作品：描绘的是这座宅邸的建造者，彼得·埃希特三世与他的妻子格特劳德·冯·阿德尔斯海姆（原姓阿多尔茨海姆）。上面的数字标示着建造时二人的年龄，他四十九岁，她四十四岁。再往上是1569年这个年份，标志着建筑工程的完工之年；他们正是尤利乌斯·埃希特的父母，尤利乌斯于1573年在维尔茨堡当选采邑主教。两侧各有一处所谓的“贵族血统证明”。早年贵族男子成婚时，其妻子也必须证明自己四位曾祖父均出身贵族。在其上方，至今仍可清晰读到这座宅邸的家训，亦即婚誓之词：“在神之中相爱并永守忠诚，将带来无悔的幸福与祝福。我们以诚挚与勤勉信靠上帝，为家人之福而建此宅。”两侧的半圆柱上可见石匠标记。直至今日，每位石匠仍拥有自己专属的标记，会像签名一样刻在自己的作品上。这里所用的砂岩，采自附近的米尔滕贝格。这座铃是18世纪的作品，与其他门饰一样均为手工锻造。双头鹰图案表明，埃希特家族曾属于帝国骑士团。\n\n在楼梯间，您会看到埃利亚斯·里丁格的版画，以及来自施佩萨特森林的狩猎战利品：一组规模可观的鹿角收藏，此外还有一只松鸡、一只杜鹃、一只乌鸦、一只貂，当然还有野猪。直到一百年前，梅斯佩尔布伦地区仍可猎获松鸡。若要在今天成功重新引入松鸡，则需要五万公顷未受干扰的自然环境；即便只是徒步散步者的出现，这种警觉的野生鸡类也无法容忍。从镶铅玻璃窗中，您可以辨认出近几个世纪因格尔海姆女伯爵们各自出身家族的纹章。在我们走进餐厅之前，请留意左边墙上那对深受喜爱的“沃尔珮廷格”，也就是我们当地所称的“长角野兔”！\n\n上楼之前，请将背包、登山杖、头盔等物品留在这里。这些物品不能带到楼上的展厅。楼上任何地方都不允许倚靠或扶靠，也没有座位可供使用。禁止拍照。"}},{"id": 5,"icon": "🍽️","key": "speisesaal","names": {"en": "Dining Hall","fr": "Grande Salle à Manger","es": "Gran Comedor","it": "Grande Sala da Pranzo","ja": "大食堂","zh": "大餐厅"},"subs": {"en": "Porcelain, weapons & a room still in use","fr": "Porcelaine, armes & une salle encore en usage","es": "Porcelana, armas y una sala aún en uso","it": "Porcellana, armi e una sala ancora in uso","ja": "陶磁器、武器、そして今も使われる部屋","zh": "瓷器、武器与仍在使用的房间"},"tips": {"en": "The grandfather clock is from 18th-century Amsterdam. It still keeps time.","fr": "L'horloge de parquet vient d'Amsterdam du XVIIIe siècle. Elle fonctionne encore.","es": "El reloj de caja es de Amsterdam del siglo XVIII. Todavía marca la hora.","it": "L'orologio a pendolo viene dalla Amsterdam del XVIII secolo. Funziona ancora.","ja": "柱時計は18世紀のアムステルダム製で、今も時を刻んでいます。","zh": "落地大钟来自18世纪的阿姆斯特丹，至今仍在走动。"},"texts": {"en": "Upstairs: the Dining Hall. This large room is still used today for the family's private celebrations. A smaller, everyday dining room is located in the wing opposite, and unlike this room, it can be heated. The wooden ceiling with its rosettes dates from the 18th century. In the cabinet you see porcelain of various origins: Chinese and Japanese porcelain, Old Vienna ware, and a series of Nymphenburg plates painted by Countess Marie Antoinette, née Countess Westphalen zu Fürstenberg, depicting former Ingelheim possessions on the left bank of the Rhine. Around 1800 those possessions fell to the French revolutionary troops who conquered the left bank of the Rhine. Her husband, Count Friedrich Karl von Ingelheim, raised a volunteer battalion, the 'Frankfurt Riflemen,' which he led against Napoleon, and according to the town chronicle of Hanau, it succeeded in forcing Napoleonic troops to retreat in certain engagements. You also see two rows of English faience. Above the fireplace hangs a so-called Parforce horn, used in driven hunts, along with the boar spears that were common until the early 20th century for wild boar hunting. The entire weapons collection was assembled from family property by Philipp Rudolph, Count Albrecht's grandfather, and has been on display since as early as 1920. It is a collection of historical hunting, war, and display weapons. It was also Count Philipp Rudolph, together with his wife Leopoldine, née Countess Schenk von Stauffenberg, who began regularly opening the house to the public after the First World War. His portrait, a painting from 1912 by the Aschaffenburg painter Adalbert Hock, hangs on the left next to the heraldic window. The sword bearing the date 1501 is, in fact, a sword from the 19th century, whereas one of the oldest swords is the piece hanging diagonally to its left, most likely originating from late medieval Scotland. Notice the beautifully crafted hand guard, resembling a woven basket, which is why it is known in English by the technical term 'basket hilt.' The Flemish bronze candlesticks are hand-forged and date from the 18th century. On the opposite wall hang hunting crossbows inlaid with marquetry from the late 16th century. The two paintings are by Frans Snyders, a friend of Peter Paul Rubens and a pupil of Pieter Brueghel the Younger, depicting a stag hunt and a boar hunt. Above them is an interesting set of antlers; the animal had suffered from a condition that affected the shape of its antlers. The engraving below is by Martin Riedinger. The large oval window facing the courtyard is likewise a hand-painted heraldic window, this time showing the family trees of Marie Antoinette and her husband, Count Friedrich Karl von Ingelheim. The longcase clock comes from eighteenth-century Amsterdam. The adjoining weapons collection dates back to the 17th century: rifles and pistols, various powder horns, and hunting cutlery above. At the far end is a historic muzzle-loader, a musket also known as an arquebus, from the early years of the Thirty Years' War. It was loaded through the barrel with ball and powder, then packed down with a ramrod and ignited at the breech by a slow-burning fuse. It produced an enormous recoil. Since firearms had only recently been invented at that time, accidents repeatedly occurred when they discharged backward instead of forward. It was extremely heavy and required two men to operate, fixing the weapon, also colloquially called a hook gun, by its hook into a fork rest or onto a stand. The sword on the table is a ceremonial sword from the possessions of Prince-Bishop Julius Echter. The halberds on the side are ceremonial lances belonging to Anselm Franz von Ingelheim, who was Prince-Elector of Mainz in 1680; on public occasions he was accompanied by an honor guard. When he died in Aschaffenburg on 30 March 1695, his body was buried in the collegiate church there, his heart in Mainz Cathedral, and his entrails in the Mainz court church of St. Gangolph. Beside them, to the left, are lancer's lances from the First World War; Philipp Rudolph von Ingelheim belonged to a Bamberg cavalry squadron, the so-called Uhlans. In the middle you see two further boar spears.","fr": "À l'étage : la Salle à Manger. Cette grande pièce est aujourd'hui encore utilisée pour les fêtes privées de la famille. Une salle à manger plus petite, pour le quotidien, se trouve dans l'aile opposée, et peut être chauffée, contrairement à cette pièce. Le plafond en bois orné de rosettes date du XVIIIe siècle. Dans l'armoire, vous voyez des porcelaines de différentes origines : porcelaine chinoise et japonaise, porcelaine de l'ancienne Vienne, ainsi qu'une série d'assiettes de Nymphenburg, peintes par la comtesse Marie Antoinette, née comtesse Westphalen zu Fürstenberg, représentant d'anciennes possessions des Ingelheim sur la rive gauche du Rhin. (Précision : ces possessions de la rive gauche du Rhin furent annexées vers 1800 par les troupes révolutionnaires françaises, qui conquirent cette rive du fleuve. Son époux, le comte Friedrich Karl von Ingelheim, leva un bataillon de volontaires, les « Chasseurs de Francfort », qu'il mena contre Napoléon. Selon la chronique municipale de Hanau, ce bataillon connut le succès et parvint, par endroits, à contraindre les troupes napoléoniennes à se retirer.) Vous voyez également deux rangées de faïences anglaises. Au-dessus de la cheminée est suspendu un cor dit « de chasse à courre », ainsi que les épieux à sanglier, en usage jusqu'au début du XXe siècle pour la chasse au sanglier. L'ensemble de la collection d'armes a été constitué à partir du patrimoine familial par Philipp Rudolph, le grand-père du comte Albrecht, et est exposé depuis déjà 1920. Il s'agit d'une collection d'armes historiques de chasse, de guerre et d'apparat. C'est aussi le comte Philipp Rudolph, avec son épouse Léopoldine, née comtesse Schenk von Stauffenberg, qui, après la Première Guerre mondiale, ouvrit régulièrement la maison au public. Son portrait, un tableau de 1912 du peintre d'Aschaffenburg Adalbert Hock, se trouve à gauche, près de la fenêtre héraldique. L'épée portant la date 1501 est en réalité une épée du XIXe siècle, alors que l'une des épées les plus anciennes est celle suspendue en diagonale à sa gauche ; elle provient très probablement de l'Écosse du bas Moyen Âge. Observez la magnifique garde travaillée, qui ressemble à un tressage en panier, d'où son nom anglais de 'basket hilt'. Les chandeliers flamands en bronze sont forgés à la main et datent du XVIIIe siècle. Sur le mur opposé sont suspendues des arbalètes de chasse marquetées, datant de la fin du XVIe siècle. Les deux tableaux sont de Frans Snyders, ami de Pierre Paul Rubens et élève de Pieter Brueghel le Jeune ; ils représentent une chasse au cerf et une chasse au sanglier. (Au-dessus, des bois remarquables ; l'animal souffrait d'une maladie qui se répercuta sur la forme de ses bois.) La gravure dessous est de Martin Riedinger. La grande fenêtre ovale donnant sur la cour intérieure est elle aussi une fenêtre héraldique peinte à la main, présentant cette fois les arbres généalogiques de Marie Antoinette et de son époux, le comte Friedrich Karl von Ingelheim. L'horloge sur pied provient de l'Amsterdam du XVIIIe siècle. La collection d'armes qui suit remonte jusqu'au XVIIe siècle : fusils et pistolets, différentes cornes à poudre, couverts de chasse au-dessus. À l'extrémité, une arme historique à chargement par la bouche, un mousquet aussi appelé arquebuse, datant des débuts de la guerre de Trente Ans. Elle se chargeait par le canon avec balle et poudre, était ensuite tassée à l'aide d'une baguette, et mise à feu à la tête par une mèche lente. Le recul était énorme. Les armes à feu n'étant alors inventées que depuis peu, des accidents se produisaient régulièrement avec ces armes lorsqu'elles partaient vers l'arrière au lieu de l'avant. Elle était extrêmement lourde et nécessitait deux hommes pour son maniement, afin de fixer l'arme, aussi appelée familièrement 'arquebuse à crochet', par son crochet sur une fourche ou un trépied. L'épée posée sur la table est une épée de cérémonie ayant appartenu au prince-évêque Julius Echter. Les hallebardes sur le côté sont des lances de parade ayant appartenu à Anselm Franz von Ingelheim, prince-électeur de Mayence en 1680 ; lors des cérémonies publiques, il était accompagné d'une garde d'honneur. Lorsqu'il mourut à Aschaffenburg le 30 mars 1695, son corps fut inhumé dans la collégiale de la ville, son cœur dans la cathédrale de Mayence, et ses entrailles dans l'église de cour Saint-Gangolph de Mayence. À côté, à gauche, des lances d'uhlans datant de la Première Guerre mondiale ; Philipp Rudolph von Ingelheim appartenait à un escadron de cavalerie de Bamberg, les uhlans. Au centre, vous voyez deux autres épieux à sanglier.","es": "Arriba: el Comedor. Esta gran sala se sigue utilizando hoy en día para las fiestas privadas de la familia. Un comedor más pequeño para el uso diario se encuentra en el ala opuesta, y se puede calentar, a diferencia de esta sala. El techo de madera con rosetones es del siglo XVIII. En el armario se ven porcelanas de distintos orígenes: porcelana china y japonesa, porcelana de la antigua Viena, y una serie de platos de Nymphenburg, pintados por la condesa Marie Antoinette, de soltera condesa Westphalen zu Fürstenberg, que representan antiguas posesiones de los Ingelheim en la orilla izquierda del Rin. (Nota adicional: estas posesiones de la orilla izquierda del Rin cayeron hacia 1800 en manos de las tropas revolucionarias francesas, que conquistaron esa orilla del río. Su marido, el conde Friedrich Karl von Ingelheim, formó un batallón de voluntarios, los 'Cazadores de Fráncfort', con el que combatió contra Napoleón. Según la crónica municipal de Hanau, este batallón tuvo éxito y logró, en algunos puntos, forzar la retirada de las tropas napoleónicas.) También se ven dos filas de loza inglesa. Sobre la chimenea cuelga un llamado 'cuerno de caza al acoso' y los venablos de jabalí, en uso hasta principios del siglo XX para la caza del jabalí. Toda la colección de armas fue reunida a partir del patrimonio familiar por Philipp Rudolph, abuelo del conde Albrecht, y se exhibe ya desde 1920. Se trata de una colección de armas históricas de caza, de guerra y de exhibición. Fue también el conde Philipp Rudolph, junto con su esposa Leopol

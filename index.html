<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mespelbrunn">
<meta name="theme-color" content="#E8D9BA">
<link rel="manifest" href="manifest.json">
<title>Schloss Mespelbrunn — Audio Guide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Georgia,serif;background:#F5EDD9;color:#2C1810;display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.hdr{background:#E8D9BA;padding:env(safe-area-inset-top,12px) 16px 0;border-bottom:2px solid #C4A882;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-top:12px;margin-bottom:10px}
.castle-lbl{font-size:11px;font-weight:700;color:#6B3A1F;letter-spacing:2px;text-transform:uppercase;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

/* LANGUAGE BUTTONS */
.lang-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.lb{padding:6px 12px;border-radius:20px;border:1.5px solid #C4A882;background:transparent;color:#8B6F47;font-size:12px;cursor:pointer;transition:all .15s;min-height:34px;font-family:-apple-system,sans-serif}
.lb.on{background:#A0522D;border-color:#A0522D;color:#FDFAF5;font-weight:700}

/* ROOM GRID */
.room-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;padding-bottom:10px}
.rg{padding:4px 2px;border-radius:6px;border:1.5px solid #C4A882;background:transparent;color:#8B6F47;font-size:10px;cursor:pointer;text-align:center;transition:all .15s;min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.rg.on{background:#A0522D;border-color:#A0522D;color:#FDFAF5}
.rg-num{font-weight:700;font-size:12px}
.rg-icon{font-size:12px}

/* BODY */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 24px;background:#F5EDD9}

/* TIP */
.tip{background:#EDE0C4;border-radius:10px;padding:10px 13px;font-size:13px;color:#6B3A1F;display:flex;gap:8px;margin-bottom:14px;border:1px solid #D4B896;align-items:flex-start;font-style:italic}

/* ROOM HERO */
.room-hero{background:#FDFAF5;border-radius:14px;border:1.5px solid #C4A882;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(106,58,31,0.1)}
.room-img{height:200px;background:#E8D9BA;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.room-img img{width:100%;height:100%;object-fit:cover;object-position:center 40%;position:absolute;top:0;left:0}
.room-badge{position:absolute;top:10px;left:12px;background:rgba(44,24,16,0.85);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#F5EDD9;z-index:1;font-family:-apple-system,sans-serif}
.room-emoji{font-size:56px;position:relative;z-index:1}
.room-body{padding:14px}
.room-name{font-size:20px;font-weight:700;color:#2C1810;margin-bottom:3px;font-family:Georgia,serif}
.room-sub{font-size:12px;color:#8B6F47;margin-bottom:10px;font-style:italic}
.room-text{font-size:14px;color:#3D2010;line-height:1.8;max-height:84px;overflow:hidden;transition:max-height .3s}
.room-text.open{max-height:800px}
.read-more{background:transparent;border:none;color:#A0522D;font-size:12px;cursor:pointer;margin-top:6px;padding:0;min-height:34px;display:block;font-family:-apple-system,sans-serif}

/* PLAYER */
.player{background:#EDE0C4;border-radius:14px;padding:14px;margin-bottom:14px;border:1.5px solid #C4A882;box-shadow:0 2px 6px rgba(106,58,31,0.08)}
.player-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.p-icon{width:42px;height:42px;border-radius:50%;background:#A0522D;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.p-meta{flex:1;min-width:0}
.p-name{font-size:13px;font-weight:600;color:#2C1810;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:Georgia,serif}
.p-lang{font-size:11px;color:#8B6F47;margin-top:2px;font-family:-apple-system,sans-serif}

/* PROGRESS */
.prog-wrap{margin-bottom:12px}
.prog-bg{height:5px;background:#D4B896;border-radius:3px;cursor:pointer;position:relative;margin-bottom:6px}
.prog-fill{height:5px;background:#A0522D;border-radius:3px;width:0%;position:relative}
.prog-dot{width:14px;height:14px;background:#6B3A1F;border-radius:50%;position:absolute;right:-7px;top:-4.5px;box-shadow:0 0 0 3px rgba(160,82,45,0.25)}
.time-row{display:flex;justify-content:space-between;font-size:11px;color:#8B6F47;font-family:-apple-system,sans-serif}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:12px}
.cbtn{background:transparent;border:none;cursor:pointer;color:#8B6F47;font-size:26px;padding:10px;border-radius:50%;min-width:52px;min-height:52px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cbtn:active{background:rgba(160,82,45,0.15);color:#A0522D}
.play-btn{width:64px;height:64px;background:#A0522D;border-radius:50%;border:none;cursor:pointer;color:#FDFAF5;font-size:24px;display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:0 3px 10px rgba(160,82,45,0.4)}
.play-btn:active{background:#6B3A1F;transform:scale(0.96)}

/* SPEAKING BADGE */
.speak-badge{display:none;align-items:center;gap:7px;background:rgba(160,82,45,0.12);border-radius:8px;padding:6px 12px;font-size:12px;color:#A0522D;font-family:-apple-system,sans-serif}
.speak-badge.on{display:flex}
.dot1,.dot2,.dot3{width:5px;height:5px;background:#A0522D;border-radius:50%;animation:bop 1.2s infinite}
.dot2{animation-delay:.2s}.dot3{animation-delay:.4s}
@keyframes bop{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.2)}}

/* NAV */
.nav-row{display:flex;gap:10px}
.nbtn{flex:1;padding:14px;border-radius:12px;border:1.5px solid #C4A882;background:#EDE0C4;color:#6B3A1F;font-size:14px;font-weight:600;cursor:pointer;min-height:50px;transition:all .15s;font-family:-apple-system,sans-serif}
.nbtn:active{background:#D4B896}
.nbtn.nxt{background:#A0522D;border-color:#A0522D;color:#FDFAF5}
.nbtn.nxt:active{background:#6B3A1F}
.nbtn:disabled{opacity:.35;cursor:default}

/* PIN SCREEN */
#pinScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#F5EDD9;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.pin-castle{font-size:64px;margin-bottom:16px}
.pin-title{font-size:13px;font-weight:700;color:#6B3A1F;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px;font-family:-apple-system,sans-serif}
.pin-sub{font-size:13px;color:#8B6F47;margin-bottom:40px;text-align:center;font-family:-apple-system,sans-serif}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #C4A882;background:transparent;transition:all .2s}
.pin-dot.filled{background:#A0522D;border-color:#A0522D}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:260px}
.pin-btn{height:72px;border-radius:14px;border:1.5px solid #C4A882;background:#EDE0C4;color:#2C1810;font-size:24px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif}
.pin-btn:active{background:#A0522D;border-color:#A0522D;color:#FDFAF5;transform:scale(0.95)}
.pin-btn.del{font-size:18px;color:#8B6F47}
.pin-btn.empty{border:none;background:transparent;cursor:default}
.pin-error{color:#8B1A00;font-size:13px;margin-top:16px;opacity:0;transition:opacity .3s;font-family:-apple-system,sans-serif}
.pin-error.on{opacity:1}
</style>
</head>
<body>

<div id="pinScreen">
  <div class="pin-castle">🏰</div>
  <div class="pin-title">Schloss Mespelbrunn</div>
  <div class="pin-sub">Audio Guide &mdash; Enter access code</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinKey('1')">1</button>
    <button class="pin-btn" onclick="pinKey('2')">2</button>
    <button class="pin-btn" onclick="pinKey('3')">3</button>
    <button class="pin-btn" onclick="pinKey('4')">4</button>
    <button class="pin-btn" onclick="pinKey('5')">5</button>
    <button class="pin-btn" onclick="pinKey('6')">6</button>
    <button class="pin-btn" onclick="pinKey('7')">7</button>
    <button class="pin-btn" onclick="pinKey('8')">8</button>
    <button class="pin-btn" onclick="pinKey('9')">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pinKey('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">&#9003;</button>
  </div>
  <div class="pin-error" id="pinError">Incorrect code &mdash; please try again</div>
</div>

<div class="hdr">
  <div class="hdr-top">
    <span class="castle-lbl">&#127984; Schloss Mespelbrunn</span>
  </div>
  <div class="lang-row" id="langs"></div>
  <div class="room-grid" id="roomGrid"></div>
</div>

<div class="body" id="mainBody">
  <div class="tip"><span style="font-size:16px;flex-shrink:0">&#128161;</span><span id="tipText"></span></div>
  <div class="room-hero">
    <div class="room-img">
      <div class="room-badge" id="roomBadge">Room 1</div>
      <img id="heroImg" src="" alt="Schloss Mespelbrunn" style="display:none">
      <div class="room-emoji" id="roomEmoji"></div>
    </div>
    <div class="room-body">
      <div class="room-name" id="roomName"></div>
      <div class="room-sub" id="roomSub"></div>
      <div class="room-text" id="roomText"></div>
      <button class="read-more" id="readMoreBtn" onclick="toggleText()">Read more &#9660;</button>
    </div>
  </div>
  <div class="player">
    <div class="player-top">
      <div class="p-icon">&#127911;</div>
      <div class="p-meta">
        <div class="p-name" id="pName"></div>
        <div class="p-lang" id="pLang"></div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bg" id="progBg">
        <div class="prog-fill" id="progFill"><div class="prog-dot"></div></div>
      </div>
      <div class="time-row"><span id="elapsed">0:00</span><span id="totalTime">0:00</span></div>
    </div>
    <div class="controls">
      <button class="cbtn" onclick="skip(-15)">&#9194;</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">&#9654;</button>
      <button class="cbtn" onclick="skip(15)">&#9193;</button>
    </div>
    <div class="speak-badge" id="speakBadge">
      <div class="dot1"></div><div class="dot2"></div><div class="dot3"></div>
      <span id="speakLbl">Speaking...</span>
    </div>
  </div>
  <div class="nav-row">
    <button class="nbtn" id="prevBtn" onclick="goRoom(cur-1)">&#8592; Previous</button>
    <button class="nbtn nxt" id="nextBtn" onclick="goRoom(cur+1)">Next room &#8594;</button>
  </div>
</div>

const rooms = [{"id": 1, "icon": "🌳", "key": "einführung", "names": {"en": "Welcome", "fr": "Bienvenue", "es": "Bienvenida", "it": "Benvenuto", "ja": "ようこそ", "zh": "欢迎"}, "subs": {"en": "Introduction under the oak", "fr": "Introduction sous le chêne", "es": "Introducción bajo el roble", "it": "Introduzione sotto la quercia", "ja": "樫の木の下で", "zh": "橡树下的欢迎词"}, "tips": {"en": "No photos in the upper rooms — the family still lives here.", "fr": "Pas de photos dans les salles supérieures — la famille y vit encore.", "es": "No se permiten fotos arriba — la familia sigue viviendo aquí.", "it": "Niente foto nelle sale superiori — la famiglia vive ancora qui.", "ja": "上の部屋は撮影禁止——家族が今も暮らしています。", "zh": "上层房间禁止拍照——家族至今仍居住于此。"}, "texts": {"en": "Welcome to Schloss Mespelbrunn — one of the most beautiful water castles in Germany, and one of the very few still lived in by the family that built it. Before we go inside together, a few things to keep in mind: no photographs in the upper rooms, please don't touch anything, and bags and backpacks can be left downstairs. What makes this place so special is exactly what you are about to experience: the family has kept the rooms as they were always used. This is not a museum. This is a home — with 600 years of history still very much alive within its walls.", "fr": "Bienvenue au château de Mespelbrunn — l'un des plus beaux châteaux d'eau d'Allemagne, et l'un des rares encore habités par la famille qui l'a construit. Avant d'entrer ensemble, quelques consignes : pas de photos dans les salles du haut, ne touchez à rien, et vous pouvez laisser sacs et bagages en bas. Ce qui rend cet endroit si particulier, c'est précisément ce que vous allez découvrir : la famille a conservé les pièces telles qu'elles ont toujours été utilisées. Ce n'est pas un musée. C'est une demeure — avec 600 ans d'histoire toujours bien vivante entre ses murs.", "es": "Bienvenidos al Castillo de Mespelbrunn — uno de los castillos de agua más hermosos de Alemania, y uno de los pocos que todavía habita la familia que lo construyó. Antes de entrar juntos, algunas indicaciones: no se permiten fotos en las salas superiores, por favor no toquen nada, y las bolsas y mochilas pueden dejarse abajo. Lo que hace especial este lugar es precisamente lo que van a descubrir: la familia ha conservado las habitaciones tal y como siempre se usaron. Esto no es un museo. Es un hogar — con 600 años de historia todavía muy viva entre sus muros.", "it": "Benvenuti al Castello di Mespelbrunn — uno dei più bei castelli d'acqua della Germania, e uno dei pochi ancora abitati dalla famiglia che lo ha costruito. Prima di entrare insieme, alcune indicazioni: niente foto nelle sale superiori, si prega di non toccare nulla, e borse e zaini possono essere lasciati al piano di sotto. Ciò che rende questo posto così speciale è esattamente ciò che state per scoprire: la famiglia ha mantenuto le stanze così come sono sempre state utilizzate. Questo non è un museo. È una casa — con 600 anni di storia ancora vivi tra le sue mura.", "ja": "メスペルブルン城へようこそ——ドイツで最も美しい水城の一つであり、建設した家族が今も暮らす数少ない城です。中に入る前に、いくつかご注意を：上の部屋での写真撮影はご遠慮ください。何も触れないでください。バッグやリュックサックは下に置いておけます。この場所がとても特別な理由は、まさにこれから体験されることの中にあります。家族は部屋をずっと使われてきたままの状態に保っています。ここは博物館ではありません。600年の歴史が今もその壁の中に生き続けている家です。", "zh": "欢迎来到梅斯佩尔布伦城堡——德国最美丽的水城之一，也是极少数至今仍由建造者家族居住的城堡。在我们一同入内之前，有几点需要注意：上层房间请勿拍照，请不要触摸任何物品，包包和背包可以放在楼下。让这个地方如此特别的，正是您即将体验到的：家族保留了房间一直以来的使用状态。这里不是博物馆，而是一个家——600年的历史在这四墙之间依然鲜活。"}}, {"id": 2, "icon": "⚔️", "key": "rittersaal", "names": {"en": "Knights' Hall", "fr": "Salle des Chevaliers", "es": "Sala de los Caballeros", "it": "Sala dei Cavalieri", "ja": "騎士の間", "zh": "骑士大厅"}, "subs": {"en": "Over 600 years of one family's story", "fr": "Plus de 600 ans d'histoire familiale", "es": "Más de 600 años de historia familiar", "it": "Oltre 600 anni di storia di una famiglia", "ja": "600年以上にわたる一族の物語", "zh": "一个家族600余年的历史"}, "tips": {"en": "Photography is still permitted here — but not in the upper rooms.", "fr": "La photographie est encore autorisée ici — mais pas dans les salles supérieures.", "es": "La fotografía todavía está permitida aquí — pero no en las salas superiores.", "it": "La fotografia è ancora consentita qui — ma non nelle sale superiori.", "ja": "ここではまだ写真撮影が可能です——しかし上の部屋では撮影できません。", "zh": "这里仍允许拍照——但上层房间不允许。"}, "texts": {"en": "The story begins on the 1st of May 1412, when a man named Haman Echter received this land as a gift from his lord — the Elector of Mainz — in return for exceptional service. He built a small water castle here beside a stream, and a chapel beside it. That was over 600 years ago. The Knights' Hall is the largest room in the castle, and if you look around, you will notice something unusual: there is not a single stove or fireplace. For centuries, this room was deliberately left unheated — used for Mass, hunting feasts, great balls, and even court hearings. The red sandstone columns, the carved ceiling, the coats of arms in the windows — all original Renaissance craftsmanship from the 16th century. The male Echter line died out in 1665. But the family name was saved: with imperial permission, the last Echter heiress, Maria Ottilia, united her name with that of her husband, Philipp Ludwig von Ingelheim. The family who owns this castle today still carries both names.", "fr": "L'histoire commence le 1er mai 1412, quand un homme nommé Haman Echter reçut ces terres en cadeau de son seigneur — l'électeur de Mayence — en récompense de services exceptionnels. Il y construisit un petit château d'eau au bord d'un ruisseau, avec une chapelle à côté. C'était il y a plus de 600 ans. La Salle des Chevaliers est la plus grande pièce du château, et si vous regardez autour de vous, vous remarquerez quelque chose d'inhabituel : pas un seul poêle ni une seule cheminée. Pendant des siècles, cette salle fut délibérément laissée sans chauffage — utilisée pour la messe, les grandes fêtes de chasse, les bals et même les audiences. Les colonnes en grès rouge, le plafond sculpté, les armoiries dans les fenêtres — tout cela est de l'artisanat Renaissance original du XVIe siècle.", "es": "La historia comienza el 1 de mayo de 1412, cuando un hombre llamado Haman Echter recibió estas tierras como regalo de su señor — el elector de Maguncia — a cambio de servicios excepcionales. Construyó aquí un pequeño castillo de agua junto a un arroyo, y una capilla al lado. Eso fue hace más de 600 años. La Sala de los Caballeros es la habitación más grande del castillo, y si miran a su alrededor, notarán algo inusual: no hay ni una sola estufa ni chimenea. Durante siglos, esta sala se dejó deliberadamente sin calefacción — se utilizaba para la misa, grandes fiestas de caza, bailes e incluso audiencias judiciales. Las columnas de arenisca roja, el techo tallado, los escudos en las ventanas — todo artesanía renacentista original del siglo XVI.", "it": "La storia inizia il 1° maggio 1412, quando un uomo di nome Haman Echter ricevette queste terre in dono dal suo signore — l'elettore di Magonza — in cambio di servizi eccezionali. Costruì qui un piccolo castello d'acqua vicino a un ruscello, con una cappella accanto. Era oltre 600 anni fa. La Sala dei Cavalieri è la stanza più grande del castello, e guardandosi intorno noterete qualcosa di insolito: non c'è né una stufa né un camino. Per secoli, questa sala fu deliberatamente lasciata senza riscaldamento — usata per la messa, grandi feste di caccia, balli e persino udienze. Le colonne in arenaria rossa, il soffitto intagliato, gli stemmi nelle finestre — tutto artigianato rinascimentale originale del XVI secolo.", "ja": "物語は1412年5月1日に始まります。ハマン・エヒターという人物が、卓越した功績に対する報酬として、主君であるマインツ選帝侯からこの土地を贈り物として受け取りました。彼は小川のほとりに小さな水城と礼拝堂を建てました。それは600年以上前のことです。騎士の間は城の中で最大の部屋ですが、周りを見渡すと、不思議なことに気づきます。ストーブも暖炉も一つもないのです。何世紀もの間、この部屋は意図的に暖房なしで使用されていました——ミサ、大狩猟祭り、舞踏会、さらには法廷審問にも使われていました。赤砂岩の柱、彫刻された天井、窓の紋章——すべて16世紀ルネサンスのオリジナル工芸品です。", "zh": "故事始于1412年5月1日，一个名叫哈曼·埃克特的人因其杰出的服务，从美因茨选帝侯那里收到了这片土地作为礼物。他在溪边建造了一座小水城和一座礼拜堂。那是600多年前的事了。骑士大厅是城堡中最大的房间，环顾四周，您会发现一件不寻常的事：这里既没有炉子也没有壁炉。几个世纪以来，这个房间被刻意保持无暖气状态——用于弥撒、盛大狩猎节、舞会，甚至法庭听证。红色砂岩柱、雕刻天花板、窗上的纹章——都是16世纪文艺复兴时期的原始工艺品。"}}, {"id": 3, "icon": "⛪", "key": "kapelle", "names": {"en": "Chapel", "fr": "Chapelle", "es": "Capilla", "it": "Cappella", "ja": "礼拝堂", "zh": "礼拜堂"}, "subs": {"en": "Baptisms, weddings & 600 years of faith", "fr": "Baptêmes, mariages & 600 ans de foi", "es": "Bautizos, bodas y 600 años de fe", "it": "Battesimi, matrimoni e 600 anni di fede", "ja": "洗礼、結婚、600年の信仰", "zh": "洗礼、婚礼与600年的信仰"}, "tips": {"en": "Julius Echter was baptised here on 18 March 1545 — he later founded the University of Würzburg.", "fr": "Julius Echter fut baptisé ici le 18 mars 1545 — il fonda plus tard l'Université de Würzburg.", "es": "Julius Echter fue bautizado aquí el 18 de marzo de 1545 — más tarde fundó la Universidad de Wurzburgo.", "it": "Julius Echter fu battezzato qui il 18 marzo 1545 — fondò in seguito l'Università di Würzburg.", "ja": "ユリウス・エヒターは1545年3月18日にここで洗礼を受けました——後にヴュルツブルク大学を設立しました。", "zh": "尤利乌斯·埃克特于1545年3月18日在此受洗——后来创立了维尔茨堡大学。"}, "texts": {"en": "The chapel is the oldest part of the castle — older even than the Renaissance building you have just walked through. It was here that generations of Echter children were baptised, and couples married. Including a boy named Julius, born on the 18th of March 1545, baptised right here in this small, quiet room. He would grow up to become Prince-Bishop of Würzburg — one of the most powerful figures of the Counter-Reformation, founder of Würzburg University, builder of over 300 churches. But on that March morning in 1545, he was just a newborn in this chapel. The alabaster altar dates from around 1600. The late Gothic vaulted ceiling above you is one of the oldest surviving elements of the entire castle. Sunday Mass was still held here until 1976.", "fr": "La chapelle est la partie la plus ancienne du château — plus ancienne encore que le bâtiment Renaissance que vous venez de traverser. C'est ici que des générations d'enfants Echter furent baptisés, et des couples mariés. Dont un garçon prénommé Julius, né le 18 mars 1545, baptisé ici même dans cette petite pièce silencieuse. Il deviendrait prince-évêque de Würzburg — l'une des figures les plus puissantes de la Contre-Réforme, fondateur de l'université de Würzburg, bâtisseur de plus de 300 églises. Mais ce matin de mars 1545, il n'était qu'un nouveau-né dans cette chapelle. L'autel en albâtre date d'environ 1600. La messe du dimanche y était encore célébrée jusqu'en 1976.", "es": "La capilla es la parte más antigua del castillo — más antigua incluso que el edificio renacentista por el que acaban de pasar. Aquí se bautizaron generaciones de niños Echter y se casaron parejas. Entre ellos, un niño llamado Julius, nacido el 18 de marzo de 1545, bautizado aquí mismo en esta pequeña y silenciosa sala. Se convertiría en príncipe-obispo de Wurzburgo — una de las figuras más poderosas de la Contrarreforma, fundador de la Universidad de Wurzburgo y constructor de más de 300 iglesias. Pero aquella mañana de marzo de 1545, era simplemente un recién nacido en esta capilla. El altar de alabastro data de alrededor de 1600. La misa dominical se celebró aquí hasta 1976.", "it": "La cappella è la parte più antica del castello — più antica persino dell'edificio rinascimentale che avete appena attraversato. È qui che generazioni di bambini Echter furono battezzati, e coppie sposate. Tra cui un bambino di nome Julius, nato il 18 marzo 1545, battezzato proprio qui in questa piccola e silenziosa stanza. Sarebbe diventato principe-vescovo di Würzburg — una delle figure più potenti della Controriforma, fondatore dell'Università di Würzburg, costruttore di oltre 300 chiese. Ma quella mattina di marzo del 1545, era solo un neonato in questa cappella. L'altare in alabastro risale a circa il 1600. La messa domenicale vi fu celebrata fino al 1976.", "ja": "礼拝堂は城の最も古い部分です——今通ってきたルネサンスの建物よりもさらに古いのです。エヒター家の子供たちが何世代にもわたってここで洗礼を受け、カップルが結婚しました。1545年3月18日に生まれたユリウスという少年も、まさにこの小さく静かな部屋で洗礼を受けました。彼はヴュルツブルクの司教に成長し、宗教改革への反動運動の最も重要な人物の一人となり、ヴュルツブルク大学を設立し、300以上の教会を建設しました。しかし1545年3月のその朝、彼はこの礼拝堂の新生児に過ぎませんでした。日曜日のミサは1976年までここで行われていました。", "zh": "礼拜堂是城堡中最古老的部分——甚至比您刚刚走过的文艺复兴时期建筑还要古老。几代埃克特家族的孩子在这里受洗，夫妇在这里成婚。其中包括一个名叫尤利乌斯的男孩，生于1545年3月18日，就在这个小而宁静的房间里受洗。他后来成为维尔茨堡主教——反宗教改革运动中最有影响力的人物之一，维尔茨堡大学的创建者，300多座教堂的建造者。但在1545年3月的那个早晨，他只是这座礼拜堂里的一个新生儿。周日弥撒在这里一直举行到1976年。"}}, {"id": 4, "icon": "🏯", "key": "hof", "names": {"en": "Courtyard & Main Portal", "fr": "Cour & Portail Principal", "es": "Patio y Portal Principal", "it": "Cortile e Portale Principale", "ja": "中庭と正門", "zh": "内院与正门"}, "subs": {"en": "The tower, the founders & their promise", "fr": "La tour, les fondateurs & leur promesse", "es": "La torre, los fundadores y su promesa", "it": "La torre, i fondatori e la loro promessa", "ja": "塔、創設者たち、そして誓い", "zh": "塔楼、创始人与他们的誓言"}, "tips": {"en": "The tower is 30 metres tall with walls two metres thick — and it was never conquered.", "fr": "La tour mesure 30 mètres de haut avec des murs de deux mètres d'épaisseur — et elle ne fut jamais conquise.", "es": "La torre tiene 30 metros de altura con muros de dos metros de grosor — y nunca fue conquistada.", "it": "La torre è alta 30 metri con mura spesse due metri — e non fu mai conquistata.", "ja": "塔は高さ30メートル、壁の厚さは2メートル——そして一度も攻め落とされたことがありません。", "zh": "塔楼高30米，墙厚两米——从未被攻克。"}, "texts": {"en": "Step out here and take a moment to look around. This courtyard has barely changed since the 16th century. The castle you see — reflected in the moat, surrounded by forest on all sides — is one of the most intact Renaissance castles in Germany. It survived every war because nobody could find it. Hidden in this valley, away from roads and cities, it was simply overlooked — again and again. The tower to your left is the oldest part of the estate, built around 1412. Its walls are two metres thick at the base. And above the main portal — look carefully — you can see the faces of the people who built all of this: Peter Echter III and his wife Gertraud. Carved in stone, with the year 1569 above them. And their motto, still legible: 'With faithful love and constant loyalty, we built this house for those who follow us.'", "fr": "Sortez ici et prenez un moment pour regarder autour de vous. Cette cour n'a pratiquement pas changé depuis le XVIe siècle. Le château que vous voyez — reflété dans les douves, entouré de forêt de tous côtés — est l'un des châteaux Renaissance les mieux préservés d'Allemagne. Il a survécu à toutes les guerres parce que personne ne pouvait le trouver. Caché dans cette vallée, loin des routes et des villes, il fut tout simplement ignoré — encore et encore. La tour à votre gauche est la partie la plus ancienne du domaine, construite vers 1412. Ses murs ont deux mètres d'épaisseur à la base. Et au-dessus du portail principal, regardez attentivement — vous pouvez voir les visages de ceux qui ont tout construit : Pierre Echter III et sa femme Gertraud. Sculptés dans la pierre, avec l'année 1569 au-dessus d'eux.", "es": "Salgan aquí y tómense un momento para mirar a su alrededor. Este patio apenas ha cambiado desde el siglo XVI. El castillo que ven — reflejado en el foso, rodeado de bosque por todos lados — es uno de los castillos renacentistas mejor conservados de Alemania. Sobrevivió a todas las guerras porque nadie podía encontrarlo. Escondido en este valle, lejos de caminos y ciudades, simplemente fue ignorado — una y otra vez. La torre a su izquierda es la parte más antigua de la finca, construida alrededor de 1412. Sus muros tienen dos metros de grosor en la base. Y sobre el portal principal — miren con atención — pueden ver los rostros de quienes construyeron todo esto: Pedro Echter III y su esposa Gertraud.", "it": "Uscite qui e prendetevi un momento per guardarvi intorno. Questo cortile è cambiato a malapena dal XVI secolo. Il castello che vedete — riflesso nel fossato, circondato da boschi su tutti i lati — è uno dei castelli rinascimentali meglio conservati della Germania. È sopravvissuto a tutte le guerre perché nessuno riusciva a trovarlo. Nascosto in questa valle, lontano da strade e città, veniva semplicemente ignorato — ancora e ancora. La torre alla vostra sinistra è la parte più antica della tenuta, costruita intorno al 1412. Le sue mura hanno due metri di spessore alla base. E sopra il portale principale — guardate attentamente — potete vedere i volti di coloro che hanno costruito tutto questo: Pietro Echter III e sua moglie Gertraud.", "ja": "外に出て、周りを見渡す時間を取ってください。この中庭は16世紀からほとんど変わっていません。堀に映り、四方を森に囲まれたこの城は、ドイツで最も保存状態の良いルネサンス城の一つです。この城が全ての戦争を生き延びた理由は、誰にも見つけられなかったからです。道路や都市から離れたこの谷に隠れて、何度も何度も見過ごされたのです。左の塔は1412年頃に建てられた、この屋敷で最も古い部分です。基部の壁の厚さは2メートルあります。そして正門の上をよく見ると、これを全て建てた人物の顔が見えます：ペーター・エヒター3世と妻ゲルトラウト。石に刻まれ、上に1569年の年号が。", "zh": "走出来，花点时间环顾四周。这座内院自16世纪以来几乎没有变化。您所看到的城堡——倒映在护城河中，四面被森林环绕——是德国保存最完好的文艺复兴时期城堡之一。它在每一场战争中都幸存下来，因为没有人能找到它。隐藏在这个山谷中，远离道路和城市，一次又一次地被人忽略。左边的塔楼是庄园最古老的部分，建于1412年前后。基部墙厚两米。正门上方——仔细看——您可以看到建造这一切的人的面孔：彼得·埃克特三世和他的妻子格特鲁德。刻在石头上，上方是1569年。"}}, {"id": 5, "icon": "🍽️", "key": "speisesaal", "names": {"en": "Dining Hall", "fr": "Grande Salle à Manger", "es": "Gran Comedor", "it": "Grande Sala da Pranzo", "ja": "大食堂", "zh": "大餐厅"}, "subs": {"en": "Porcelain, weapons & a room still in use", "fr": "Porcelaine, armes & une salle encore en usage", "es": "Porcelana, armas y una sala aún en uso", "it": "Porcellana, armi e una sala ancora in uso", "ja": "陶磁器、武器、そして今も使われる部屋", "zh": "瓷器、武器与仍在使用的房间"}, "tips": {"en": "The grandfather clock is from 18th-century Amsterdam. It still keeps time.", "fr": "L'horloge de parquet vient d'Amsterdam du XVIIIe siècle. Elle fonctionne encore.", "es": "El reloj de caja es de Amsterdam del siglo XVIII. Todavía marca la hora.", "it": "L'orologio a pendolo viene dalla Amsterdam del XVIII secolo. Funziona ancora.", "ja": "柱時計は18世紀のアムステルダム製で、今も時を刻んでいます。", "zh": "落地大钟来自18世纪的阿姆斯特丹，至今仍在走动。"}, "texts": {"en": "This is the great dining hall — and unlike most things you will see today, it is still used. The family gathers here for celebrations, just as they always have. The wooden ceiling with its carved rosettes dates from the 18th century. The cabinet holds porcelain from across the world: Chinese and Japanese pieces, Old Vienna, and Nymphenburg plates painted by Countess Marie Antoinette herself — showing the family's estates west of the Rhine, lost during the Napoleonic Wars. Look across the room at the weapons collection: hunting crossbows inlaid with ivory, duelling pistols, powder horns, and along the far wall, a musket from the early Thirty Years' War. Loading it took two men, a stand, and considerable courage. 'Das geht nach hinten los' — 'that will backfire' — is a German expression that quite literally comes from these weapons.", "fr": "Voici la grande salle à manger — et contrairement à la plupart des choses que vous allez voir aujourd'hui, elle est encore utilisée. La famille s'y retrouve pour les célébrations, comme elle l'a toujours fait. Le plafond en bois avec ses rosaces sculptées date du XVIIIe siècle. L'armoire contient de la porcelaine du monde entier : pièces chinoises et japonaises, Vieux-Vienne, et assiettes de Nymphenburg peintes par la comtesse Marie Antoinette elle-même. Regardez de l'autre côté de la salle la collection d'armes : arbalètes de chasse incrustées d'ivoire, pistolets de duel, cornes à poudre, et le long du mur du fond, un mousquet du début de la Guerre de Trente Ans.", "es": "Este es el gran comedor — y a diferencia de la mayoría de las cosas que van a ver hoy, todavía se utiliza. La familia se reúne aquí para celebraciones, como siempre ha sido. El techo de madera con sus rosetas talladas data del siglo XVIII. El armario alberga porcelana de todo el mundo: piezas chinas y japonesas, Viena Antigua, y platos de Nymphenburg pintados por la propia condesa María Antonieta. Miren al otro lado de la sala la colección de armas: ballestas de caza incrustadas de marfil, pistolas de duelo, cuernos de pólvora y, a lo largo de la pared del fondo, un mosquete de principios de la Guerra de los Treinta Años.", "it": "Questa è la grande sala da pranzo — e a differenza della maggior parte delle cose che vedrete oggi, è ancora in uso. La famiglia si riunisce qui per le celebrazioni, come ha sempre fatto. Il soffitto in legno con le sue rosette intagliate risale al XVIII secolo. L'armadio contiene porcellane da tutto il mondo: pezzi cinesi e giapponesi, Vecchia Vienna, e piatti di Nymphenburg dipinti dalla contessa Marie Antoinette stessa. Guardate dall'altra parte della sala la collezione di armi: balestre da caccia intarsiate d'avorio, pistole da duello, corni da polvere, e lungo la parete di fondo, un moschetto degli inizi della Guerra dei Trent'anni.", "ja": "これが大食堂です——そして今日ご覧になるほとんどのものとは違い、今も使われています。家族はここでお祝い事に集まります。昔からずっとそうしてきたように。彫られたバラ飾りのある木製天井は18世紀のものです。キャビネットには世界中の陶磁器が並んでいます：中国・日本製の品々、オールド・ウィーン、そして伯爵夫人マリー・アントワーネット自身が描いたニンフェンブルクの皿。部屋の向こう側に武器コレクションが見えます：象牙象嵌の狩猟用クロスボウ、決闘用ピストル、火薬入れ、そして向こうの壁沿いに三十年戦争初期の先込め銃。", "zh": "这是大餐厅——与您今天将看到的大多数东西不同，这里至今仍在使用。家族在这里举行庆典聚会，一直如此。带有雕刻玫瑰花饰的木质天花板可追溯至18世纪。橱柜里陈列着来自世界各地的瓷器：中国和日本器皿、老维也纳，以及伯爵夫人玛丽·安托瓦内特亲手彩绘的宁芬堡餐盘。看看房间另一侧的武器收藏：镶嵌象牙的狩猎弩、决斗手枪、火药角，还有沿远墙陈列的三十年战争初期的火枪。"}}, {"id": 6, "icon": "🖼️", "key": "ahnensaal", "names": {"en": "Hall of Ancestors", "fr": "Galerie des Ancêtres", "es": "Galería de los Antepasados", "it": "Galleria degli Antenati", "ja": "先祖の広間", "zh": "祖先长廊"}, "subs": {"en": "Portraits from the 17th to 19th century", "fr": "Portraits du XVIIe au XIXe siècle", "es": "Retratos del siglo XVII al XIX", "it": "Ritratti dal XVII al XIX secolo", "ja": "17世紀から19世紀の肖像画", "zh": "17至19世纪的肖像画"}, "tips": {"en": "The Brothers Grimm signed a guest book of this family — look for their reference on the wall.", "fr": "Les frères Grimm ont signé un livre d'or de cette famille — cherchez leur référence sur le mur.", "es": "Los hermanos Grimm firmaron un libro de visitas de esta familia.", "it": "I fratelli Grimm firmarono un libro degli ospiti di questa famiglia.", "ja": "グリム兄弟がこの家族のゲストブックにサインしました。", "zh": "格林兄弟曾在这个家族的来宾签名册上签名。"}, "texts": {"en": "Read the room from left to right, and you are reading two centuries of one family's history — from the 17th century to the early 19th. Each portrait is a generation. In noble families of this era, the estate passed always to the eldest son, and so it is eldest sons and their wives you see here, one after another. The woman above the red sofa is Maria Ottilia — the last of the Echter line — whose marriage to Philipp Ludwig von Ingelheim in 1648 saved this castle for the family it has today. Further along, Countess Marie Antoinette — a remarkable woman who painted the porcelain plates you saw downstairs, hosted poets and artists, and counted among her friends both Clemens von Brentano and the Brothers Grimm. The crystal chandelier above you is Murano glass, from Venice. The tiled stove in the corner, Nuremberg craftsmanship, still heats this room on cold winter evenings.", "fr": "Lisez la salle de gauche à droite, et vous lisez deux siècles d'histoire d'une famille — du XVIIe siècle au début du XIXe. Chaque portrait est une génération. Dans les familles nobles de cette époque, le domaine passait toujours au fils aîné, et c'est donc des fils aînés et leurs épouses que vous voyez ici, l'un après l'autre. La femme au-dessus du sofa rouge est Maria Ottilia — la dernière de la lignée Echter — dont le mariage avec Philipp Ludwig von Ingelheim en 1648 a sauvé ce château pour la famille qu'il a aujourd'hui. Plus loin, la comtesse Marie Antoinette — une femme remarquable qui peignit les assiettes en porcelaine que vous avez vues en bas, accueillit poètes et artistes, et comptait parmi ses amis Clemens von Brentano et les frères Grimm.", "es": "Lean la sala de izquierda a derecha, y estarán leyendo dos siglos de historia de una familia — desde el siglo XVII hasta principios del XIX. Cada retrato es una generación. En las familias nobles de esta época, la finca pasaba siempre al hijo mayor, y es por eso que ven aquí hijos mayores y sus esposas, uno tras otro. La mujer sobre el sofá rojo es Maria Ottilia — la última de la línea Echter — cuyo matrimonio con Philipp Ludwig von Ingelheim en 1648 salvó este castillo para la familia que tiene hoy. Más adelante, la condesa Marie Antoinette — una mujer notable que pintó los platos de porcelana que vieron abajo, acogió a poetas y artistas, y contó entre sus amigos a Clemens von Brentano y a los hermanos Grimm.", "it": "Leggete la stanza da sinistra a destra, e state leggendo due secoli di storia di una famiglia — dal XVII secolo all'inizio del XIX. Ogni ritratto è una generazione. Nelle famiglie nobili di quest'epoca, la tenuta passava sempre al figlio maggiore, ed è quindi figli maggiori e le loro mogli che vedete qui, uno dopo l'altro. La donna sopra il divano rosso è Maria Ottilia — l'ultima della stirpe Echter — il cui matrimonio con Philipp Ludwig von Ingelheim nel 1648 salvò questo castello per la famiglia che ha oggi. Più avanti, la contessa Marie Antoinette — una donna straordinaria che dipinse i piatti in porcellana che avete visto al piano di sotto, ospitò poeti e artisti, e annoverò tra i suoi amici Clemens von Brentano e i fratelli Grimm.", "ja": "部屋を左から右へと読むと、一つの家族の2世紀にわたる歴史を読むことになります——17世紀から19世紀初頭まで。各肖像画が一世代を表しています。この時代の貴族家族では、財産は常に長男に受け継がれていたため、ここに見るのは次々と続く長男たちと妻たちです。赤いソファの上の女性はマリア・オティリア——エヒター家の最後の血筋——で、1648年にフィリップ・ルートヴィヒ・フォン・インゲルハイムと結婚し、この城を現在の家族のために守りました。さらに進むと、伯爵夫人マリー・アントワーネット——下に見た磁器の皿を描き、詩人や芸術家を迎え入れ、クレメンス・フォン・ブレンターノとグリム兄弟を友人に持つ非凡な女性の姿があります。", "zh": "从左到右阅读这个房间，您读到的是一个家族两个世纪的历史——从17世纪到19世纪初。每幅画像代表一代人。在这个时代的贵族家庭中，庄园总是传给长子，所以您在这里看到的都是长子和他们的妻子，一代接一代。红色沙发上方的女性是玛丽亚·奥蒂利亚——埃克特血脉的最后一人——她于1648年与菲利普·路德维希·冯·英格尔海姆的婚姻，为这座城堡今天的家族所有权奠定了基础。再往前是伯爵夫人玛丽·安托瓦内特——一位非凡的女性，她绘制了楼下的瓷盘，接待了诗人和艺术家，并与克莱门斯·冯·布伦塔诺和格林兄弟为友。"}}, {"id": 7, "icon": "👑", "key": "echter-zimmer", "names": {"en": "Echter Room", "fr": "Chambre Echter", "es": "Habitación Echter", "it": "Camera Echter", "ja": "エヒター室", "zh": "埃克特室"}, "subs": {"en": "Julius Echter — the most important son of this family", "fr": "Julius Echter — le fils le plus important de cette famille", "es": "Julius Echter — el hijo más importante de esta familia", "it": "Julius Echter — il figlio più importante di questa famiglia", "ja": "ユリウス・エヒター——この家族で最も重要な息子", "zh": "尤利乌斯·埃克特——这个家族最重要的儿子"}, "tips": {"en": "His portrait appears on the Würzburg Residenz, on coins, on churches — you will see his face across all of Franconia.", "fr": "Son portrait figure sur la Résidence de Würzburg, sur des pièces de monnaie, sur des églises — vous verrez son visage dans toute la Franconie.", "es": "Su retrato aparece en la Residencia de Wurzburgo, en monedas, en iglesias — verán su cara por toda Franconia.", "it": "Il suo ritratto appare sulla Residenza di Würzburg, su monete, su chiese — vedrete il suo volto in tutta la Franconia.", "ja": "彼の肖像はヴュルツブルクの宮殿、硬貨、教会に描かれています——フランコニア全土で彼の顔を目にするでしょう。", "zh": "他的肖像出现在维尔茨堡宫殿、硬币和教堂上——在整个弗兰科尼亚，您都能看到他的面孔。"}, "texts": {"en": "The life-size portrait in front of you shows Julius Echter — born in this castle on the 18th of March 1545, and for 44 years the Prince-Bishop of Würzburg. Few figures shaped this region more profoundly. He founded Würzburg University in 1582. He built the Juliusspital — still a functioning hospital today. He commissioned over 300 churches, all bearing his name in the pointed steeples locals still call 'Echter-Türme'. On the table in his portrait, look carefully: three hats — the bishop's mitre, a doctor's cap, and a duke's crown. In the display cases to your right: a hunting rifle with his coat of arms, powder horns made of bone, and beneath them — old books from his time. And on the chest of drawers, a baptismal bowl. Every Ingelheim child has been baptised over that bowl since 1700. The last, in 2011.", "fr": "Le portrait grandeur nature devant vous représente Julius Echter — né dans ce château le 18 mars 1545, et pendant 44 ans prince-évêque de Würzburg. Peu de personnages ont marqué cette région aussi profondément. Il fonda l'Université de Würzburg en 1582. Il construisit le Juliusspital — encore un hôpital en activité aujourd'hui. Il commanda plus de 300 églises, toutes portant son nom dans les clochers pointus que les habitants appellent encore 'Echter-Türme'. Sur la table dans son portrait, regardez bien : trois chapeaux — la mitre épiscopale, un bonnet de docteur et une couronne ducale. Dans les vitrines à votre droite : un fusil de chasse avec ses armoiries, des cornes à poudre en os, et en dessous — de vieux livres de son époque.", "es": "El retrato de tamaño natural frente a ustedes muestra a Julius Echter — nacido en este castillo el 18 de marzo de 1545, y durante 44 años príncipe-obispo de Wurzburgo. Pocas figuras moldearon esta región más profundamente. Fundó la Universidad de Wurzburgo en 1582. Construyó el Juliusspital — todavía un hospital en funcionamiento hoy. Encargó más de 300 iglesias, todas con su nombre en los campanarios puntiagudos que los lugareños todavía llaman 'Echter-Türme'. En la mesa de su retrato, miren con atención: tres sombreros — la mitra episcopal, un birrete de doctor y una corona ducal. En las vitrinas a su derecha: un rifle de caza con sus armas, cuernos de pólvora hechos de hueso.", "it": "Il ritratto a grandezza naturale di fronte a voi mostra Julius Echter — nato in questo castello il 18 marzo 1545, e per 44 anni principe-vescovo di Würzburg. Poche figure hanno modellato questa regione più profondamente. Fondò l'Università di Würzburg nel 1582. Costruì il Juliusspital — ancora un ospedale funzionante oggi. Commissionò oltre 300 chiese, tutte con il suo nome nei campanili appuntiti che gli abitanti chiamano ancora 'Echter-Türme'. Sul tavolo nel suo ritratto, guardate attentamente: tre cappelli — la mitra episcopale, un tocco da dottore e una corona ducale.", "ja": "目の前の等身大の肖像画はユリウス・エヒターを描いています——1545年3月18日にこの城で生まれ、44年間ヴュルツブルクの司教を務めました。この地域をこれほど深く形作った人物は少ないでしょう。1582年にヴュルツブルク大学を設立し、ユリウス病院を建設しました——今日でも機能している病院です。300以上の教会を建設し、地元の人々が今でも「エヒター・テュルメ（エヒターの塔）」と呼ぶ尖った尖塔にその名を刻みました。肖像画の中の机をよく見ると、3つの帽子があります——司教冠、博士帽、公爵の王冠。", "zh": "您面前的等身大画像展示的是尤利乌斯·埃克特——1545年3月18日生于这座城堡，担任维尔茨堡主教长达44年。很少有人物如此深刻地塑造了这个地区。他于1582年创立了维尔茨堡大学，建造了尤利乌斯医院——至今仍是一家正在运营的医院。他委托建造了300多座教堂，所有教堂都以他名字命名的尖顶为标志，当地人至今仍称之为'埃克特塔'。仔细看他画像中桌子上的三顶帽子：主教冠、博士帽和公爵王冠。"}}, {"id": 8, "icon": "🏮", "key": "chinesischer-salon", "names": {"en": "Chinese Salon", "fr": "Salon Chinois", "es": "Salón Chino", "it": "Salone Cinese", "ja": "中国の間", "zh": "中国沙龙"}, "subs": {"en": "Porcelain, lacquer & the world beyond Europe", "fr": "Porcelaine, laque & le monde au-delà de l'Europe", "es": "Porcelana, laca y el mundo más allá de Europa", "it": "Porcellana, lacca e il mondo oltre l'Europa", "ja": "陶磁器、漆、そしてヨーロッパの向こうの世界", "zh": "瓷器、漆器与欧洲之外的世界"}, "tips": {"en": "One of the samurai armours has an African spear — can you spot which one?", "fr": "L'une des armures de samouraï tient une lance africaine — pouvez-vous trouver laquelle ?", "es": "Una de las armaduras de samurái tiene una lanza africana — ¿pueden encontrar cuál?", "it": "Una delle armature da samurai ha una lancia africana — riuscite a trovare quale?", "ja": "侍の鎧の一つはアフリカの槍を持っています——どちらかわかりますか？", "zh": "其中一套武士盔甲手持非洲长矛——您能找出是哪一套吗？"}, "texts": {"en": "The 16th century opened up the world. Missionaries went east, merchants followed, and precious Chinese porcelain began arriving in European homes — at enormous cost. Meissen only managed to produce its own porcelain in 1710, nearly two centuries after this trade began. The table in the centre of this room is one of the most extraordinary objects in the castle. Its surface consists of one hundred individual layers of lacquer — each one applied by hand, left to dry completely, then the next applied on top. The portrait above the door shows the count who built this collection. The armours by the fireplace are samurai suits — Japanese warrior armour from the 16th to 18th centuries. And the wallpaper, now darkened by centuries of fireplace smoke, was once a vivid, deep red.", "fr": "Le XVIe siècle a ouvert le monde. Les missionnaires sont allés vers l'est, les marchands ont suivi, et la précieuse porcelaine chinoise a commencé à arriver dans les foyers européens — à un coût énorme. Meissen n'a réussi à produire sa propre porcelaine qu'en 1710, près de deux siècles après le début de ce commerce. La table au centre de cette pièce est l'un des objets les plus extraordinaires du château. Sa surface est composée de cent couches individuelles de laque — chacune appliquée à la main, laissée sécher complètement, puis la suivante appliquée par-dessus. Les armures près de la cheminée sont des tenues de samouraï — armures de guerriers japonais du XVIe au XVIIIe siècle.", "es": "El siglo XVI abrió el mundo. Los misioneros fueron hacia el este, los comerciantes los siguieron, y la preciosa porcelana china comenzó a llegar a los hogares europeos — a un coste enorme. Meissen solo logró producir su propia porcelana en 1710, casi dos siglos después de que comenzara este comercio. La mesa en el centro de esta habitación es uno de los objetos más extraordinarios del castillo. Su superficie consta de cien capas individuales de laca — cada una aplicada a mano, dejada secar completamente, y luego la siguiente aplicada encima. Las armaduras junto a la chimenea son trajes de samurái — armaduras de guerreros japoneses de los siglos XVI al XVIII.", "it": "Il XVI secolo ha aperto il mondo. I missionari sono andati a est, i mercanti li hanno seguiti, e la preziosa porcellana cinese ha iniziato ad arrivare nelle case europee — a un costo enorme. Meissen riuscì a produrre la propria porcellana solo nel 1710, quasi due secoli dopo l'inizio di questo commercio. Il tavolo al centro di questa stanza è uno degli oggetti più straordinari del castello. La sua superficie è composta da cento strati individuali di lacca — ognuno applicato a mano, lasciato asciugare completamente, poi il successivo applicato sopra. Le armature vicino al camino sono abiti da samurai — armature da guerriero giapponese dal XVI al XVIII secolo.", "ja": "16世紀は世界を開きました。宣教師たちが東へ向かい、商人たちが後に続き、貴重な中国磁器が巨大なコストでヨーロッパの家庭に届き始めました。メッセンがようやく独自の磁器を生産できたのは1710年——この貿易が始まってから約2世紀後のことです。この部屋の中央にあるテーブルは城の中で最も特別な物の一つです。その表面は100層の漆で構成されています——それぞれ手作業で塗られ、完全に乾燥させてから次の層を塗ります。暖炉のそばの鎧は侍の甲冑——16世紀から18世紀の日本の武士の鎧です。", "zh": "16世纪打开了世界。传教士向东而行，商人紧随其后，珍贵的中国瓷器开始以巨大的代价抵达欧洲家庭。梅森直到1710年才能生产自己的瓷器——距这项贸易开始已近两个世纪。这个房间中央的桌子是城堡中最非凡的物品之一。它的表面由一百层漆构成——每层都手工涂抹，完全干燥后再涂下一层。壁炉旁的盔甲是武士套装——16至18世纪的日本武士盔甲。壁纸因几个世纪的壁炉烟熏而变暗，曾经是鲜艳的深红色。"}}, {"id": 9, "icon": "🛏️", "key": "fürstenzimmer", "names": {"en": "Prince's Chamber", "fr": "Chambre Princière", "es": "Cámara del Príncipe", "it": "Camera del Principe", "ja": "侯爵の間", "zh": "王侯室"}, "subs": {"en": "The princely bed & the family to this day", "fr": "Le lit princier & la famille jusqu'à aujourd'hui", "es": "La cama principesca y la familia hasta hoy", "it": "Il letto principesco e la famiglia fino ad oggi", "ja": "王侯のベッドと現代の家族", "zh": "王侯之床与当代家族"}, "tips": {"en": "The last owners of this room were a family connected to the July 1944 assassination attempt on Hitler.", "fr": "Les derniers occupants de cette chambre étaient une famille liée à l'attentat du 20 juillet 1944 contre Hitler.", "es": "Los últimos propietarios de esta habitación eran una familia relacionada con el atentado del 20 de julio de 1944 contra Hitler.", "it": "Gli ultimi proprietari di questa stanza erano una famiglia legata all'attentato del 20 luglio 1944 contro Hitler.", "ja": "この部屋の最後の所有者は、1944年7月のヒトラー暗殺未遂事件と関係のある家族でした。", "zh": "这个房间最后的主人所在的家族，与1944年7月针对希特勒的暗杀未遂事件有所关联。"}, "texts": {"en": "We are nearly at the end of our tour — and this room is perhaps the most personal. The princely bed, with its four twisted columns and carved baldachin, dates from the 17th century. The canopy was not just for grandeur — it served a practical purpose, catching the insects that lived in the old ceiling beams above. The woodcuts around the room show scenes from the Passion of Christ. And the family portraits here bring the story right up to the present day. Count Albrecht von Ingelheim, who died in 2006, was Mayor of Mespelbrunn for 30 years. His eldest daughter, Marie Antoinette, now owns and runs this castle — together with her husband Karl Theodor and her mother, Countess Hedwig. The family that Haman Echter I began in 1412 is still here. Thank you for joining us today.", "fr": "Nous approchons de la fin de notre visite — et cette pièce est peut-être la plus intime. Le lit princier, avec ses quatre colonnes torsadées et son baldaquin sculpté, date du XVIIe siècle. Le baldaquin n'était pas seulement pour la grandeur — il avait un rôle pratique, capturant les insectes qui vivaient dans les vieilles poutres du plafond au-dessus. Les gravures sur bois autour de la pièce montrent des scènes de la Passion du Christ. Et les portraits de famille ici amènent l'histoire jusqu'à nos jours. Le comte Albrecht von Ingelheim, mort en 2006, fut maire de Mespelbrunn pendant 30 ans. Sa fille aînée, Marie Antoinette, possède et gère désormais ce château. La famille qu'Haman Echter I a fondée en 1412 est toujours là. Merci de nous avoir rejoints aujourd'hui.", "es": "Estamos casi al final de nuestra visita — y esta habitación es quizás la más personal. La cama principesca, con sus cuatro columnas retorcidas y baldaquín tallado, data del siglo XVII. El dosel no era solo por grandiosidad — tenía un propósito práctico, atrapando los insectos que vivían en las viejas vigas del techo. Los grabados en madera alrededor de la habitación muestran escenas de la Pasión de Cristo. Y los retratos de familia aquí llevan la historia hasta el presente. El conde Albrecht von Ingelheim, que murió en 2006, fue alcalde de Mespelbrunn durante 30 años. Su hija mayor, Marie Antoinette, ahora posee y dirige este castillo. La familia que Haman Echter I comenzó en 1412 sigue aquí. Gracias por acompañarnos hoy.", "it": "Siamo quasi alla fine del nostro tour — e questa stanza è forse la più personale. Il letto principesco, con le sue quattro colonne tortili e il baldacchino intagliato, risale al XVII secolo. Il baldacchino non era solo per la grandiosità — aveva uno scopo pratico, catturando gli insetti che vivevano nelle vecchie travi del soffitto sopra. Le silografie intorno alla stanza mostrano scene della Passione di Cristo. E i ritratti di famiglia qui portano la storia fino ai giorni nostri. Il conte Albrecht von Ingelheim, morto nel 2006, fu sindaco di Mespelbrunn per 30 anni. Sua figlia maggiore, Marie Antoinette, ora possiede e gestisce questo castello. La famiglia che Haman Echter I iniziò nel 1412 è ancora qui. Grazie per essere venuti con noi oggi.", "ja": "ツアーもほぼ終わりに近づいてきました——そしてこの部屋はおそらく最も個人的な空間です。4本のねじれた柱と彫刻された天蓋を持つ王侯のベッドは17世紀のものです。天蓋は壮麗さのためだけでなく、実用的な目的もありました——上の古い天井梁に住む虫を捕まえるためです。部屋の周りの木版画はキリストの受難の場面を描いています。そして、ここの家族の肖像画は物語を現在まで続けています。2006年に亡くなったアルブレヒト・フォン・インゲルハイム伯爵は30年間メスペルブルンの市長を務めました。彼の長女マリー・アントワーネットが今この城を所有・運営しています。1412年にハマン・エヒター1世が始めた家族は今もここにいます。本日ご参加いただきありがとうございました。", "zh": "我们的参观即将结束——这个房间也许是最私密的一个。王侯大床有四根扭曲的柱子和雕刻的华盖，可追溯至17世纪。华盖不仅仅是为了华丽——它有实际用途，用来捕捉生活在上方古老天花板横梁中的虫子。房间四周的木版画展示了基督受难的场景。这里的家族肖像画将故事延续至今。2006年去世的阿尔布雷希特·冯·英格尔海姆伯爵担任梅斯佩尔布伦市长长达30年。他的长女玛丽·安托瓦内特现在拥有并经营这座城堡。哈曼·埃克特一世于1412年开创的家族至今仍在这里。感谢您今天与我们同行。"}}];
const langList = [{c:"en",l:"&#127468;&#127463; EN"},{c:"fr",l:"&#127467;&#127479; FR"},{c:"es",l:"&#127466;&#127480; ES"},{c:"it",l:"&#127470;&#127481; IT"},{c:"ja",l:"&#127471;&#127477; JA"},{c:"zh",l:"&#127464;&#127475; ZH"}];
const langNames = {en:"English",fr:"Français",es:"Español",it:"Italiano",ja:"日本語",zh:"中文"};
const langCodes = {en:"en-GB",fr:"fr-FR",es:"es-ES",it:"it-IT",ja:"ja-JP",zh:"zh-CN"};

let cur=0, lang="en", playing=false, prog=0, ticker=null, utter=null, textOpen=false;
let touchStartX=0, touchStartY=0;

function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+":"+(sec<10?"0":"")+sec}
function dur(r){return r.texts&&r.texts[lang]?Math.round(r.texts[lang].split(" ").length/2.3):120}

function speak(){
  if(!window.speechSynthesis) return false;
  window.speechSynthesis.cancel();
  const text = rooms[cur].texts[lang]||rooms[cur].texts.en;
  utter = new SpeechSynthesisUtterance(text);
  utter.lang = langCodes[lang]||"en-GB";
  utter.rate = 0.88;
  utter.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const code = langCodes[lang]||"en-GB";
  const match = voices.find(v=>v.lang===code)||voices.find(v=>v.lang.startsWith(code.split("-")[0]));
  if(match) utter.voice = match;
  const total = dur(rooms[cur]);
  let elapsed = Math.round((prog/100)*total);
  utter.onstart = ()=>{
    document.getElementById("speakBadge").classList.add("on");
    document.getElementById("speakLbl").textContent = "Speaking in "+langNames[lang]+"...";
    ticker = setInterval(()=>{
      elapsed = Math.min(elapsed+1, total);
      prog = (elapsed/total)*100;
      document.getElementById("progFill").style.width = prog+"%";
      document.getElementById("elapsed").textContent = fmt(elapsed);
      if(elapsed>=total){clearInterval(ticker);stopAll();}
    },1000);
  };
  utter.onend = ()=>stopAll();
  utter.onerror = ()=>stopAll();
  window.speechSynthesis.speak(utter);
  return true;
}

function stopAll(){
  playing=false; clearInterval(ticker);
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  const pb = document.getElementById("playBtn");
  if(pb) pb.innerHTML = "&#9654;";
  const sb = document.getElementById("speakBadge");
  if(sb) sb.classList.remove("on");
}

function togglePlay(){
  if(playing){stopAll();return;}
  playing=true;
  document.getElementById("playBtn").innerHTML = "&#9646;&#9646;";
  if(!speak()){playing=false;document.getElementById("playBtn").innerHTML="&#9654;";}
}

function skip(s){
  const total = dur(rooms[cur]);
  const cs = Math.round((prog/100)*total);
  const ns = Math.max(0,Math.min(total,cs+s));
  prog = (ns/total)*100;
  document.getElementById("progFill").style.width = prog+"%";
  document.getElementById("elapsed").textContent = fmt(ns);
}

function toggleText(){
  textOpen = !textOpen;
  document.getElementById("roomText").classList.toggle("open",textOpen);
  document.getElementById("readMoreBtn").innerHTML = textOpen?"Show less &#9650;":"Read more &#9660;";
}

function goRoom(n){
  if(n<0||n>=rooms.length) return;
  stopAll(); prog=0; textOpen=false; cur=n;
  render();
  document.getElementById("mainBody").scrollTop=0;
}

function setLang(l,el){
  lang=l;
  document.querySelectorAll(".lb").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
  stopAll(); prog=0; render();
}

function render(){
  const r = rooms[cur];
  const name = r.names[lang]||r.names.en;
  const total = dur(r);
  document.getElementById("roomBadge").textContent = "Room "+r.id;
  const heroImg = document.getElementById("heroImg");
  const roomEmoji = document.getElementById("roomEmoji");
  if(r.id===1){
    heroImg.src=CASTLE_IMG; heroImg.style.display="block"; roomEmoji.style.display="none";
  } else {
    heroImg.style.display="none"; roomEmoji.style.display="block"; roomEmoji.textContent=r.icon;
  }
  document.getElementById("roomName").textContent = name;
  document.getElementById("roomSub").textContent = r.subs[lang]||r.subs.en;
  document.getElementById("tipText").textContent = r.tips[lang]||r.tips.en;
  document.getElementById("roomText").textContent = r.texts[lang]||r.texts.en;
  document.getElementById("roomText").classList.toggle("open",textOpen);
  document.getElementById("readMoreBtn").innerHTML = textOpen?"Show less &#9650;":"Read more &#9660;";
  document.getElementById("pName").textContent = name;
  document.getElementById("pLang").textContent = langNames[lang]||lang;
  document.getElementById("totalTime").textContent = fmt(total);
  document.getElementById("elapsed").textContent = fmt(Math.round((prog/100)*total));
  document.getElementById("progFill").style.width = prog+"%";
  document.getElementById("playBtn").innerHTML = playing?"&#9646;&#9646;":"&#9654;";
  document.getElementById("prevBtn").disabled = cur===0;
  document.getElementById("nextBtn").disabled = cur===rooms.length-1;
  document.getElementById("roomGrid").innerHTML = rooms.map((rm,i)=>
    '<button class="rg'+(i===cur?" on":"")+'" onclick="goRoom('+i+')">'
    +'<span class="rg-icon">'+rm.icon+'</span>'
    +'<span class="rg-num">'+rm.id+'</span></button>'
  ).join("");
}

document.getElementById("mainBody").addEventListener("touchstart",e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById("mainBody").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0) goRoom(cur+1); else goRoom(cur-1);
  }
},{passive:true});

if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

const PIN = "1412";
let pinEntry = "";
function pinKey(k){
  if(pinEntry.length>=4) return;
  pinEntry += k;
  document.getElementById("d"+(pinEntry.length-1)).classList.add("filled");
  if(pinEntry.length===4){
    setTimeout(()=>{
      if(pinEntry===PIN){
        document.getElementById("pinScreen").style.display="none";
        sessionStorage.setItem("auth","1");
      } else {
        document.getElementById("pinError").classList.add("on");
        setTimeout(()=>{
          pinEntry="";
          for(let i=0;i<4;i++) document.getElementById("d"+i).classList.remove("filled");
          document.getElementById("pinError").classList.remove("on");
        },1000);
      }
    },200);
  }
}
function pinDel(){
  if(pinEntry.length===0) return;
  document.getElementById("d"+(pinEntry.length-1)).classList.remove("filled");
  pinEntry=pinEntry.slice(0,-1);
}
if(sessionStorage.getItem("auth")==="1"){
  document.getElementById("pinScreen").style.display="none";
}

const langEl = document.getElementById("langs");
langList.forEach(({c,l})=>{
  const b = document.createElement("button");
  b.className = "lb"+(c==="en"?" on":"");
  b.innerHTML = l;
  b.onclick = function(){setLang(c,this);};
  langEl.appendChild(b);
});
render();
</script>
</body>
</html>

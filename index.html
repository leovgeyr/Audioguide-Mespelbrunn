dine, de soltera condesa Schenk von Stauffenberg, quien tras la Primera Guerra Mundial abrió regularmente la casa al público. Su retrato, un cuadro de 1912 del pintor de Aschaffenburg Adalbert Hock, se encuentra a mano izquierda, junto a la ventana heráldica. La espada con la fecha 1501 es en realidad una espada del siglo XIX, mientras que una de las espadas más antiguas es la pieza colgada en diagonal a su izquierda; procede con gran probabilidad de la Escocia bajomedieval. Observen la magnífica guarda trabajada, que se parece a un tejido de cesta, de ahí también el término técnico inglés 'basket hilt'. Los candelabros flamencos de bronce están forjados a mano y datan del siglo XVIII. En la pared opuesta cuelgan ballestas de caza con incrustaciones, de finales del siglo XVI. Los dos cuadros son de Frans Snyders, amigo de Pedro Pablo Rubens y alumno de Pieter Brueghel el Joven; representan una cacería de ciervo y una de jabalí. (Encima, una cornamenta interesante; el animal padecía una enfermedad que se reflejó en la forma de su cornamenta.) El grabado de debajo es de Martin Riedinger. La gran ventana ovalada que da al patio interior es también una ventana heráldica pintada a mano, esta vez con los árboles genealógicos de Marie Antoinette y su esposo, el conde Friedrich Karl von Ingelheim. El reloj de pie procede del Ámsterdam del siglo XVIII. La colección de armas contigua se remonta hasta el siglo XVII: fusiles y pistolas, distintos cuernos de pólvora, arriba cubiertos de caza. En el extremo, un arma histórica de avancarga, un mosquete también llamado arcabuz, de los inicios de la Guerra de los Treinta Años. Se cargaba por el cañón con bala y pólvora, luego se compactaba con la baqueta y se encendía en la cazoleta mediante una mecha. Tenía un retroceso enorme. Como las armas de fuego apenas se habían inventado recientemente, se producían repetidos accidentes con estas armas cuando se disparaban hacia atrás en lugar de hacia adelante. Era enormemente pesada y requería dos hombres para su manejo, fijando el arma, también llamada coloquialmente 'arcabuz de gancho', mediante su gancho en una horquilla o sobre un soporte. La espada sobre la mesa es una espada ceremonial de las posesiones del príncipe-obispo Julius Echter. Las alabardas del lateral son lanzas de gala de Anselm Franz von Ingelheim, quien fue príncipe elector de Maguncia en 1680; en actos públicos lo acompañaba una guardia de honor. Cuando murió en Aschaffenburg el 30 de marzo de 1695, su cuerpo fue sepultado en la colegiata de la ciudad, su corazón en la catedral de Maguncia y sus entrañas en la iglesia de corte de San Gangolfo en Maguncia. Junto a ellas, a la izquierda, lanzas de ulanos de la Primera Guerra Mundial; Philipp Rudolph von Ingelheim perteneció a un escuadrón de caballería de Bamberg, los llamados ulanos. En el centro se ven dos venablos de jabalí más.","it": "Di sopra: la Sala da Pranzo. Questa grande stanza viene ancora oggi utilizzata per le feste private della famiglia. Una sala da pranzo più piccola per l'uso quotidiano si trova nell'ala opposta, e a differenza di questa stanza può essere riscaldata. Il soffitto in legno con rosette è del XVIII secolo. Nell'armadio si vedono porcellane di varia origine: porcellana cinese e giapponese, porcellana della vecchia Vienna, e una serie di piatti di Nymphenburg, dipinti dalla contessa Marie Antoinette, nata contessa Westphalen zu Fürstenberg, che rappresentano antichi possedimenti degli Ingelheim sulla riva sinistra del Reno. (Nota aggiuntiva: questi possedimenti sulla riva sinistra del Reno caddero verso il 1800 nelle mani delle truppe rivoluzionarie francesi, che conquistarono quella riva del fiume. Suo marito, il conte Friedrich Karl von Ingelheim, formò un battaglione di volontari, i 'Cacciatori di Francoforte', con cui combatté contro Napoleone. Secondo la cronaca cittadina di Hanau, questo battaglione ebbe successo e riuscì, in alcuni punti, a costringere le truppe napoleoniche alla ritirata.) Si vedono anche due file di ceramiche inglesi. Sopra il camino è appeso un cosiddetto corno da caccia per la 'caccia in battuta' e i venabboli da cinghiale, in uso fino all'inizio del XX secolo per la caccia al cinghiale. L'intera collezione di armi fu raccolta dal patrimonio di famiglia da Philipp Rudolph, nonno del conte Albrecht, ed è esposta già dal 1920. Si tratta di una collezione di armi storiche da caccia, da guerra e da esposizione. Fu anche il conte Philipp Rudolph, insieme alla moglie Leopoldine, nata contessa Schenk von Stauffenberg, che dopo la Prima Guerra Mondiale aprì regolarmente la casa al pubblico. Il suo ritratto, un dipinto del 1912 del pittore di Aschaffenburg Adalbert Hock, si trova a sinistra, vicino alla finestra araldica. La spada con la data 1501 è in realtà una spada del XIX secolo, mentre una delle spade più antiche è il pezzo appeso in diagonale alla sua sinistra; proviene con grande probabilità dalla Scozia del tardo Medioevo. Osservate la magnifica elsa lavorata, che ricorda un intreccio a cestino, da cui anche il termine tecnico inglese 'basket hilt'. I candelieri fiamminghi in bronzo sono forgiati a mano e risalgono al XVIII secolo. Sulla parete opposta sono appese balestre da caccia con intarsi, della fine del XVI secolo. I due dipinti sono di Frans Snyders, amico di Pietro Paolo Rubens e allievo di Pieter Brueghel il Giovane; rappresentano una caccia al cervo e una caccia al cinghiale. (Sopra, un palco di corna interessante; l'animale soffriva di una malattia che si rifletteva nella forma delle corna.) L'incisione sotto è di Martin Riedinger. La grande finestra ovale che dà sul cortile interno è anch'essa una finestra araldica dipinta a mano, questa volta con gli alberi genealogici di Marie Antoinette e di suo marito, il conte Friedrich Karl von Ingelheim. L'orologio a pendolo proviene dalla Amsterdam del XVIII secolo. La collezione di armi successiva risale fino al XVII secolo: fucili e pistole, vari corni da polvere, sopra posate da caccia. All'estremità un'arma storica ad avancarica, un moschetto chiamato anche archibugio, dei primi anni della Guerra dei Trent'anni. Veniva caricata attraverso la canna con pallottola e polvere, poi compressa con la bacchetta e accesa alla testa tramite una miccia. Aveva un rinculo enorme. Poiché le armi da fuoco erano state inventate solo da poco, si verificavano ripetutamente incidenti con queste armi quando si sparavano all'indietro invece che in avanti. Era estremamente pesante e richiedeva due uomini per il suo utilizzo, per fissare l'arma, chiamata anche colloquialmente 'archibugio a gancio', con il suo gancio in una forcella o su un treppiede. La spada sul tavolo è una spada cerimoniale appartenuta al principe-vescovo Julius Echter. Le alabarde sul lato sono lance di rappresentanza di Anselm Franz von Ingelheim, che fu principe elettore di Magonza nel 1680; nelle occasioni pubbliche era accompagnato da una guardia d'onore. Quando morì ad Aschaffenburg il 30 marzo 1695, il suo corpo fu sepolto nella collegiata della città, il suo cuore nella cattedrale di Magonza e le sue viscere nella chiesa di corte di San Gangolfo a Magonza. Accanto, a sinistra, lance da ulani della Prima Guerra Mondiale; Philipp Rudolph von Ingelheim apparteneva a uno squadrone di cavalleria di Bamberga, i cosiddetti ulani. Al centro si vedono altri due venabboli da cinghiale.","ja": "二階：食堂です。この大きな部屋は、現在も家族の私的な祝宴に使われています。日常用の小さな食堂は反対側の棟にあり、この部屋とは異なり暖房が可能です。バラの装飾が施された木製の天井は18世紀のものです。戸棚の中には、さまざまな由来を持つ陶磁器が見られます。中国製・日本製の磁器、オールド・ウィーン製のもの、そしてマリー・アントワネット伯爵夫人（旧姓ヴェストファーレン・ツー・フュルステンベルク伯爵夫人）が、かつてのインゲルハイム家のライン左岸の領地を描いた、ニンフェンブルク製の絵皿のシリーズです。このライン左岸の領地は、1800年頃、ライン左岸を征服したフランス革命軍の手に落ちました。彼女の夫であるフリードリヒ・カール・フォン・インゲルハイム伯爵は「フランクフルト猟兵隊」という義勇大隊を組織し、ナポレオンに対して指揮を執りました。ハーナウ市の年代記によれば、この部隊は成功を収め、局地的にナポレオン軍を撤退に追い込んだと記されています。さらに、二列のイギリス製ファイアンス焼きも見られます。暖炉の上には「パルフォース号笛」（追い込み猟用）と呼ばれる狩猟用の角笛、そして20世紀初頭まで使われていたイノシシ猟用の槍が掛けられています。武器コレクション全体は、アルブレヒト伯爵の祖父であるフィリップ・ルドルフによって、家族の所有物の中から集められ、1920年にはすでに公開されていました。これは狩猟用、戦争用、そして展示用の歴史的な武器のコレクションです。第一次世界大戦後に、この邸宅を定期的に一般公開し始めたのも、このフィリップ・ルドルフ伯爵と、その妻レオポルディーネ（旧姓シェンク・フォン・シュタウフェンベルク伯爵夫人）でした。彼の肖像画は、1912年にアシャッフェンブルクの画家アーダルベルト・ホックが描いたもので、紋章窓の左側に掛けられています。1501年という年号が刻まれた剣は、実際には19世紀のものです。一方、最も古い剣の一つは、その左に斜めに掛けられている品で、おそらく中世後期のスコットランド製と考えられます。バスケットを編んだような形をした、見事な作りの護拳に注目してください。これが英語の専門用語「バスケット・ヒルト」の由来となっています。フランドル製の青銅製燭台は、18世紀の手作りの鍛造品です。向かいの壁には、16世紀末の象嵌細工が施された狩猟用クロスボウが掛けられています。二枚の絵画はフランス・スネイデルスの作で、彼はペーテル・パウル・ルーベンスの友人であり、ピーテル・ブリューゲル（小ブリューゲル）の弟子でした。鹿狩りと猪狩りの様子を描いています。（その上には興味深い角があり、この動物は病気を患っており、それが角の形に表れています。）下にある版画はマルティン・リーディンガーの作品です。内庭に面した大きな楕円形の窓も、手描きの紋章窓で、こちらにはマリー・アントワネットとその夫フリードリヒ・カール・フォン・インゲルハイム伯爵の家系図が描かれています。置き時計は18世紀のアムステルダム製です。続く武器コレクションは17世紀にまで遡り、ライフル銃やピストル、さまざまな火薬入れ、その上には狩猟用カトラリーが並びます。一番端には、三十年戦争初期の歴史的な前装式銃、マスケット銃、いわゆる「アーキバス」が展示されています。これは銃口から弾丸と火薬を込め、込め矟で押し込み、銃身の頭部にある火縄で点火する仕組みでした。反動は非常に大きなものでした。当時、銃器はまだ発明されてからまもなかったため、前方ではなく後方に発射してしまう事故もたびたび起こりました。この銃は非常に重く、フォークまたは台座に鉤で固定する必要があり、操作には二人の人手を要しました。テーブルの上の剣は、司教公ユリウス・エヒターの所有物であった儀礼用の剣です。脇に置かれたハルバードは、1680年にマインツ選帝侯であったアンゼルム・フランツ・フォン・インゲルハイムの儀礼用の槍です。公の行事の際には、名誉護衛隊が彼に同行しました。1695年3月30日にアシャッフェンブルクで亡くなった際、遺体はそこの参事会教会に、心臓はマインツ大聖堂に、内臓はマインツの宮廷教会である聖ガンゴルフ教会に、それぞれ別々に埋葬されました。その隣、左側には第一次世界大戦時の槍騎兵用の槍があります。フィリップ・ルドルフ・フォン・インゲルハイムは、バンベルクの騎馬部隊、いわゆる「ウーラン（槍騎兵）」に所属していました。中央にはさらに二本のイノシシ猟用の槍が見られます。","zh": "楼上：餐厅。这间宽敞的房间至今仍用于家族的私人庆典活动。日常使用的较小餐厅位于对面一翼，与这间房间不同，那里是可以供暖的。带有花瓣浮雕的木质天花板出自18世纪。柜中陈列着来源各异的瓷器：中国与日本瓷器、维也纳老瓷，以及一系列宁芬堡瓷盘，这些瓷盘由玛丽·安托瓦内特伯爵夫人（原姓魏斯特法伦·楚·菲尔斯滕贝格伯爵夫人）亲手绘制，描绘的是因格尔海姆家族昔日在莱茵河左岸的产业。这些莱茵河左岸的产业大约在1800年前后被攻占该地区的法国革命军夺走。她的丈夫弗里德里希·卡尔·冯·因格尔海姆伯爵组建了一支义勇营，名为“法兰克福猎兵营”，并率领其对抗拿破仑；根据哈瑙市编年史的记载，这支部队取得了成功，曾在局部战斗中迫使拿破仑军队撤退。此外，您还能看到两排英式珐华陶器。壁炉上方悬挂着一支所谓的“围猎号角”，用于驱赶式狩猎，以及一直沿用到20世纪初、用于野猪猎捕的猎猪枪。整套武器收藏由阿尔布雷希特伯爵的祖父菲利普·鲁道夫从家族财产中汇集而成，早在1920年便已对外展示。这是一组涵盖狩猎、战争与展示用途的历史武器收藏。同样是这位菲利普·鲁道夫伯爵，与其妻子利奥波尔迪娜（原姓申克·冯·斯陶芬贝格女伯爵）一起，在第一次世界大战后开始定期向公众开放这座宅邸。他的画像，由阿沙芬堡画家阿达尔贝特·霍克于1912年绘制，悬挂在纹章窗左侧。这把标有1501年的剑实际上是一把19世纪的剑，而其中最古老的剑之一，是悬挂在它左侧、呈对角线方向的那件展品，极有可能来自中世纪晚期的苏格兰。请注意它做工精美的护手，形似编织的篮子，因此在英语中也被称为“篮式护手”。那些佛兰德式青铜烛台为手工锻造，出自18世纪。对面墙上悬挂着镶有嵌花工艺的狩猎弩弓，来自16世纪末。两幅画作出自弗兰斯·斯奈德斯，他是彼得·保罗·鲁本斯的朋友，也是小彼得·勃鲁盖尔的学生，描绘的是猎鹿与猎猪的场景。（上方还有一对有趣的鹿角，这只动物患有某种疾病，影响了鹿角的形状。）下方的版画出自马丁·里丁格之手。朝向内庭的那扇大型椭圆形窗户，同样是一幅手绘纹章窗，这一次描绘的是玛丽·安托瓦内特与其丈夫弗里德里希·卡尔·冯·因格尔海姆伯爵的家系图。那座座钟来自18世纪的阿姆斯特丹。接下来的这组武器收藏可追溯至17世纪：步枪与手枪，以及各式火药角，上方则是狩猎用餐具。最末端是一件历史悠久的前装式武器，一支也被称为“火绳枪”的滑膛枪，出自三十年战争初期。它通过枪管装填铅弹和火药，再用通条压实，并在枪头处用火绳点燃。后坐力极为强烈。由于当时火器问世不久，这类武器若不慎向后而非向前发射，曾多次造成事故。它极为沉重，需要两人操作，将这支也被俗称为“钩枪”的武器用钩子固定在叉架或支架上。桌上的那把剑是采邑主教尤利乌斯·埃希特所拥有的一把礼仪用剑。一旁的那些长戟，则是1680年任美因茨选帝侯的安泽尔姆·弗朗茨·冯·因格尔海姆的仪仗用长枪；公开场合中，他常由一支荣誉卫队随行。他于1695年3月30日在阿沙芬堡逝世后，遗体安葬于当地的修道院教堂，心脏安放于美因茨大教堂，内脏则安葬于美因茨宫廷教堂圣甘戈尔夫教堂。旁边左侧是第一次世界大战时期的长枪骑兵用枪，菲利普·鲁道夫·冯·因格尔海姆曾隶属于班贝格的一支骑兵中队，即所谓的“枪骑兵”。中间您还能看到另外两支猎猪用的长枪。"}},{"id": 6,"icon": "🖼️","key": "ahnensaal","names": {"en": "Hall of Ancestors","fr": "Galerie des Ancêtres","es": "Galería de los Antepasados","it": "Galleria degli Antenati","ja": "先祖の広間","zh": "祖先长廊"},"subs": {"en": "Portraits from the 17th to 19th century","fr": "Portraits du XVIIe au XIXe siècle","es": "Retratos del siglo XVII al XIX","it": "Ritratti dal XVII al XIX secolo","ja": "17世紀から19世紀の肖像画","zh": "17至19世纪的肖像画"},"tips": {"en": "The Brothers Grimm signed a guest book of this family — look for their reference on the wall.","fr": "Les frères Grimm ont signé un livre d'or de cette famille — cherchez leur référence sur le mur.","es": "Los hermanos Grimm firmaron un libro de visitas de esta familia.","it": "I fratelli Grimm firmarono un libro degli ospiti di questa famiglia.","ja": "グリム兄弟がこの家族のゲストブックにサインしました。","zh": "格林兄弟曾在这个家族的来宾签名册上签名。"},"texts": {"en": "We now enter the Ancestral Hall. The sequence of ancestors begins on the left and continues to the right, spanning from the 17th century to the beginning of the 19th, and continues into the next rooms. In noble families, it was generally the eldest son who inherited the estate under the principle of entail, which is why, in this ancestral line, apart from the first couple, you see the eldest sons together with their wives. Above the red sofa the sequence begins with the last Echter heiress, Maria Ottilia, whose family tree we already saw in the Knights' Hall. She married Philipp Ludwig von Ingelheim in 1648. As we already saw from the family trees in the Knights' Hall, the couple succeeded in obtaining imperial permission to bear the double name from then on, which is why today's lords of the castle are called Counts of Ingelheim called Echter of and to Mespelbrunn. There is only one other German noble family in which the women adapt the surname to their own gender, the family of Eltz, where the ladies are called Countess von Eltz Faustin von Stromberg, and the gentlemen Faust von Stromberg, but that is just a side note.\n\nMaria Ottilia's eldest son was married to a Countess Dalberg, Chamberlain of Worms. They had twenty-two children, of whom, sadly, eleven did not reach adulthood. He served as President of the Imperial Court of Justice in Wetzlar. Their son was likewise married to a Countess Dalberg; her painting, hanging to the right of the stove, is by Jean-Marc Nattier, a significant French painter of the 18th century. Their son, Erwein, was married to a Baroness Breidbach-Bürresheim, from Bürresheim on the Moselle, a well-preserved castle that can still be visited today. His successor is Count Friedrich Karl, shown in the uniform of the Wars of Liberation, of the 'Frankfurt Riflemen' battalion. The ancestral line concludes beside him, to the right, with his wife, Countess Marie Antoinette Westphalen zu Fürstenberg. She is said to have been a friend of the poets and artists of her time, among them Clemens von Brentano and the Brothers Grimm, as documented by a signature of the Grimms in one of the family's guest books. It was also Marie Antoinette who painted the windows with the family trees in the castle, as well as the plates depicting the possessions on the left bank of the Rhine. The tall chest beneath is a precious piece of Renaissance work, carved with figures representing the Christian virtues of faith, love, and hope. The crystal chandelier from the 18th century, on the other hand, is glasswork from Murano in Venice. Let us take a look at the beautiful piece of furniture made of burr wood; it is an Italian cabinet from the 18th century, whose inlay work creates a perspective effect, with metallic marquetry. The tiled stove is a work from Nuremberg, about two hundred years old, and is still lit today for festivities and during severe winter cold, being the only way to heat these rooms. The bear is a genuine Spessart bear, shot in 1780 in the Ingelheim grounds. The prayer chair, with a beautiful alabaster crown, a Dutch Baroque work, shows, in motifs arranged from bottom to top, the cycle of the Last Supper, Christ on the Mount of Olives, and the Crucifixion. The altar comes from the possessions of Prince-Elector Anselm Franz von Ingelheim, shown in the 1680 portrait wearing a cloak, who gave it to his nephew Franz Adolph Dietrich, shown directly opposite. The mounting of the prayer chair was only made at a later time.","fr": "Nous entrons maintenant dans la Salle des Ancêtres. La lignée généalogique commence à gauche et se poursuit vers la droite, du XVIIe siècle jusqu'au début du XIXe, et se prolonge dans les pièces suivantes. Dans les familles nobles, c'était en règle générale le fils aîné qui héritait du bien selon le principe de la fidéicommis ; c'est pourquoi, dans cette lignée, à l'exception du premier couple, vous voyez les fils aînés accompagnés de leurs épouses. Au-dessus du canapé rouge, la lignée commence par la dernière héritière Echter, Maria Ottilia, dont nous avons déjà vu l'arbre généalogique dans la salle des chevaliers. Elle épousa en 1648 Philipp Ludwig von Ingelheim. Tous deux obtinrent, comme nous avons pu le voir grâce aux arbres généalogiques de la salle des chevaliers, l'autorisation impériale de porter désormais le double nom, de sorte que les seigneurs actuels du château se nomment comtes d'Ingelheim dits Echter de et à Mespelbrunn. Il n'existe qu'une seule autre famille noble allemande où les femmes adaptent leur nom de famille à leur propre genre, la famille von Eltz, où les dames se nomment comtesse von Eltz Faustin von Stromberg (les messieurs Faust von Stromberg) — mais ceci n'est qu'une remarque en passant.\n\nLe fils aîné de Maria Ottilia épousa une comtesse Dalberg, chambellane de Worms. Ils eurent vingt-deux enfants ; malheureusement, onze d'entre eux n'atteignirent pas l'âge adulte. Il fut président de la Chambre impériale de justice à Wetzlar. Leur fils épousa lui aussi une comtesse Dalberg ; son portrait, à droite près du poêle, est de Jean-Marc Nattier, peintre français important du XVIIIe siècle. Leur fils, Erwein, épousa une baronne Breidbach-Bürresheim (originaire de Bürresheim, sur la Moselle, un château bien conservé, qu'on peut encore visiter aujourd'hui). Son successeur est le comte Friedrich Karl, représenté dans l'uniforme des guerres de libération, du bataillon des « Chasseurs de Francfort ». La lignée ancestrale se termine à côté de lui, à droite, par son épouse, la comtesse Marie Antoinette Westphalen zu Fürstenberg. On dit d'elle qu'elle fut une amie des poètes et des artistes de son temps : on évoque Clemens von Brentano et les frères Grimm, comme en témoigne une signature des frères Grimm dans un livre d'or de la famille. C'est aussi Marie Antoinette qui peignit, dans le château, les fenêtres ornées des arbres généalogiques, ainsi que les assiettes représentant les possessions de la rive gauche du Rhin. L'armoire-coffre en dessous est une précieuse pièce de la Renaissance, sculptée de représentations figuratives des vertus chrétiennes de foi, d'amour et d'espérance. Le lustre en cristal du XVIIIe siècle, en revanche, est un travail de verre provenant de Murano, à Venise. Jetons un coup d'œil sur le beau meuble en ronce de bois : c'est une armoire-cabinet italienne du XVIIIe siècle, dont les marqueteries créent un effet de perspective, avec des incrustations métalliques. Le poêle en faïence est une œuvre de Nuremberg, vieille d'environ deux cents ans, et est encore allumé aujourd'hui lors de fêtes et par grand froid en hiver ; c'est l'unique moyen de chauffer ces pièces. L'ours est un véritable ours du Spessart, abattu en 1780 dans le domaine d'Ingelheim. Le prie-Dieu, surmonté d'un bel élément en albâtre, œuvre néerlandaise de l'époque baroque, présente, selon un ordre de motifs allant de bas en haut, le cycle pictural suivant : la Cène, le Christ au mont des Oliviers et la scène de la Crucifixion. (L'autel provient des biens du prince-électeur Anselm Franz von Ingelheim, représenté en 1680 dans un portrait avec une cape, qui l'offrit à son neveu Franz Adolph Dietrich, représenté juste en face.) Le montage du prie-Dieu ne fut réalisé que plus tard.","es": "Entramos ahora en la Sala de los Antepasados. La línea ancestral comienza de izquierda a derecha, desde el siglo XVII hasta principios del XIX, y continúa en las siguientes salas. En las familias nobles, por regla general heredaba el hijo mayor (fideicomiso), por lo que aquí, en esta línea ancestral, salvo la primera pareja, se ven a los hijos mayores junto con sus esposas. Sobre el sofá rojo comienza primero con la última heredera Echter, Maria Ottilia, cuyo árbol genealógico ya vimos en la Sala de los Caballeros. Se casó en 1648 con Philipp Ludwig von Ingelheim. Ambos lograron, como ya pudimos ver gracias a los árboles genealógicos en la Sala de los Caballeros, obtener el permiso imperial para llevar en adelante el doble apellido, de modo que los actuales señores del castillo se llaman condes de Ingelheim, llamados Echter, de y a Mespelbrunn. Existe solo otra familia noble alemana en la que las mujeres adaptan el apellido a su propio género: la familia von Eltz, donde las damas se llaman condesa von Eltz Faustin von Stromberg (los caballeros, Faust von Stromberg), pero eso solo de paso.\n\nEl hijo mayor de Maria Ottilia estaba casado con una condesa Dalberg, camarera de Worms. Tuvieron veintidós hijos; por desgracia, once de ellos no llegaron a la edad adulta. Él fue presidente del Tribunal Supremo Imperial en Wetzlar. Su hijo también estaba casado con una condesa Dalberg; el retrato de ella, a la derecha junto a la estufa, es de Jean-Marc Nattier, importante pintor francés del siglo XVIII. El hijo de ambos, Erwein, estaba casado con una baronesa Breidbach-Bürresheim (de Bürresheim, en el Mosela, un castillo bien conservado que todavía puede visitarse). Su sucesor es el conde Friedrich Karl, representado con el uniforme de las guerras de liberación (batallón de los 'Cazadores de Fráncfort'). La línea ancestral concluye junto a él, a la derecha, con su esposa, la condesa Marie Antoinette Westphalen zu Fürstenberg. Se dice de ella que fue amiga de los poetas y artistas de su tiempo: se habla de Clemens von Brentano y de los hermanos Grimm, lo cual queda documentado por una firma de los Grimm en un libro de visitas de la familia. Fue también Marie Antoinette quien pintó en el castillo las ventanas con los árboles genealógicos y los platos con las posesiones de la orilla izquierda del Rin. El arcón de debajo es una valiosa obra de la época renacentista, tallada con representaciones figurativas de las virtudes cristianas de fe, amor y esperanza. La lámpara de cristal del siglo XVIII, en cambio, es una obra de vidrio procedente de Murano, en Venecia. Echemos un vistazo al hermoso mueble de raíz de madera: es un armario de gabinete italiano del siglo XVIII, que por sus taraceas produce un efecto de perspectiva, con incrustaciones metálicas. La estufa de azulejos es una obra de Núremberg, de unos doscientos años de antigüedad, y todavía hoy se encienden para festividades y en días de fuertes heladas en invierno; es la única forma de calentar estas salas. El oso es un auténtico oso del Spessart, cazado en 1780 en la finca de Ingelheim. El reclinatorio, con un hermoso remate de alabastro, obra neerlandesa de la época barroca, muestra, en orden de motivos de abajo hacia arriba, el ciclo pictórico: la Última Cena, Cristo en el Monte de los Olivos y la escena de la Crucifixión. (El altar procede de las posesiones del príncipe elector Anselm Franz von Ingelheim, representado en el retrato de 1680 con una capa, quien lo regaló a su sobrino Franz Adolph Dietrich, representado justo enfrente.) El montaje del reclinatorio se realizó solo en una época posterior.","it": "Entriamo ora nella Sala degli Antenati. La sequenza genealogica inizia da sinistra a destra, dal XVII secolo fino all'inizio del XIX, e continua nelle stanze successive. Nelle famiglie nobili, di norma era il figlio maggiore a ereditare il patrimonio secondo il principio del fedecommesso, motivo per cui qui, in questa sequenza ancestrale, ad eccezione della prima coppia, si vedono i figli maggiori insieme alle loro mogli. Sopra il divano rosso la sequenza inizia con l'ultima erede degli Echter, Maria Ottilia, il cui albero genealogico abbiamo già visto nella Sala dei Cavalieri. Sposò nel 1648 Philipp Ludwig von Ingelheim. Entrambi riuscirono, come abbiamo potuto vedere già dagli alberi genealogici nella Sala dei Cavalieri, a ottenere il permesso imperiale di portare in futuro il doppio nome, cosicché gli attuali signori del castello si chiamano conti di Ingelheim detti Echter di e a Mespelbrunn. Esiste solo un'altra famiglia nobile tedesca in cui le donne adattano il cognome al proprio genere, la famiglia von Eltz, dove le signore si chiamano contessa von Eltz Faustin von Stromberg (i signori, Faust von Stromberg) — ma questo solo per inciso.\n\nIl figlio maggiore di Maria Ottilia era sposato con una contessa Dalberg, ciambellana di Worms. Ebbero ventidue figli; purtroppo undici di loro non raggiunsero l'età adulta. Egli fu presidente del Tribunale Camerale Imperiale a Wetzlar. Anche suo figlio era sposato con una contessa Dalberg; il suo ritratto, a destra vicino alla stufa, è di Jean-Marc Nattier, importante pittore francese del XVIII secolo. Il figlio di entrambi, Erwein, era sposato con una baronessa Breidbach-Bürresheim (di Bürresheim, sulla Mosella, un castello ben conservato che si può ancora visitare). Il suo successore è il conte Friedrich Karl, ritratto con l'uniforme delle guerre di liberazione (battaglione dei 'Cacciatori di Francoforte'). La sequenza ancestrale si conclude accanto a lui, a destra, con sua moglie, la contessa Marie Antoinette Westphalen zu Fürstenberg. Si dice che fosse amica dei poeti e degli artisti del suo tempo: si parla di Clemens von Brentano e dei fratelli Grimm, come testimonia una firma dei Grimm in un libro degli ospiti della famiglia. Fu anche Marie Antoinette a dipingere nel castello le finestre con gli alberi genealogici e i piatti con i possedimenti sulla riva sinistra del Reno. La credenza sottostante è un preziosissimo lavoro dell'epoca rinascimentale, intagliato con rappresentazioni figurate delle virtù cristiane di fede, amore e speranza. Il lampadario di cristallo del XVIII secolo è invece un'opera in vetro di Murano, a Venezia. Diamo uno sguardo al bellissimo mobile in radica: è un armadio-gabinetto italiano del XVIII secolo, che grazie agli intarsi crea un effetto prospettico, con tarsie metalliche. La stufa in maiolica è un'opera di Norimberga, vecchia di circa duecento anni, e viene ancora oggi accesa per le festività e durante i grandi freddi invernali; è l'unico modo per riscaldare queste stanze. L'orso è un autentico orso dello Spessart, abbattuto nel 1780 nel territorio di Ingelheim. Il banco di preghiera, con un bel coronamento in alabastro, opera olandese dell'epoca barocca, mostra, in ordine di motivi dal basso verso l'alto, il ciclo pittorico: l'Ultima Cena, Cristo sul Monte degli Ulivi e la scena della Crocifissione. (L'altare proviene dai possedimenti del principe elettore Anselm Franz von Ingelheim, ritratto nel 1680 con un mantello, che lo donò a suo nipote Franz Adolph Dietrich, ritratto proprio di fronte.) Il montaggio del banco di preghiera fu realizzato solo in un'epoca successiva.","ja": "それでは祖先の間に入りましょう。系譜は左から右へ、17世紀から19世紀初頭までをたどり、次の部屋へと続いていきます。貴族の家系では原則として長男が財産を相続したため（限定相続制度）、ここに並ぶ系譜には、最初の一組を除き、いずれも長男とその妻が描かれています。赤いソファの上から始まるのは、最後のエヒター家の女性継承者マリア・オティーリアです。彼女の家系図は騎士の間でもすでにご覧いただきました。彼女は1648年にフィリップ・ルートヴィヒ・フォン・インゲルハイムと結婚しました。騎士の間の家系図でも見たように、この夫婦は皇帝の許可を得て、以後二重姓を名乗ることができるようになり、現在の城主たちは「インゲルハイム伯爵、通称メスペルブルンのエヒター家」と呼ばれています。ドイツの貴族家でこのように女性が自身の性に合わせて姓を変える例は、もう一家しかありません。エルツ家です。そこでは女性が「エルツ伯爵夫人、ファウスティン・フォン・シュトロンベルク」、男性が「ファウスト・フォン・シュトロンベルク」と名乗りますが、これは余談です。\n\nマリア・オティーリアの長男は、ヴォルムスの女官長であったダールベルク伯爵夫人と結婚しました。二人には22人の子供がいましたが、残念ながら11人は成人前に亡くなりました。彼はヴェッツラーの帝国最高法院の院長を務めました。その息子も同様にダールベルク伯爵夫人と結婚しました。彼女の肖像画（暖炉の右側）は、18世紀の重要なフランス人画家ジャン・マルク・ナティエの作です。その息子であるエルヴァインは、モーゼル河畔のビュレスハイム出身のバロネス、ブライトバッハ＝ビュレスハイム家の女性と結婚しました。ビュレスハイム城は今も見学可能な、保存状態の良い城です。その後継者がフリードリヒ・カール伯爵で、「フランクフルト猟兵隊」の制服を着た姿で描かれています。系譜の最後を飾るのは、彼の右側に並ぶ妻、マリー・アントワネット・ヴェストファーレン・ツー・フュルステンベルク伯爵夫人です。彼女は、同時代の詩人や芸術家たちの友人であったと言われています。クレメンス・フォン・ブレンターノやグリム兄弟がその一例として挙げられ、家族の来訪者名簿に残るグリム兄弟の署名がそれを物語っています。マリー・アントワネットはまた、城内にある家系図を描いた窓ガラスや、ライン左岸の領地を描いた絵皿を制作した人物でもあります。その下にある大型の収納棚は、ルネサンス時代の貴重な作品で、信仰・愛・希望というキリスト教の徳を表す人物像が彫刻されています。一方、18世紀のクリスタル製シャンデリアは、ヴェネツィアのムラーノ島で作られたガラス工芸品です。それでは、瘤材で作られた美しい家具をご覧ください。これは18世紀のイタリア製キャビネットで、象嵌細工によって遠近感が生み出されています。象嵌には金属が使われています。タイル製の暖炉はニュルンベルク製で、およそ200年の歴史があり、現在も祝祭の際や冬の厳しい寒さの際に火を入れられます。これらの部屋を暖める唯一の方法です。この熊は本物のシュペッサルト産の熊で、1780年にインゲルハイムの領地で射殺されました。美しいアラバスター製の装飾を持つ祈祷用の椅子は、バロック時代のオランダの作品で、下から上へと、最後の晩餐、オリーブ山のキリスト、そして十字架刑の場面という主題の流れを表しています。この祭壇は、選帝侯アンゼルム・フランツ・フォン・インゲルハイム（1680年のマント姿の肖像で描かれている）の所有物であり、彼が甥のフランツ・アドルフ・ディートリヒ（ちょうど向かいに描かれている）に贈ったものです。祈祷用の椅子の台座部分は、後の時代に作られたものです。","zh": "我们现在来到祖先厅。家族世系从左至右排列，时间跨度自17世纪至19世纪初，并延续至接下来的几个房间。在贵族家庭中，原则上是长子继承家产（遗产限定继承制），因此，在这一系列家族画像中，除最初的一对夫妇外，您看到的均是历代长子与其配偶。从红色沙发上方开始，首先是末代埃希特家族的女继承人玛丽亚·奥蒂利亚，我们在骑士厅已经见过她的家系图。她于1648年与菲利普·路德维希·冯·因格尔海姆成婚。正如我们在骑士厅家系图中所见，这对夫妇成功获得皇帝许可，自此可以使用双姓，因此如今城堡的主人被称为因格尔海姆伯爵，亦称梅斯佩尔布伦的埃希特家族。在德国贵族家庭中，仅有另外一个家族也采用这种方式，让女性的姓氏随其性别变化，那便是埃尔茨家族：在该家族中，女性被称为埃尔茨女伯爵·福斯廷·冯·施特龙贝格，男性则称为福斯特·冯·施特龙贝格——不过这只是一句题外话。\n\n玛丽亚·奥蒂利亚的长子，迎娶了一位达尔贝格女伯爵，她曾担任沃尔姆斯的女官。二人共育有二十二个孩子，遗憾的是，其中十一人未能活到成年。他曾任韦茨拉尔帝国最高法院院长。他们的儿子同样迎娶了一位达尔贝格女伯爵；她的画像（壁炉右侧）出自18世纪重要的法国画家让－马克·纳蒂埃之手。他们的儿子埃尔文，则迎娶了一位布赖特巴赫－比雷斯海姆男爵夫人，来自摩泽尔河畔的比雷斯海姆，那是一座至今保存完好、仍可参观的城堡。其继任者是身着“法兰克福猎兵营”制服的弗里德里希·卡尔伯爵。家族世系的最后一位，紧邻他右侧，是他的妻子玛丽·安托瓦内特·魏斯特法伦·楚·菲尔斯滕贝格女伯爵。据说她是当时诗人与艺术家们的朋友，其中包括克莱门斯·冯·布伦塔诺以及格林兄弟，这一点可由格林兄弟在家族留言簿上的签名得到印证。同样是玛丽·安托瓦内特，亲手绘制了城堡内描绘家系图的窗户，以及描绘莱茵河左岸产业的瓷盘。下方那座高大的衣柜，是文艺复兴时期一件珍贵的作品，雕刻有代表基督教信、爱、望三美德的人物形象。而那座18世纪的水晶吊灯，则是来自威尼斯穆拉诺岛的玻璃工艺品。让我们看看那件以瘤木制成的精美家具，它是一件18世纪的意大利式柜橱，凹凸镶嵌工艺营造出透视效果，所用的镶嵌材料为金属。这座瓷砖炉灶出自纽伦堡，已有约两百年历史，至今仍会在节庆场合或冬季严寒时被点燃使用，是为这些房间供暖的唯一方式。这只熊是一只真正的施佩萨特森林之熊，于1780年在因格尔海姆领地内被猎杀。这件带有精美雪花石膏顶饰的祈祷椅，是巴洛克时期的荷兰作品，按从下至上的图案顺序，依次描绘了“最后的晚餐”“橄榄山上的基督”以及“受难场景”这一系列主题。这座祭坛原属选帝侯安泽尔姆·弗朗茨·冯·因格尔海姆所有（其1680年身着披风的画像即在此处），他将其赠予了侄子弗朗茨·阿道夫·迪特里希（画像正对面悬挂）。祈祷椅的底座装置则是后来才制作完成的。"}},{"id": 7,"icon": "👑","key": "echter-zimmer","names": {"en": "Echter Room","fr": "Chambre Echter","es": "Habitación Echter","it": "Camera Echter","ja": "エヒター室","zh": "埃克特室"},"subs": {"en": "Julius Echter — the most important son of this family","fr": "Julius Echter — le fils le plus important de cette famille","es": "Julius Echter — el hijo más importante de esta familia","it": "Julius Echter — il figlio più importante di questa famiglia","ja": "ユリウス・エヒター——この家族で最も重要な息子","zh": "尤利乌斯·埃克特——这个家族最重要的儿子"},"tips": {"en": "His portrait appears on the Würzburg Residenz, on coins, on churches — you will see his face across all of Franconia.","fr": "Son portrait figure sur la Résidence de Würzburg, sur des pièces de monnaie, sur des églises — vous verrez son visage dans toute la Franconie.","es": "Su retrato aparece en la Residencia de Wurzburgo, en monedas, en iglesias — verán su cara por toda Franconia.","it": "Il suo ritratto appare sulla Residenza di Würzburg, su monete, su chiese — vedrete il suo volto in tutta la Franconia.","ja": "彼の肖像はヴュルツブルクの宮殿、硬貨、教会に描かれています——フランコニア全土で彼の顔を目にするでしょう。","zh": "他的肖像出现在维尔茨堡宫殿、硬币和教堂上——在整个弗兰科尼亚，您都能看到他的面孔。"},"texts": {"en": "We now enter the room above the chapel, the so-called Echter Room. The life-sized portrait depicts Julius Echter, painted in the 19th century, the most significant son of the family. On the table in the painting you can recognize the three hats of his offices: the bishop's mitre, the doctoral cap, and the ducal crown. Julius was born here at Mespelbrunn Castle in 1545 and died in Würzburg in 1617, after forty-four years in office. In the background you can recognize the Juliusspital, founded in 1576, with the princely wing where Julius resided most of the time. He was also the founder of the University of Würzburg in 1582 and expanded the Marienberg Fortress in 1579 with its library of four thousand volumes. He also had more than three hundred churches built throughout the land; they feature very pointed spires and are popularly known as 'Echter towers.' In the display case to the right, below the portrait of Julius Echter, you see various keepsakes, what today we would call souvenirs, of the family: a beautiful carving, a gift from the Russian Tsar to Count Friedrich Damian von Ingelheim, who served as ambassador there, and on the far right a shrunken head from South America, along with various decorations and rosaries from the graves of the Echter family, found during renovation work on the church in Hessenthal. The church in Hessenthal is one of the Echter family's burial sites, and a visit is highly recommended; it is open until 7 p.m. in summer. The bowl on the table beside it shows another portrait of Julius Echter; the Prince-Bishop used this bowl to distribute bread to the poor. Above the baptismal bowl on the chest of drawers, all Ingelheim children have been baptized since 1700, most recently in 2011 the youngest scion of the house, Silvester, baptized by Bishop Friedhelm Hofmann of Würzburg. In the other two display cases you see further belongings of Julius Echter: his hunting rifle bearing his date and coat of arms, powder horns made of bone, and a belt with a beautiful buckle. Below are old books, so-called Renaissance bindings, from Julius Echter's time. In the niche stands a Crucifixion group carved from boxwood, probably the model for a porcelain group from Höchst; boxwood is considered extremely difficult to work, being very hard. The cabinet is a Dutch Baroque piece inlaid with colorful marquetry; the birds and flowers were originally painted in color. In the middle is a centuries-old board game, known until the 20th century, called 'the House of Fortune.' It was played with two dice, and depending on the player's luck, stones were placed and removed, with much or little being won, or everything lost.","fr": "Nous entrons maintenant dans la pièce au-dessus de la chapelle, ce qu'on appelle la Chambre Echter. Le portrait grandeur nature représente Julius Echter (peint au XIXe siècle), le fils le plus illustre de la famille. (Sur la table, dans le tableau, on reconnaît les trois symboles de ses dignités : la mitre épiscopale, le chapeau de docteur et la couronne ducale.) Julius naquit ici, au château de Mespelbrunn, en 1545, et mourut à Würzburg en 1617, après quarante-quatre ans de fonction. En arrière-plan, on reconnaît l'hôpital Julius (fondé en 1576) avec son aile princière, où Julius résida la plupart du temps. Il fut également le fondateur de l'université de Würzburg en 1582 et agrandit la forteresse de Marienberg en 1579 avec sa bibliothèque de 4 000 volumes. Il fit en outre construire plus de 300 églises dans tout le pays (elles présentent des clochers très pointus et sont communément appelées « tours Echter »). Dans la vitrine à droite, sous le portrait de Julius Echter, on voit divers souvenirs de famille, ce qu'on appellerait aujourd'hui des « cadeaux rapportés » : une jolie sculpture, cadeau du tsar de Russie au comte Friedrich Damian von Ingelheim, qui y fut ambassadeur ; tout à droite, une tête réduite d'Amérique du Sud ; ainsi que diverses décorations honorifiques et chapelets provenant des tombes des Echter, retrouvés lors de travaux de transformation de l'église de Hessenthal. L'église de Hessenthal est l'un des lieux de sépulture de la famille Echter ; une visite est vivement recommandée (ouverte en été jusqu'à 19 heures). Le plat posé sur la table à côté montre un autre portrait de Julius Echter ; le prince-évêque utilisait ce plat pour distribuer du pain aux pauvres. Au-dessus du bassin baptismal, sur la commode, tous les enfants de la famille Ingelheim sont baptisés depuis 1700, le dernier en date étant, en 2011, le plus jeune descendant de la maison, Silvester, baptisé par l'évêque Friedhelm Hofmann de Würzburg. Dans les deux autres vitrines, vous voyez encore des biens de Julius Echter : son fusil de chasse portant date et armoiries, des cornes à poudre en os, une ceinture à belle boucle. En dessous, de vieux livres, dits reliures de la Renaissance, datant de l'époque de Julius Echter. Dans la niche se trouve un groupe de la Crucifixion en bois de buis, probablement le modèle d'un groupe en porcelaine de Höchst ; le bois de buis est réputé extrêmement difficile à travailler, car très dur. L'armoire est un cabinet baroque néerlandais incrusté de marqueteries colorées ; autrefois, les oiseaux et les fleurs étaient peints en couleurs. Au centre, un jeu de plateau séculaire, connu jusqu'au XXe siècle, appelé « la maison du bonheur ». On y jouait avec deux dés, et selon la chance du joueur, des pions étaient posés et retirés ; on gagnait beaucoup ou peu, ou bien on perdait tout.","es": "Entramos ahora en la sala sobre la capilla, la llamada Sala Echter. El retrato de cuerpo entero representa a Julius Echter (pintado en el siglo XIX), el hijo más destacado de la familia. (Sobre la mesa, en el cuadro, se reconocen los tres símbolos de su dignidad: la mitra episcopal, el birrete de doctor y la corona ducal.) Julius nació aquí, en el castillo de Mespelbrunn, en 1545, y murió en Wurzburgo en 1617, tras cuarenta y cuatro años de mandato. Al fondo se reconoce el Hospital Julius (fundado en 1576) con el ala principesca, donde Julius residió la mayor parte del tiempo. Fue también fundador de la Universidad de Wurzburgo en 1582 y amplió la fortaleza de Marienberg en 1579 con su biblioteca de 4.000 volúmenes. Además, hizo construir más de 300 iglesias por todo el país (presentan torres muy puntiagudas y se conocen popularmente como 'torres Echter'). En la vitrina de la derecha, debajo del retrato de Julius Echter, se ven diversos recuerdos de familia, lo que hoy llamaríamos 'souvenirs': una bella talla, regalo del zar ruso al conde Friedrich Damian von Ingelheim, que fue embajador allí; a la derecha del todo, una cabeza reducida de Sudamérica; además, varias condecoraciones y rosarios procedentes de las tumbas de los Echter, encontrados durante la remodelación de la iglesia de Hessenthal. La iglesia de Hessenthal es uno de los lugares de sepultura de los Echter; se recomienda mucho una visita (abierta en verano hasta las 19:00 h). El plato sobre la mesa de al lado muestra otro retrato de Julius Echter; el príncipe-obispo utilizaba este plato para repartir pan a los pobres. Sobre la pila bautismal de la cómoda se bautizan todos los hijos de los Ingelheim desde 1700, el último en 2011, el vástago más joven de la casa, Silvester, bautizado por el obispo Friedhelm Hofmann de Wurzburgo. En las otras dos vitrinas se ven más pertenencias de Julius Echter: su rifle de caza con fecha y escudo de armas, cuernos de pólvora de hueso, un cinturón con una bonita hebilla. Debajo, libros antiguos, los llamados volúmenes renacentistas, de la época de Julius Echter. En el nicho hay un grupo de la Crucifixión en madera de boj, probablemente el modelo para un grupo de porcelana de Höchst; la madera de boj se considera extremadamente difícil de trabajar, por ser muy dura. El armario es un gabinete barroco neerlandés con incrustaciones de taracea de colores; antiguamente los pájaros y las flores estaban coloreados. En el centro, un juego de mesa centenario, conocido hasta el siglo XX, llamado 'la casa de la suerte'. Se jugaba con dos dados y, según la suerte del jugador, se colocaban y retiraban fichas, ganando mucho o poco, o perdiéndolo todo.","it": "Entriamo ora nella stanza sopra la cappella, la cosiddetta Stanza Echter. Il ritratto a grandezza naturale rappresenta Julius Echter (dipinto nel XIX secolo), il figlio più importante della famiglia. (Sul tavolo nel quadro si riconoscono i tre simboli delle sue dignità: la mitra vescovile, il berretto di dottore e la corona ducale.) Julius nacque qui, nel castello di Mespelbrunn, nel 1545, e morì a Würzburg nel 1617, dopo quarantaquattro anni di mandato. Sullo sfondo si riconosce il Juliusspital (fondato nel 1576) con l'ala principesca, dove Julius risiedette per la maggior parte del tempo. Fu anche fondatore dell'Università di Würzburg nel 1582 e ampliò la fortezza di Marienberg nel 1579 con la sua biblioteca di 4.000 volumi. Inoltre fece costruire più di 300 chiese in tutto il paese (presentano guglie molto appuntite e sono popolarmente chiamate 'torri Echter'). Nella vetrina a destra, sotto il ritratto di Julius Echter, si vedono vari ricordi di famiglia, ciò che oggi chiameremmo 'souvenir': una bella scultura, regalo dello zar russo al conte Friedrich Damian von Ingelheim, che fu ambasciatore là; all'estrema destra una testa rimpicciolita sudamericana, oltre a varie decorazioni onorifiche e rosari provenienti dalle tombe degli Echter, ritrovati durante i lavori di ristrutturazione della chiesa di Hessenthal. La chiesa di Hessenthal è uno dei luoghi di sepoltura degli Echter; una visita è molto consigliata (in estate aperta fino alle 19:00). Il piatto sul tavolo accanto mostra un altro ritratto di Julius Echter; il principe-vescovo usava questo piatto per distribuire pane ai poveri. Sopra la vaschetta battesimale sul comò vengono battezzati tutti i figli degli Ingelheim dal 1700, l'ultimo nel 2011, il più giovane rampollo della casa, Silvester, battezzato dal vescovo Friedhelm Hofmann di Würzburg. Nelle altre due vetrine si vedono ulteriori oggetti appartenuti a Julius Echter: il suo fucile da caccia con data e stemma, corni da polvere in osso, una cintura con una bella fibbia. Sotto, libri antichi, le cosiddette rilegature rinascimentali, dell'epoca di Julius Echter. Nella nicchia si trova un gruppo della Crocifissione in legno di bosso, probabilmente il modello per un gruppo in porcellana di Höchst; il legno di bosso è considerato estremamente difficile da lavorare, essendo molto duro. L'armadio è un gabinetto barocco olandese intarsiato con tarsie colorate; in passato gli uccelli e i fiori erano colorati. Al centro un gioco da tavolo secolare, noto fino al XX secolo, chiamato 'la casa della fortuna'. Si giocava con due dadi e, secondo la fortuna del giocatore, si posizionavano e ritiravano pedine, vincendo molto o poco, oppure perdendo tutto.","ja": "それでは礼拝堂の上にある部屋、いわゆる「エヒターの間」へ入りましょう。実物大の肖像画に描かれているのは、一族の中で最も重要な人物であるユリウス・エヒターです（19世紀の作品）。画中のテーブルの上には、彼の三つの位の象徴である司教冠、博士帽、そして公爵冠が見て取れます。ユリウスは1545年にこのメスペルブルン城で生まれ、1617年にヴュルツブルクで、44年間の在任を経て亡くなりました。背景に見えるのは1576年創設のユリウス施療院で、ユリウスが主にその一角にある領主館に居住していました。彼は1582年にはヴュルツブルク大学の創設者でもあり、1579年にはマリエンベルク要塞を拡張し、4000冊の蔵書を持つ図書館を設けました。さらに、国内全土に300以上の教会を建てさせました。これらの教会は非常に尖った塔を持ち、民間では「エヒターの塔」と呼ばれています。ユリウス・エヒターの肖像画の右下にあるショーケースには、一族のさまざまな思い出の品、いわば今で言う「お土産」が並んでいます。美しい彫刻品はロシア皇帝からの贈り物で、当地で大使を務めたフリードリヒ・ダミアン・フォン・インゲルハイム伯爵に贈られたものです。一番右には南米製の縮小頭部、さらにヘッセンタールの教会改修時に発見された、エヒター家の墓から出土したさまざまな勲章やロザリオが見られます。ヘッセンタールの教会はエヒター家の埋葬地の一つで、訪れることを強くお勧めします（夏季は19時まで開館）。隣のテーブルにある皿には、ユリウス・エヒターの別の肖像が描かれています。この皿は、司教公が貧しい人々にパンを配るために使ったものです。たんすの上にある洗礼用の鉢の上では、1700年以来、インゲルハイム家の子供たち全員が洗礼を受けており、最後は2011年、当家最年少の子であるシルヴェスターが、ヴュルツブルクのフリートヘルム・ホフマン主教により洗礼を受けました。残りの二つのショーケースには、ユリウス・エヒターの所持品がさらに見られます。年号と紋章が入った狩猟銃、骨製の火薬入れ、美しいバックル付きのベルトです。その下には、ユリウス・エヒターの時代の古い書物、いわゆるルネサンス装丁本があります。壁のくぼみには、ツゲの木で作られた十字架刑の群像があり、おそらくヘーヒストの磁器人形群のモデルになったと考えられています。ツゲの木は非常に硬く、加工が極めて難しいとされています。戸棚はオランダのバロック様式のキャビネットで、色鮮やかな象嵌が施されています。かつては鳥や花の部分に彩色が施されていました。中央には、20世紀まで知られていた、数百年の歴史を持つボードゲーム「幸運の家」があります。これは二つのサイコロを使って遊ぶもので、プレイヤーの運次第で駒が置かれたり取り除かれたりし、大きく勝つことも、少しだけ勝つことも、あるいはすべてを失うこともありました。","zh": "我们现在进入礼拜堂上方的房间，即所谓的埃希特厅。这幅真人大小的画像描绘的是尤利乌斯·埃希特（19世纪绘制），他是这一家族中最杰出的儿子。画中桌上可见象征他三重身份的三种头冠：主教冠、博士帽以及公爵冠。尤利乌斯于1545年在这座梅斯佩尔布伦城堡出生，1617年在维尔茨堡逝世，任职长达四十四年。背景中可辨认出建于1576年的尤利乌斯济贫院，连同其中的王侯宫，尤利乌斯大部分时间都居住在那里。他还于1582年创办了维尔茨堡大学，并于1579年扩建了玛丽恩堡要塞，增设了一座藏书四千册的图书馆。此外，他还在全国各地修建了三百多座教堂；这些教堂带有极为尖耸的塔顶，民间也称之为“埃希特塔”。在尤利乌斯·埃希特画像右下方的展示柜中，可以看到家族的各种纪念物，用今天的话来说，就是“伴手礼”：一件精美的雕刻品，是俄国沙皇赠予曾任驻俄大使的弗里德里希·达米安·冯·因格尔海姆伯爵的礼物；最右侧是一件来自南美的缩头标本，此外还有一些荣誉勋章及念珠，这些是在黑森塔尔教堂改建期间，从埃希特家族墓穴中发现的。黑森塔尔教堂正是埃希特家族的一处安葬地，非常值得前往参观（夏季开放至晚上七点）。旁边桌上的盘子上，描绘的是另一幅尤利乌斯·埃希特的画像；这位采邑主教曾用这只盘子向贫民分发面包。衣柜上方那只洗礼盘上方，自1700年起，所有因格尔海姆家族的孩子均在此受洗，最近一次是在2011年，由维尔茨堡的弗里德赫尔姆·霍夫曼主教为这家族最年幼的后代希尔维斯特施洗。在另外两座展示柜中，您还能看到尤利乌斯·埃希特的其他遗物：标有年份和纹章的猎枪、骨制火药角，以及一条带有精美扣环的腰带。下方陈列的是尤利乌斯·埃希特时代的古老书籍，所谓的文艺复兴装订本。壁龛中陈列着一组以黄杨木雕刻的受难群像，很可能正是赫希斯特瓷器群像的原型；黄杨木质地极为坚硬，被认为非常难以加工。这座柜子是一件荷兰巴洛克式柜橱，镶嵌有色彩斑斓的嵌花图案；早年那些鸟兽花卉图案原本是上色的。中间陈列着一种历经数百年历史、直至20世纪仍为人所知的棋盘游戏，名为“幸运之家”。游戏使用两枚骰子进行，依玩家的运气，棋子会被放置或移除，可能赢得多寡不一，也可能输掉一切。"}},{"id": 8,"icon": "🏮","key": "chinesischer-salon","names": {"en": "Chinese Salon","fr": "Salon Chinois","es": "Salón Chino","it": "Salone Cinese","ja": "中国の間","zh": "中国沙龙"},"subs": {"en": "Porcelain, lacquer & the world beyond Europe","fr": "Porcelaine, laque & le monde au-delà de l'Europe","es": "Porcelana, laca y el mundo más allá de Europa","it": "Porcellana, lacca e il mondo oltre l'Europa","ja": "陶磁器、漆、そしてヨーロッパの向こうの世界","zh": "瓷器、漆器与欧洲之外的世界"},"tips": {"en": "One of the samurai armours has an African spear — can you spot which one?","fr": "L'une des armures de samouraï tient une lance africaine — pouvez-vous trouver laquelle ?","es": "Una de las armaduras de samurái tiene una lanza africana — ¿pueden encontrar cuál?","it": "Una delle armature da samurai ha una lancia africana — riuscite a trovare quale?","ja": "侍の鎧の一つはアフリカの槍を持っています——どちらかわかりますか？","zh": "其中一套武士盔甲手持非洲长矛——您能找出是哪一套吗？"},"texts": {"en": "The Chinese Salon. In the 16th century the first missionaries traveled to China, followed by European merchants who exported precious porcelain. It was not until 1710 that the first porcelain was produced in Meissen. The lacquer furniture is likewise of Chinese origin; however, only the panels were brought to Europe, and local cabinetmakers used them to veneer furniture in the taste of the time. The tabletop consists of a hundred layers of lacquer, each of which had to dry individually before the next could be applied, gradually producing these wonderfully three-dimensional forms. The portrait above the door shows Count Anton Dietrich, who assembled the collection. The carvings below depict Pan, the pagan god of shepherds, from whom the word panic is derived. The armor in front of the fireplace belongs to samurai, Japanese warriors of the 16th to 18th centuries. One of the samurai is, notably, holding an African spear; can you tell which one it is? This armor remained in use there well into the 19th century. The life of the samurai has once again become an increasing subject of study in recent times. The Japanese embraced every change of the modern era with great enthusiasm, and through trading transactions, parted with their historically significant treasures quite unconcernedly up until the mid-17th century. This is the only explanation for why there are so many Japanese art treasures in the West, even though the country itself was never subjected to plundering. The painting above the sofa is by the painter Kaspar Schneider; it shows the young Count Friedrich Karl as a page. In earlier times, boys were educated at the court schools of a prince and trained to become future officials. At festivities they had to attend to the guests and perform other auxiliary services, wearing these colorful page uniforms made of silk taffeta. The wallpaper is made of paper with a copper embossing; over the centuries it has darkened considerably near the fireplace and originally had a richer, deeper red tone.","fr": "Le Salon Chinois. Au XVIe siècle, les premiers missionnaires se rendirent en Chine, suivis par les marchands européens qui exportèrent de la précieuse porcelaine. Ce n'est qu'en 1710 que la première porcelaine fut fabriquée à Meissen. Les meubles laqués sont eux aussi d'origine chinoise ; cependant, seuls les panneaux furent rapportés en Europe, et les menuisiers locaux les utilisèrent pour plaquer des meubles selon le goût de l'époque. Le plateau de la table est composé d'une centaine de couches de laque, chacune devant sécher individuellement avant que la suivante ne soit appliquée, créant ainsi peu à peu ces formes au merveilleux effet tridimensionnel. Le portrait au-dessus de la porte représente le comte Anton Dietrich, qui constitua la collection. Les sculptures du bas représentent Pan, le dieu païen des bergers, dont dérive le mot « panique ». Les armures devant la cheminée appartiennent à des samouraïs, chevaliers japonais du XVIe au XVIIIe siècle. (Remarquez qu'un des samouraïs tient une lance africaine — saurez-vous deviner lequel ?) Ces armures y furent portées jusque bien avant dans le XIXe siècle. La vie des samouraïs a récemment fait l'objet d'un intérêt croissant dans les études. Les Japonais accueillirent avec grand enthousiasme tous les changements de l'époque moderne, et se séparèrent, dans le cadre d'échanges commerciaux, assez sereinement de leurs trésors historiques jusqu'au milieu du XVIIe siècle. C'est la seule explication au fait qu'il existe en Occident tant de trésors artistiques japonais, bien que le pays n'ait jamais été soumis à des pillages. Le tableau au-dessus du canapé est du peintre Kaspar Schneider ; il représente le jeune comte Friedrich Karl en page. Autrefois, les garçons étaient instruits dans les écoles de cour d'un prince et formés pour devenir de futurs fonctionnaires. Lors des fêtes, ils devaient s'occuper des invités et accomplir d'autres tâches d'assistance, portant à cette occasion ces uniformes de page colorés en taffetas de soie. Le papier peint est en papier avec un gaufrage de cuivre ; il s'est considérablement assombri au fil des siècles près de la cheminée et avait autrefois un ton rouge plus riche et plus profond.","es": "El Salón Chino. En el siglo XVI, los primeros misioneros viajaron a China, seguidos por los comerciantes europeos, que exportaron porcelana preciosa. No fue hasta 1710 cuando se fabricó la primera porcelana en Meissen. Los muebles lacados son también de origen chino; sin embargo, solo se trajeron a Europa los paneles, con los que los ebanistas locales chapaban los muebles según el gusto de la época. El tablero de la mesa está compuesto por cien capas de laca, cada una de las cuales tenía que secarse individualmente antes de aplicar la siguiente, dando lugar poco a poco a estas formas de efecto maravillosamente tridimensional. El retrato sobre la puerta muestra al conde Anton Dietrich, que reunió la colección. Las talladuras de abajo representan a Pan, el dios pagano de los pastores, de quien deriva la palabra pánico. Las armaduras frente a la chimenea pertenecen a samuráis, caballeros japoneses de los siglos XVI al XVIII. (Atención: uno de los samuráis tiene en la mano una lanza africana; ¿sabrían decir cuál de los dos?) Estas armaduras se siguieron usando allí hasta bien entrado el siglo XIX. La vida de los samuráis ha vuelto a ser, en los últimos tiempos, objeto cada vez más frecuente de estudio. Los japoneses acogieron con gran entusiasmo todos los cambios de la época moderna y, en el marco de transacciones comerciales, se desprendieron con bastante despreocupación de sus tesoros históricos hasta mediados del siglo XVII. Solo así se explica que en Occidente haya tantos tesoros artísticos japoneses, a pesar de que el país nunca sufrió saqueos. El cuadro sobre el sofá es del pintor Kaspar Schneider; muestra al pequeño conde Friedrich Karl como paje. Antiguamente, los muchachos eran instruidos en las escuelas de la corte de un príncipe y formados para convertirse en futuros funcionarios. En las festividades debían atender a los invitados y realizar otras tareas auxiliares, vistiendo para ello estos coloridos uniformes de paje de tafetán de seda. El papel pintado es de papel con repujado de cobre; con el paso de los siglos se ha oscurecido considerablemente cerca de la chimenea y antiguamente tenía un tono rojo más intenso y profundo.","it": "Il Salotto Cinese. Nel XVI secolo i primi missionari si recarono in Cina, seguiti dai mercanti europei che esportarono preziose porcellane. Solo nel 1710 fu prodotta la prima porcellana a Meissen. Anche i mobili laccati sono di origine cinese; tuttavia, solo i pannelli furono portati in Europa, e gli ebanisti locali li usarono per impiallacciare i mobili secondo il gusto dell'epoca. Il piano del tavolo è composto da cento strati di laccatura, ognuno dei quali doveva asciugarsi singolarmente prima che il successivo potesse essere applicato, dando origine poco a poco a queste forme con un meraviglioso effetto tridimensionale. Il ritratto sopra la porta mostra il conte Anton Dietrich, che costituì la collezione. Gli intagli in basso rappresentano Pan, il dio pagano dei pastori, da cui deriva la parola panico. Le armature davanti al camino appartengono a samurai, cavalieri giapponesi dal XVI al XVIII secolo. (Attenzione: uno dei samurai tiene in mano una lancia africana; saprete dire quale dei due?) Queste armature furono indossate lì fino a buona parte del XIX secolo. La vita dei samurai è recentemente tornata a essere sempre più oggetto di studio. I giapponesi accolsero con grande entusiasmo ogni cambiamento dell'epoca moderna e, nel quadro di scambi commerciali, si separarono con notevole disinvoltura dai loro tesori storici fino alla metà del XVII secolo. Solo così si spiega perché in Occidente ci siano così tanti tesori artistici giapponesi, nonostante il paese non sia mai stato soggetto a saccheggi. Il dipinto sopra il divano è del pittore Kaspar Schneider; mostra il piccolo conte Friedrich Karl come paggio. In passato i ragazzi venivano istruiti nelle scuole di corte di un principe e formati per diventare futuri funzionari. Durante le festività dovevano occuparsi degli ospiti e svolgere altri servizi ausiliari, indossando queste colorate uniformi da paggio in taffettà di seta. La carta da parati è in carta con goffratura in rame; nel corso dei secoli si è scurita notevolmente vicino al camino e in origine aveva una tonalità rossa più intensa e profonda.","ja": "中国の間。16世紀には最初の宣教師たちが中国へ渡り、その後ヨーロッパの商人たちが続き、貴重な磁器を輸出するようになりました。マイセンで最初の磁器が作られたのは、ようやく1710年のことでした。漆塗りの家具もまた中国起源のものです。ただし、ヨーロッパに運ばれたのは漆の板の部分のみで、現地の指物師たちがそれを使って、当時の趣味に合わせた家具に化粧張りを施しました。このテーブルの天板は百層もの漆から成り立っており、一層ごとに乾燥させてから次の層を重ねる必要がありました。こうして徐々に、この見事な立体感を持つ作品が生まれたのです。ドアの上の肖像画は、このコレクションを築いたアントン・ディートリヒ伯爵を描いています。下にある彫刻は、異教の牧羊神パーンを表しており、「パニック」という言葉はこの神の名に由来します。暖炉の前にある甲冑は、16世紀から18世紀の日本の武士、いわゆる侍のものです（注目：このうち一人の侍はアフリカの槍を手にしています。どちらの侍でしょうか？）。この甲冑は19世紀に入ってもなお、かなり後まで実際に着用されていました。近年、侍の生活は再び研究の対象として注目を集めています。日本人は近代のあらゆる変化を大きな熱意で受け入れ、17世紀半ばまでは、貿易取引の中で、歴史的価値のある宝物をかなり無頓着に手放していました。これこそが、日本がいかなる略奪も受けていないにもかかわらず、西洋にこれほど多くの日本美術の宝が存在する理由を説明しています。ソファの上の絵画は画家カスパー・シュナイダーの作品で、少年であったフリードリヒ・カール伯爵を、小姓の姿で描いています。かつて少年たちは、ある君主の宮廷付き学校で教育を受け、将来の役人として育成されました。祝宴の際には、来客の世話やその他の補助的な仕事を担い、その際には絹タフタ製の色鮮やかな小姓の制服を身につけました。壁紙は銅の押し型模様が施された紙製で、暖炉の影響もあり、数世紀を経て大きく色が濃くなっています。元々はより濃く鮮やかな赤色をしていました。","zh": "中国厅。16世纪，最早一批传教士前往中国，随后欧洲商人也紧随其后，开始出口珍贵的瓷器。直到1710年，迈森才生产出第一批瓷器。这里的漆器家具同样源自中国；然而，当时只有漆板被运往欧洲，当地的木匠再依照那个时代的审美趣味，用这些漆板为家具镶贴饰面。这张桌面由上百层漆面构成，每一层都必须单独干燥之后，才能在其上涂覆下一层，正是这样层层叠加，才逐渐形成了这种奇妙的立体效果。门上方的画像描绘的是安东·迪特里希伯爵，正是他建立了这套收藏。下方的雕刻表现的是潘，希腊神话中异教的牧羊神，英语中“panic（恐慌）”一词正是由此而来。壁炉前的盔甲属于武士，即16至18世纪的日本武士。（请留意：其中一位武士手持一支非洲长枪——您能分辨出是哪一位吗？）这些盔甲在日本一直沿用到19世纪中后期。近年来，武士的生活方式再次成为研究的热门课题。日本人以极大的热情接受了近代以来的种种变革，并在17世纪中期之前，于贸易往来中颇为随意地将自己承载历史的珍宝转让出去。正因如此，才能解释为何西方拥有如此之多的日本艺术珍品，尽管这个国家本身从未遭受过劫掠。沙发上方的画作出自画家卡斯帕·施奈德之手，描绘的是年幼的弗里德里希·卡尔伯爵身着侍童服饰的形象。早年，男孩们会在某位诸侯的宫廷学校接受教育，被培养为未来的官员。每逢庆典之时，他们需要照应宾客，并承担其他辅助性事务，当时所穿的，正是这种以丝绸塔夫绸制成、色彩鲜艳的侍童制服。这里的墙纸是带有铜版压花纹饰的纸质墙纸，历经数个世纪，在壁炉附近的颜色已大为加深，原本则呈现出更为浓郁的红色调。"}},{"id": 9,"icon": "🛏️","key": "fürstenzimmer","names": {"en": "Prince's Chamber","fr": "Chambre Princière","es": "Cámara del Príncipe","it": "Camera del Principe","ja": "侯爵の間","zh": "王侯室"},"subs": {"en": "The princely bed & the family to this day","fr": "Le lit princier & la famille jusqu'à aujourd'hui","es": "La cama principesca y la familia hasta hoy","it": "Il letto principesco e la famiglia fino ad oggi","ja": "王侯のベッドと現代の家族","zh": "王侯之床与当代家族"},"tips": {"en": "The last owners of this room were a family connected to the July 1944 assassination attempt on Hitler.","fr": "Les derniers occupants de cette chambre étaient une famille liée à l'attentat du 20 juillet 1944 contre Hitler.","es": "Los últimos propietarios de esta habitación eran una familia relacionada con el atentado del 20 de julio de 1944 contra Hitler.","it": "Gli ultimi proprietari di questa stanza erano una famiglia legata all'attentato del 20 luglio 1944 contro Hitler.","ja": "この部屋の最後の所有者は、1944年7月のヒトラー暗殺未遂事件と関係のある家族でした。","zh": "这个房间最后的主人所在的家族，与1944年7月针对希特勒的暗杀未遂事件有所关联。"},"texts": {"en": "We now enter the Prince's Room, furnished with a princely bed. It dates from the 17th century, probably from the beginning of the Ingelheim dynasty. The canopy rests on four twisted columns, and the headboard side has an ornate, curved crest. According to one saying, this crest represents the so-called 'high ledge,' on which one would place one's valuables at night for safekeeping. The canopy also served as a so-called 'bug catcher,' since in past centuries such small creatures tended to gather high up in the timberwork. The carved figures on the headboard and footboard, and within the canopy, which can appear somewhat unsettling, are once again apotropaic figures, grotesque faces meant to drive away evil spirits at night. Above the bed you see a painting of Julius Echter in episcopal vestments, holding sword and bishop's staff in his hands. The woodcuts on the paneling depict the 'Great' and 'Little Passion,' the Way of the Cross of Christ; the small engravings are by the artist Aldegrever. The portraits above continue the ancestral line of the Ingelheim-Echter family into the 20th century. Above the door is depicted the son of Count Friedrich Karl, together with his wife, née Countess Stein. Above the cabinet, undated, are the great-great-grandparents of the present owner, Count Friedrich Carl and his wife, a Baroness Lasalle Louisenthal; the painting was made by her sister when she was seventeen years old. The Countess died giving birth to her first child, Count Philipp Rudolf. His wife, the great-grandmother of the present owner, Leopoldine, née Countess von Stauffenberg, was a cousin of the officer Claus Count von Stauffenberg, who, following a failed assassination attempt on Adolf Hitler, was murdered by the Nazis in 1944, with almost the entire Stauffenberg family taken into collective punishment. Above the door you see three children, painted in 1914 by Adalbert Hock. The eldest, Count Haman, is the father of Count Albrecht von Ingelheim, who died in December 2006 at the age of sixty-one. In the painting above the stove he is shown surrounded by his siblings and parents; his mother was born a Baroness von Freyberg-Eisenberg-Allmendingen and died in November 2007. The late lord of the castle, Count Albrecht, is seen on the left of the painting, beside his siblings Count Peter, Countess Leopoldine, Countess Isabella, and Count Julius. Count Albrecht's eldest daughter, Marie Antoinette, took over the castle from her father after his death in 2006; together with her husband Karl Theodor and her mother, Countess Hedwig, she is devoted to the preservation of Mespelbrunn Castle. To the right of the bed you see a small blue and white vase, a tulip vase. When the first tulips arrived in Germany, they were objects of speculation and, during the so-called 'tulip mania,' exorbitantly expensive. To showcase each individual bloom, vases were made with these small arms, so that only a few tulips were needed to fill the vase. The beautiful mirror comes from Lohr am Main.\n\nNow we make our way back down through the staircase into the courtyard. Please remember your backpacks and umbrellas! We will walk together once more to the forester's house.\n\nI hope you have enjoyed this journey through history. Thank you very much for your attention, and we would be delighted to receive a good review on Google and elsewhere. I wish you a pleasant stay in the Spessart.","fr": "Nous entrons maintenant dans la Chambre Princière, équipée d'un lit princier. Il date du XVIIe siècle, probablement du début de la dynastie d'Ingelheim. Le baldaquin repose sur quatre colonnes torsadées, et le côté de tête présente un couronnement orné et galbé. Selon une expression populaire, ce couronnement serait ce qu'on appelle la « haute corniche », sur laquelle on déposait le soir ses objets précieux. Le baldaquin servait également de ce qu'on appelle un « attrape-punaises », ces petites bêtes ayant tendance, par le passé, à se loger tout en haut dans la charpente. Les figures sculptées, parfois quelque peu troublantes, sur les côtés tête et pied ainsi que dans le baldaquin, sont à nouveau des figures conjuratoires (grimaces), destinées à chasser les mauvais esprits durant la nuit. Au-dessus du lit, vous voyez un tableau de Julius Echter en habit épiscopal, tenant dans ses mains une épée et une crosse d'évêque. Les gravures sur bois du lambris représentent la « Grande » et la « Petite Passion » (le chemin de croix du Christ) ; les petites gravures sont de l'artiste Aldegrever. Les portraits au-dessus poursuivent la lignée généalogique de la famille Ingelheim-Echter jusqu'au XXe siècle. Au-dessus de la porte est représenté le fils du comte Friedrich Karl, avec son épouse, née comtesse Stein. Au-dessus de l'armoire (non datée) figurent les arrière-arrière-grands-parents de l'actuelle propriétaire, le comte Friedrich Carl et son épouse, une baronne Lasalle Louisenthal ; le tableau fut peint par sa sœur lorsque celle-ci avait dix-sept ans. La comtesse mourut en donnant naissance à son premier enfant, le comte Philipp Rudolf. Son épouse, l'arrière-grand-mère de l'actuelle propriétaire, Léopoldine, née comtesse von Stauffenberg, était une cousine de l'officier Claus comte von Stauffenberg. Claus comte von Stauffenberg fut assassiné par les nazis en 1944 à la suite d'un attentat manqué contre Adolf Hitler, et presque toute la famille Stauffenberg fut alors soumise à une responsabilité collective. Au-dessus de la porte, vous voyez trois enfants, peints en 1914 par Adalbert Hock. L'aîné, le comte Haman, est le père du comte Albrecht von Ingelheim, décédé en décembre 2006 à l'âge de soixante-et-un ans. Sur le tableau au-dessus du poêle, on le voit entouré de ses frères et sœurs et de ses parents ; sa mère était née baronne von Freyberg-Eisenberg-Allmendingen et mourut en novembre 2007. L'ancien seigneur du château, le comte Albrecht, est visible à gauche du tableau, à côté de ses frères et sœurs, le comte Peter, la comtesse Léopoldine, la comtesse Isabella et le comte Julius. La fille aînée du comte Albrecht, Marie Antoinette, reprit le château après le décès de son père en 2006 ; avec son époux Karl Theodor et sa mère, la comtesse Hedwig, elle se consacre à la préservation du château de Mespelbrunn. À droite du lit, vous voyez un petit vase bleu et blanc, un vase à tulipes. Lorsque les premières tulipes arrivèrent en Allemagne, elles étaient encore des objets de spéculation et, durant ce qu'on appelle la « tulipomanie », elles atteignirent des prix exorbitants. Afin de mettre chaque fleur particulièrement en valeur, on fit fabriquer des vases munis de ces petits bras, de sorte qu'il suffisait de peu de tulipes pour remplir le vase. Le beau miroir provient de Lohr am Main.\n\nNous redescendons maintenant par l'escalier vers la cour. Pensez à vos sacs à dos et à vos parapluies ! Nous nous dirigeons ensemble vers la maison forestière.\n\nJ'espère que ce parcours à travers l'histoire vous a plu. Merci beaucoup pour votre attention, et nous serions ravis de recevoir un bon avis sur Google ou ailleurs. Je vous souhaite un agréable séjour dans le Spessart.","es": "Entramos ahora en la Sala Principesca, equipada con una cama principesca. Data del siglo XVII, probablemente de los inicios de la dinastía de Ingelheim. El baldaquín descansa sobre cuatro columnas torneadas, y el lado de la cabecera tiene un remate decorado y curvado. Según un dicho, ese remate sería la llamada 'repisa alta', donde por la noche se depositaban los objetos de valor. El baldaquín también servía como llamado 'cazainsectos', ya que estos pequeños animales solían instalarse, en siglos pasados, en lo alto de la estructura de madera. Las figuras talladas, en parte algo inquietantes, en la cabecera, los pies y dentro del baldaquín, son de nuevo figuras apotropaicas (muecas), destinadas a ahuyentar a los malos espíritus durante la noche. Sobre la cama se ve un cuadro de Julius Echter con ornamentos episcopales, con espada y báculo episcopal en sus manos. Los grabados en madera del artesonado representan la 'Gran' y la 'Pequeña Pasión' (el camino de la cruz de Cristo); los pequeños grabados son del artista Aldegrever. Los retratos de encima continúan la línea ancestral de la familia Ingelheim-Echter hasta el siglo XX. Sobre la puerta está representado el hijo del conde Friedrich Karl, junto con su esposa, de soltera condesa Stein. Sobre el armario (sin fecha), los tatarabuelos de la actual propietaria, el conde Friedrich Carl y su esposa, una baronesa Lasalle Louisenthal; el cuadro fue pintado por su hermana cuando ésta tenía diecisiete años. La condesa murió al dar a luz a su primer hijo, el conde Philipp Rudolf. Su esposa, la bisabuela de la actual propietaria, Leopoldine, de soltera condesa von Stauffenberg, era prima del oficial Claus conde von Stauffenberg. Claus conde von Stauffenberg fue asesinado por los nazis en 1944 tras un intento fallido de atentado contra Adolf Hitler, y casi toda la familia Stauffenberg fue sometida a represalias colectivas. Sobre la puerta se ven tres niños, pintados en 1914 por Adalbert Hock. El mayor, el conde Haman, es el padre del conde Albrecht von Ingelheim, fallecido en diciembre de 2006 a los sesenta y un años. En el cuadro sobre la estufa se le ve rodeado de sus hermanos y padres; su madre nació baronesa von Freyberg-Eisenberg-Allmendingen y murió en noviembre de 2007. El difunto señor del castillo, el conde Albrecht, se ve a la izquierda del cuadro, junto a sus hermanos, el conde Peter, la condesa Leopoldine, la condesa Isabella y el conde Julius. La hija mayor del conde Albrecht, Marie Antoinette, tomó el castillo de manos de su padre tras su muerte en 2006; junto con su esposo Karl Theodor y su madre, la condesa Hedwig, se dedica a la conservación del castillo de Mespelbrunn. A la derecha de la cama se ve un pequeño jarrón azul y blanco, un jarrón para tulipanes. Cuando las primeras tulipanes llegaron a Alemania, eran todavía objeto de especulación y, durante la llamada 'manía de los tulipanes', alcanzaron precios exorbitantes. Para destacar cada flor individualmente, se hacían fabricar jarrones con estos pequeños brazos, de modo que se necesitaban pocos tulipanes para llenar el jarrón. El hermoso espejo procede de Lohr am Main.\n\nAhora bajamos de nuevo al patio a través de la escalera. ¡Por favor, no olviden sus mochilas y paraguas! Continuamos juntos hacia la casa forestal.\n\nEspero que este recorrido por la historia les haya gustado. Muchas gracias por su atención, y nos alegraría mucho recibir una buena valoración en Google y similares. Les deseo una agradable estancia en el Spessart.","it": "Entriamo ora nella Stanza del Principe, arredata con un letto principesco. Risale al XVII secolo, probabilmente agli inizi della dinastia degli Ingelheim. Il baldacchino riposa su quattro colonne tortili, e il lato della testiera ha un coronamento decorato e sagomato. Secondo un modo di dire, questo coronamento sarebbe il cosiddetto 'ripiano alto', sul quale la sera si depositavano gli oggetti di valore. Il baldacchino fungeva anche da cosiddetto 'cattura-insetti', poiché questi piccoli animali nei secoli passati si annidavano in alto nell'intelaiatura di legno. Le figure scolpite, in parte un po' inquietanti, sui lati della testiera e dei piedi e all'interno del baldacchino, sono di nuovo figure apotropaiche (smorfie), destinate a scacciare gli spiriti maligni durante la notte. Sopra il letto si vede un dipinto di Julius Echter in paramenti episcopali, con spada e bastone vescovile nelle mani. Le xilografie sul rivestimento in legno rappresentano la 'Grande' e la 'Piccola Passione' (la via crucis di Cristo); le piccole incisioni sono dell'artista Aldegrever. I ritratti sopra continuano la sequenza genealogica della famiglia Ingelheim-Echter fino al XX secolo. Sopra la porta è ritratto il figlio del conte Friedrich Karl, insieme alla moglie, nata contessa Stein. Sopra l'armadio (senza data) i pro-pro-nonni dell'attuale proprietaria, il conte Friedrich Carl e sua moglie, una baronessa Lasalle Louisenthal; il dipinto fu realizzato da sua sorella quando questa aveva diciassette anni. La contessa morì dando alla luce il suo primo figlio, il conte Philipp Rudolf. Sua moglie, la bisnonna dell'attuale proprietaria, Leopoldine, nata contessa von Stauffenberg, era cugina dell'ufficiale Claus conte von Stauffenberg. Claus conte von Stauffenberg fu assassinato dai nazisti nel 1944 in seguito a un fallito attentato contro Adolf Hitler, e quasi tutta la famiglia Stauffenberg fu sottoposta a rappresaglie collettive. Sopra la porta si vedono tre bambini, dipinti nel 1914 da Adalbert Hock. Il maggiore, il conte Haman, è il padre del conte Albrecht von Ingelheim, deceduto nel dicembre 2006 a sessantuno anni. Nel dipinto sopra la stufa lo si vede circondato dai suoi fratelli e dai genitori; sua madre era nata baronessa von Freyberg-Eisenberg-Allmendingen e morì nel novembre 2007. L'ultimo signore del castello, il conte Albrecht, si vede a sinistra nel dipinto, accanto ai suoi fratelli, il conte Peter, la contessa Leopoldine, la contessa Isabella e il conte Julius. La figlia maggiore del conte Albrecht, Marie Antoinette, ha preso in consegna il castello dal padre dopo la sua morte nel 2006; insieme al marito Karl Theodor e a sua madre, la contessa Hedwig, si dedica alla conservazione del castello di Mespelbrunn. A destra del letto si vede un piccolo vaso blu e bianco, un vaso da tulipani. Quando i primi tulipani arrivarono in Germania, erano ancora oggetto di speculazione e, durante la cosiddetta 'mania dei tulipani', raggiunsero prezzi esorbitanti. Per valorizzare ogni singolo fiore, si facevano realizzare vasi con questi piccoli braccioli, così che bastavano pochi tulipani per riempire il vaso. Il bellissimo specchio proviene da Lohr am Main.\n\nOra scendiamo di nuovo nella corte attraverso la scala. Per favore, ricordatevi degli zaini e degli ombrelli! Continuiamo insieme verso la casa forestale.\n\nSpero che questo percorso attraverso la storia vi sia piaciuto. Grazie mille per la vostra attenzione, e saremo lieti di una buona valutazione su Google e altrove. Vi auguro un piacevole soggiorno nello Spessart.","ja": "それでは「君主の間」へ入りましょう。ここには君主用の寝台が備えられています。これは17世紀のもので、おそらくインゲルハイム家の王朝が始まった頃のものです。天蓋は四本のねじれた柱に支えられ、正面には装飾的な、曲線を描く頭飾りがあります。ある言い伝えによれば、この頭飾りは「高い縁」と呼ばれる場所で、夜になるとそこに貴重品を置いたとされています。また、天蓋は「虫取り器」としての役割も果たしていました。過去の世紀には、こうした小さな虫が梁の高いところに住み着いていたのです。正面と頭側、そして天蓋の部分に見られる、一部やや不気味にも見える彫刻像は、再びこの「魔除け像」、つまり夜に悪霊を追い払うための鬼面です。寝台の上には、司教の正装をまとい、剣と司教杖を手にしたユリウス・エヒターの絵が掛けられています。羽目板に施された木版画は、「大受難」と「小受難」（キリストの十字架への道）を表しています。小さな版画はアルデグレファーの作品です。その上にある肖像画群は、インゲルハイム＝エヒター家の系譜を20世紀まで描き続けています。ドアの上には、フリードリヒ・カール伯爵の息子と、その妻（旧姓シュタイン伯爵夫人）が描かれています。戸棚の上（年代不詳）には、現所有者の曽祖父母の代にあたる、フリードリヒ・カール伯爵とその妻、ラ・サール・ルイゼンタール男爵夫人が描かれています。この絵は、彼女の妹が17歳のときに描いたものです。この伯爵夫人は、最初の子であるフィリップ・ルドルフ伯爵を出産した際に亡くなりました。そのフィリップ・ルドルフの妻、現所有者の曽祖母にあたるレオポルディーネ（旧姓シュタウフェンベルク伯爵夫人）は、軍人クラウス・フォン・シュタウフェンベルク伯爵の従姉妹でした。クラウス・フォン・シュタウフェンベルク伯爵は、1944年にアドルフ・ヒトラーへの暗殺計画が失敗した後、ナチスによって処刑され、シュタウフェンベルク家のほぼ全員が連帯責任として拘束されました。ドアの上には、1914年にアーダルベルト・ホックによって描かれた三人の子供たちの姿があります。長男であるハマン伯爵は、2006年12月に61歳で亡くなったアルブレヒト・フォン・インゲルハイム伯爵の父親です。暖炉の上の絵には、彼が兄弟姉妹と両親に囲まれている様子が描かれています。彼の母親は、旧姓フライベルク＝アイゼンベルク＝アルメンディンゲン男爵夫人で、2007年11月に亡くなりました。亡くなった城主アルブレヒト伯爵は、絵の左側に描かれています。彼の隣には、兄弟姉妹であるペーター伯爵、レオポルディーネ伯爵夫人、イザベラ伯爵夫人、ユリウス伯爵が並んでいます。アルブレヒト伯爵の長女マリー・アントワネットは、2006年の父の死後、城を引き継ぎました。夫であるカール・テオドールと母であるヘートヴィヒ伯爵夫人とともに、メスペルブルン城の保存に取り組んでいます。寝台の右側には、小さな青と白の花瓶がございます。これはチューリップ用の花瓶です。最初のチューリップがドイツにもたらされた頃、それはまだ投機の対象であり、いわゆる「チューリップ・マニア」の時代には、非常に高価なものでした。それぞれの花を特に目立たせるために、小さな腕のような形をした花瓶が作られ、わずかな本数のチューリップで花瓶を満たすことができるよう工夫されていました。美しい鏡はマイン河畔のロールのものです。\n\nそれでは階段を通って中庭へ戻りましょう。リュックサックや傘をお忘れなく！それでは皆さまと一緒に森林管理舎へ向かいましょう。\n\nこの歴史をたどる旅をお楽しみいただけましたら幸いです。ご清聴いただき、誠にありがとうございました。Googleなどでの良い評価をいただけますと幸いです。シュペッサルトでの滞在が素晴らしいものとなりますように。","zh": "我们现在进入诸侯厅，这里陈设着一张诸侯专用的床。它出自17世纪，很可能正值因格尔海姆家族王朝初创之时。床顶华盖由四根旋转雕花的立柱支撑，床头一侧饰有华丽的曲线形顶饰。据一种说法，这一顶饰即是所谓的“高架”，夜间人们会将贵重物品放置其上。此外，这座华盖也曾充当所谓的“捕虫器”，因为在过去的几个世纪中，这类小虫常常栖息于高处的木梁之间。床头、床尾以及华盖内侧那些有些令人略感不安的雕刻人像，同样是用来镇压邪祟的“镶魔像”，即怪面雕饰，意在于夜间驱散恶灵。床上方悬挂着一幅画作，描绘尤利乌斯·埃希特身着主教礼服，手持长剑与主教杖。镶板上的木刻版画描绘的是“大苦难”与“小苦难”，即基督受难之路；这些小型版画出自艺术家阿尔德格雷弗之手。上方的肖像群，将因格尔海姆－埃希特家族的世系一直延续描绘至20世纪。门上方描绘的是弗里德里希·卡尔伯爵之子，以及其妻子（原姓施泰因女伯爵）。柜子上方（年代未标注）描绘的是现任主人的曾曾祖父母，弗里德里希·卡尔伯爵与其妻子拉萨尔·路易森塔尔男爵夫人；这幅画是由她的妹妹在十七岁时所绘。这位伯爵夫人在生育第一个孩子，即菲利普·鲁道夫伯爵时不幸去世。菲利普·鲁道夫的妻子，即现任主人的曾祖母利奥波尔迪娜（原姓施陶芬贝格女伯爵），是军官克劳斯·冯·施陶芬贝格伯爵的表姐妹。克劳斯·冯·施陶芬贝格伯爵在1944年刺杀阿道夫·希特勒未遂之后，遭纳粹处决，施陶芬贝格家族几乎全员因此被株连拘禁。门上方可见三位孩童的画像，由阿达尔贝特·霍克于1914年绘制。其中年纪最大的哈曼伯爵，正是2006年12月以六十一岁之龄逝世的阿尔布雷希特·冯·因格尔海姆伯爵之父。壁炉上方的画作中，可见他与兄弟姐妹及父母共同入画；他的母亲出身弗赖贝格－艾森贝格－阿尔门丁根男爵之女，于2007年11月逝世。已故的城堡之主阿尔布雷希特伯爵，画中位于左侧，旁边是他的兄弟姐妹彼得伯爵、利奥波尔迪娜女伯爵、伊莎贝拉女伯爵以及尤利乌斯伯爵。阿尔布雷希特伯爵的长女玛丽·安托瓦内特，在其父于2006年逝世后接管了城堡；她与丈夫卡尔·特奥多尔，以及母亲赫德维希女伯爵，共同致力于梅斯佩尔布伦城堡的保护工作。床的右侧还能看到一只小巧的青花瓷瓶，是一只郁金香瓶。最早的郁金香传入德国之时，仍属投机性商品，在所谓的“郁金香狂热”时期，价格极为高昂。为了让每一朵郁金香都能格外醒目地展示出来，人们特制了带有这些小型臂状托座的花瓶，使得只需少量几朵郁金香便能填满整只花瓶。这面精美的镜子产自美因河畔的洛尔。\n\n现在，我们将穿过楼梯重新返回内庭。请别忘了您的背包和雨伞！我们将一起前往林务所。\n\n希望这次历史之旅让您感到愉快。非常感谢您的关注，也欢迎大家在Google等平台上给予好评。祝您在施佩萨特地区度过愉快的时光。"}}];const langList = [{c:"en",l:"&#127468;&#127463; EN"},{c:"fr",l:"&#127467;&#127479; FR"},{c:"es",l:"&#127466;&#127480; ES"},{c:"it",l:"&#127470;&#127481; IT"},{c:"ja",l:"&#127471;&#127477; JA"},{c:"zh",l:"&#127464;&#127475; ZH"}];
const langNames = {en:"English",fr:"Français",es:"Español",it:"Italiano",ja:"日本語",zh:"中文"};
const langCodes = {en:"en-GB",fr:"fr-FR",es:"es-ES",it:"it-IT",ja:"ja-JP",zh:"zh-CN"};

let cur=0, lang="en", playing=false, prog=0, ticker=null, utter=null, textOpen=false;
let touchStartX=0, touchStartY=0;

function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+":"+(sec<10?"0":"")+sec}
function dur(r){return r.texts&&r.texts[lang]?Math.round(r.texts[lang].split(" ").length/2.3):120}

function speak(){
  if(!window.speechSynthesis) return false;
  window.speechSynthesis.cancel();
  const text = rooms[cur].texts[lang]||rooms[cur].texts.en;
  utter = new SpeechSynthesisUtterance(text);
  utter.lang = langCodes[lang]||"en-GB";
  utter.rate = 0.88;
  utter.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const code = langCodes[lang]||"en-GB";
  const match = voices.find(v=>v.lang===code)||voices.find(v=>v.lang.startsWith(code.split("-")[0]));
  if(match) utter.voice = match;
  const total = dur(rooms[cur]);
  let elapsed = Math.round((prog/100)*total);
  utter.onstart = ()=>{
    document.getElementById("speakBadge").classList.add("on");
    document.getElementById("speakLbl").textContent = "Speaking in "+langNames[lang]+"...";
    ticker = setInterval(()=>{
      elapsed = Math.min(elapsed+1, total);
      prog = (elapsed/total)*100;
      document.getElementById("progFill").style.width = prog+"%";
      document.getElementById("elapsed").textContent = fmt(elapsed);
      if(elapsed>=total){clearInterval(ticker);stopAll();}
    },1000);
  };
  utter.onend = ()=>stopAll();
  utter.onerror = ()=>stopAll();
  window.speechSynthesis.speak(utter);
  return true;
}

function stopAll(){
  playing=false; clearInterval(ticker);
  if(window.speechSynthesis) window.speechSynthesis.cancel();
  const pb = document.getElementById("playBtn");
  if(pb) pb.innerHTML = "&#9654;";
  const sb = document.getElementById("speakBadge");
  if(sb) sb.classList.remove("on");
}

function togglePlay(){
  if(playing){stopAll();return;}
  playing=true;
  document.getElementById("playBtn").innerHTML = "&#9646;&#9646;";
  if(!speak()){playing=false;document.getElementById("playBtn").innerHTML="&#9654;";}
}

function skip(s){
  const total = dur(rooms[cur]);
  const cs = Math.round((prog/100)*total);
  const ns = Math.max(0,Math.min(total,cs+s));
  prog = (ns/total)*100;
  document.getElementById("progFill").style.width = prog+"%";
  document.getElementById("elapsed").textContent = fmt(ns);
}

function toggleText(){
  textOpen = !textOpen;
  document.getElementById("roomText").classList.toggle("open",textOpen);
  document.getElementById("readMoreBtn").innerHTML = textOpen?"Show less &#9650;":"Read more &#9660;";
}

function goRoom(n){
  if(n<0||n>=rooms.length) return;
  stopAll(); prog=0; textOpen=false; cur=n;
  render();
  document.getElementById("mainBody").scrollTop=0;
}

function setLang(l,el){
  lang=l;
  document.querySelectorAll(".lb").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
  stopAll(); prog=0; render();
}

function render(){
  const r = rooms[cur];
  const name = r.names[lang]||r.names.en;
  const total = dur(r);
  document.getElementById("roomBadge").textContent = "Room "+r.id;
  const heroImg = document.getElementById("heroImg");
  const roomEmoji = document.getElementById("roomEmoji");
  if(r.id===1){
    heroImg.src=CASTLE_IMG; heroImg.style.display="block"; roomEmoji.style.display="none";
  } else {
    heroImg.style.display="none"; roomEmoji.style.display="block"; roomEmoji.textContent=r.icon;
  }
  document.getElementById("roomName").textContent = name;
  document.getElementById("roomSub").textContent = r.subs[lang]||r.subs.en;
  document.getElementById("tipText").textContent = r.tips[lang]||r.tips.en;
  document.getElementById("roomText").textContent = r.texts[lang]||r.texts.en;
  document.getElementById("roomText").classList.toggle("open",textOpen);
  document.getElementById("readMoreBtn").innerHTML = textOpen?"Show less &#9650;":"Read more &#9660;";
  document.getElementById("pName").textContent = name;
  document.getElementById("pLang").textContent = langNames[lang]||lang;
  document.getElementById("totalTime").textContent = fmt(total);
  document.getElementById("elapsed").textContent = fmt(Math.round((prog/100)*total));
  document.getElementById("progFill").style.width = prog+"%";
  document.getElementById("playBtn").innerHTML = playing?"&#9646;&#9646;":"&#9654;";
  document.getElementById("prevBtn").disabled = cur===0;
  document.getElementById("nextBtn").disabled = cur===rooms.length-1;
  document.getElementById("roomGrid").innerHTML = rooms.map((rm,i)=>
    '<button class="rg'+(i===cur?" on":"")+'" onclick="goRoom('+i+')">'
    +'<span class="rg-icon">'+rm.icon+'</span>'
    +'<span class="rg-num">'+rm.id+'</span></button>'
  ).join("");
}

document.getElementById("mainBody").addEventListener("touchstart",e=>{
  touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById("mainBody").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0) goRoom(cur+1); else goRoom(cur-1);
  }
},{passive:true});

if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

const PIN = "1412";
let pinEntry = "";
function pinKey(k){
  if(pinEntry.length>=4) return;
  pinEntry += k;
  document.getElementById("d"+(pinEntry.length-1)).classList.add("filled");
  if(pinEntry.length===4){
    setTimeout(()=>{
      if(pinEntry===PIN){
        document.getElementById("pinScreen").style.display="none";
        sessionStorage.setItem("auth","1");
      } else {
        document.getElementById("pinError").classList.add("on");
        setTimeout(()=>{
          pinEntry="";
          for(let i=0;i<4;i++) document.getElementById("d"+i).classList.remove("filled");
          document.getElementById("pinError").classList.remove("on");
        },1000);
      }
    },200);
  }
}
function pinDel(){
  if(pinEntry.length===0) return;
  document.getElementById("d"+(pinEntry.length-1)).classList.remove("filled");
  pinEntry=pinEntry.slice(0,-1);
}
if(sessionStorage.getItem("auth")==="1"){
  document.getElementById("pinScreen").style.display="none";
}

const langEl = document.getElementById("langs");
langList.forEach(({c,l})=>{
  const b = document.createElement("button");
  b.className = "lb"+(c==="en"?" on":"");
  b.innerHTML = l;
  b.onclick = function(){setLang(c,this);};
  langEl.appendChild(b);
});
render();
</script>
</body>
</html>

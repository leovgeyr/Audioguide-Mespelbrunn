<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mespelbrunn">
<meta name="theme-color" content="#0f1a24">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>Schloss Mespelbrunn — Audio Guide</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1a24;color:#f0f4f8;display:flex;flex-direction:column;height:100vh;height:100dvh}

/* HEADER */
.hdr{background:#132130;padding:env(safe-area-inset-top,12px) 16px 0;border-bottom:1px solid #1e3248;flex-shrink:0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;padding-top:12px;margin-bottom:10px}
.castle-lbl{font-size:11px;font-weight:700;color:#c9a84c;letter-spacing:2px;text-transform:uppercase}
.lang-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.lb{padding:7px 13px;border-radius:20px;border:1.5px solid #2e4a62;background:transparent;color:#7b8fa1;font-size:12px;cursor:pointer;transition:all .15s;min-height:36px}
.lb.on{background:#c9a84c;border-color:#c9a84c;color:#0f1a24;font-weight:700}

/* ROOM SELECTOR — grid instead of scrolling tabs */
.room-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;padding-bottom:12px}
.rg{padding:6px 2px;border-radius:8px;border:1.5px solid #2e4a62;background:transparent;color:#7b8fa1;font-size:11px;cursor:pointer;text-align:center;transition:all .15s;min-height:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.rg.on{background:#0d7377;border-color:#0d7377;color:#fff}
.rg-num{font-weight:700;font-size:13px}
.rg-icon{font-size:14px}

/* BODY */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 20px}

/* TIP */
.tip{background:#1e3248;border-radius:10px;padding:10px 13px;font-size:13px;color:#7b8fa1;display:flex;gap:8px;margin-bottom:14px;border:1px solid #2e4a62;align-items:flex-start}

/* ROOM HERO */
.room-hero{background:#1c2b3a;border-radius:14px;border:1px solid #2e4a62;margin-bottom:14px;overflow:hidden}
.room-img{height:160px;background:#1e3248;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.room-badge{position:absolute;top:10px;left:12px;background:rgba(15,26,36,.9);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#c9a84c}
.room-emoji{font-size:56px}
.room-body{padding:14px}
.room-name{font-size:18px;font-weight:700;color:#f0f4f8;margin-bottom:3px}
.room-sub{font-size:12px;color:#7b8fa1;margin-bottom:10px}
.room-text{font-size:13px;color:#a0b8cc;line-height:1.75;max-height:78px;overflow:hidden;transition:max-height .3s}
.room-text.open{max-height:600px}
.read-more{background:transparent;border:none;color:#0d7377;font-size:12px;cursor:pointer;margin-top:6px;padding:0;min-height:36px;display:block}

/* PLAYER */
.player{background:#132130;border-radius:14px;padding:14px;margin-bottom:14px;border:1px solid #2e4a62}
.player-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.p-icon{width:42px;height:42px;border-radius:50%;background:#0d7377;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.p-meta{flex:1;min-width:0}
.p-name{font-size:13px;font-weight:600;color:#f0f4f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-lang{font-size:11px;color:#7b8fa1;margin-top:2px}
.p-dur{font-size:12px;color:#7b8fa1;flex-shrink:0}

/* PROGRESS */
.prog-wrap{margin-bottom:12px}
.prog-bg{height:5px;background:#2e4a62;border-radius:3px;cursor:pointer;position:relative;margin-bottom:6px}
.prog-fill{height:5px;background:#0d7377;border-radius:3px;width:0%;position:relative}
.prog-dot{width:14px;height:14px;background:#c9a84c;border-radius:50%;position:absolute;right:-7px;top:-4.5px;box-shadow:0 0 0 3px rgba(201,168,76,.2)}
.time-row{display:flex;justify-content:space-between;font-size:11px;color:#7b8fa1}

/* CONTROLS */
.controls{display:flex;align-items:center;justify-content:center;gap:24px;margin-bottom:12px}
.cbtn{background:transparent;border:none;cursor:pointer;color:#7b8fa1;font-size:28px;padding:10px;border-radius:50%;min-width:52px;min-height:52px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.cbtn:active{background:rgba(255,255,255,.08);color:#f0f4f8}
.play-btn{width:64px;height:64px;background:#0d7377;border-radius:50%;border:none;cursor:pointer;color:#fff;font-size:26px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.play-btn:active{background:#14a085;transform:scale(0.96)}

/* SPEAKING */
.speak-badge{display:none;align-items:center;gap:7px;background:rgba(13,115,119,.15);border-radius:8px;padding:6px 12px;font-size:12px;color:#14a085}
.speak-badge.on{display:flex}
.dot1,.dot2,.dot3{width:5px;height:5px;background:#14a085;border-radius:50%;animation:bop 1.2s infinite}
.dot2{animation-delay:.2s}.dot3{animation-delay:.4s}
@keyframes bop{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.2)}}

/* NAV */
.nav-row{display:flex;gap:10px}
.nbtn{flex:1;padding:14px;border-radius:12px;border:1.5px solid #2e4a62;background:transparent;color:#a0b8cc;font-size:14px;font-weight:600;cursor:pointer;min-height:50px;transition:all .15s}
.nbtn:active{background:#1c2b3a}
.nbtn.nxt{background:#0d7377;border-color:#0d7377;color:#fff}
.nbtn.nxt:active{background:#14a085}
.nbtn:disabled{opacity:.3;cursor:default}

/* SWIPE HINT */
.swipe-hint{text-align:center;font-size:11px;color:#2e4a62;margin-top:10px}

/* WARN */
.warn{background:#2a1810;border-radius:10px;padding:10px 14px;font-size:12px;color:#e8a87c;margin-bottom:12px;border:1px solid #5a2a10;display:none}
.warn.on{display:block}

/* INSTALL BANNER */
.install-bar{background:#0d7377;padding:10px 16px;display:none;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.install-bar.on{display:flex}
.install-txt{font-size:12px;color:#fff;flex:1}
.install-btn{background:#fff;color:#0d7377;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.install-x{background:transparent;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;padding:4px}

#pinScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0f1a24;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px}
.pin-castle{font-size:64px;margin-bottom:16px}
.pin-title{font-size:13px;font-weight:700;color:#c9a84c;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px}
.pin-sub{font-size:13px;color:#7b8fa1;margin-bottom:40px;text-align:center}
.pin-dots{display:flex;gap:14px;margin-bottom:32px}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid #2e4a62;background:transparent;transition:all .2s}
.pin-dot.filled{background:#c9a84c;border-color:#c9a84c}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:260px}
.pin-btn{height:72px;border-radius:14px;border:1.5px solid #2e4a62;background:#132130;color:#f0f4f8;font-size:24px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.pin-btn:active{background:#0d7377;border-color:#0d7377;transform:scale(0.95)}
.pin-btn.del{font-size:18px;color:#7b8fa1}
.pin-btn.empty{border:none;background:transparent;cursor:default}
.pin-error{color:#c0392b;font-size:13px;margin-top:16px;opacity:0;transition:opacity .3s}
.pin-error.on{opacity:1}
</style>
</head>
<body>

<div id="pinScreen">
  <div class="pin-castle">🏰</div>
  <div class="pin-title">Schloss Mespelbrunn</div>
  <div class="pin-sub">Audio Guide — Enter access code</div>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="pinKey('1')">1</button>
    <button class="pin-btn" onclick="pinKey('2')">2</button>
    <button class="pin-btn" onclick="pinKey('3')">3</button>
    <button class="pin-btn" onclick="pinKey('4')">4</button>
    <button class="pin-btn" onclick="pinKey('5')">5</button>
    <button class="pin-btn" onclick="pinKey('6')">6</button>
    <button class="pin-btn" onclick="pinKey('7')">7</button>
    <button class="pin-btn" onclick="pinKey('8')">8</button>
    <button class="pin-btn" onclick="pinKey('9')">9</button>
    <button class="pin-btn empty"></button>
    <button class="pin-btn" onclick="pinKey('0')">0</button>
    <button class="pin-btn del" onclick="pinDel()">⌫</button>
  </div>
  <div class="pin-error" id="pinError">Incorrect code — try again</div>
</div>

<div class="install-bar" id="installBar">
  <span class="install-txt">📲 Add to Home Screen for the best experience</span>
  <button class="install-btn" id="installBtn">Install</button>
  <button class="install-x" onclick="document.getElementById('installBar').classList.remove('on')">✕</button>
</div>

<div class="hdr">
  <div class="hdr-top">
    <span class="castle-lbl">🏰 Schloss Mespelbrunn</span>
  </div>
  <div class="lang-row" id="langs"></div>
  <div class="room-grid" id="roomGrid"></div>
</div>

<div class="body" id="mainBody">
  <div class="warn" id="warn">⚠️ Speech not supported on this browser. Please use Chrome or Safari 15+.</div>
  <div class="tip">
    <span style="font-size:18px;flex-shrink:0">💡</span>
    <span id="tipText"></span>
  </div>
  <div class="room-hero">
    <div class="room-img"><img id="heroImg" src="" alt="Schloss Mespelbrunn" style="display:none;width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0">
      <div class="room-badge" id="roomBadge">Room 1</div>
      <div class="room-emoji" id="roomEmoji"></div>
    </div>
    <div class="room-body">
      <div class="room-name" id="roomName"></div>
      <div class="room-sub" id="roomSub"></div>
      <div class="room-text" id="roomText"></div>
      <button class="read-more" id="readMoreBtn" onclick="toggleText()">Read more ▼</button>
    </div>
  </div>
  <div class="player">
    <div class="player-top">
      <div class="p-icon">🎧</div>
      <div class="p-meta">
        <div class="p-name" id="pName"></div>
        <div class="p-lang" id="pLang"></div>
      </div>
      <div class="p-dur" id="pDur"></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bg" id="progBg">
        <div class="prog-fill" id="progFill"><div class="prog-dot"></div></div>
      </div>
      <div class="time-row"><span id="elapsed">0:00</span><span id="totalTime">0:00</span></div>
    </div>
    <div class="controls">
      <button class="cbtn" onclick="skip(-15)">⏮</button>
      <button class="play-btn" id="playBtn" onclick="togglePlay()">▶</button>
      <button class="cbtn" onclick="skip(15)">⏭</button>
    </div>
    <div class="speak-badge" id="speakBadge">
      <div class="dot1"></div><div class="dot2"></div><div class="dot3"></div>
      <span id="speakLbl">Speaking...</span>
    </div>
  </div>
  <div class="nav-row">
    <button class="nbtn" id="prevBtn" onclick="goRoom(cur-1)">← Previous</button>
    <button class="nbtn nxt" id="nextBtn" onclick="goRoom(cur+1)">Next room →</button>
  </div>
  <div class="swipe-hint">Swipe left / right to change rooms</div>
</div>

   texts:{en:"Welcome to Schloss Mespelbrunn. This castle has stood in continuous family ownership since 1412 — over 600 years without interruption. As you step inside, notice the Renaissance architecture virtually unchanged since the 16th century. The thick stone walls, the narrow windows, the low ceilings — all designed for both defence and everyday life. The family still resides in the south wing today.",fr:"Bienvenue au château de Mespelbrunn. Ce château appartient à la même famille sans interruption depuis 1412, plus de 600 ans. En entrant, remarquez l'architecture Renaissance pratiquement inchangée depuis le XVIe siècle. Les épais murs de pierre, les fenêtres étroites — tout conçu pour la défense et la vie quotidienne. La famille réside encore dans l'aile sud.",es:"Bienvenidos al Castillo de Mespelbrunn. Este castillo ha permanecido en propiedad familiar desde 1412, más de 600 años. Al entrar, observe la arquitectura renacentista prácticamente sin cambios desde el siglo XVI. Los gruesos muros de piedra, las ventanas estrechas — todo diseñado para la defensa y la vida cotidiana. La familia aún reside en el ala sur.",it:"Benvenuti al Castello di Mespelbrunn. Di proprietà della stessa famiglia dal 1412, oltre 600 anni. Notate l'architettura rinascimentale praticamente invariata dal XVI secolo. Le spesse mura in pietra, le finestre strette — tutto progettato per la difesa e la vita quotidiana. La famiglia risiede ancora nell'ala sud.",ja:"メスペルブルン城へようこそ。この城は1412年から600年以上、同じ家族が所有してきました。中に入ると、16世紀からほとんど変わっていないルネサンス建築をご覧いただけます。厚い石の壁、細い窓、低い天井——すべて防衛と日常生活のために設計されました。家族は現在も南翼に居住しています。",zh:"欢迎来到梅斯佩尔布伦城堡。自1412年以来一直属于同一家族，已有600多年历史。踏入城堡，您将看到几乎未变的文艺复兴时期建筑。厚实的石墙、狭窄的窗户——这一切都是为防御和日常生活而设计的。家族至今仍居住在南翼。"},dur:"3:24"},
  {id:2,icon:"🛡",names:{en:"Knights' Hall",fr:"Salle des Chevaliers",es:"Sala de Caballeros",it:"Sala dei Cavalieri",ja:"騎士の間",zh:"骑士大厅"},
   subs:{en:"Armour, weapons & noble power",fr:"Armures, armes et pouvoir noble",es:"Armaduras, armas y poder noble",it:"Armature, armi e potere nobiliare",ja:"鎧、武器、貴族の権力",zh:"盔甲、武器与贵族权威"},
   tips:{en:"The sword in the centre weighs 4.2 kg.",fr:"L'épée au centre pèse 4,2 kg.",es:"La espada del centro pesa 4,2 kg.",it:"La spada al centro pesa 4,2 kg.",ja:"中央の剣は4.2kgあります。",zh:"中央的剑重4.2公斤。"},
   texts:{en:"The Knights' Hall was the ceremonial heart of the castle. The suits of armour lining the walls are original pieces from the 16th and 17th centuries. The largest suit belonged to a commander who served in the Thirty Years' War. Notice the intricate engravings — each mark tells the story of the craftsman who made it.",fr:"La Salle des Chevaliers était le cœur cérémoniel du château. Les armures sont des pièces originales des XVIe et XVIIe siècles. La plus grande appartenait à un commandant de la Guerre de Trente Ans. Remarquez les gravures complexes.",es:"La Sala de Caballeros era el corazón ceremonial del castillo. Las armaduras son piezas originales de los siglos XVI y XVII. La más grande perteneció a un comandante de la Guerra de los Treinta Años.",it:"La Sala dei Cavalieri era il cuore cerimoniale. Le armature sono pezzi originali del XVI e XVII secolo. La più grande apparteneva a un comandante della Guerra dei Trent'anni.",ja:"騎士の間は城の儀式の中心でした。壁に並ぶ鎧は16〜17世紀のオリジナルです。最も大きな鎧は三十年戦争の指揮官のものです。",zh:"骑士大厅是城堡的礼仪核心。墙上陈列的盔甲均为16至17世纪的原件。最大的一套属于三十年战争的指挥官。"},dur:"4:10"},
  {id:3,icon:"🍽",names:{en:"Banquet Room",fr:"Salle de Banquet",es:"Sala de Banquetes",it:"Sala Banchetti",ja:"宴会の間",zh:"宴会厅"},
   subs:{en:"Feasts, politics & family life",fr:"Festins, politique et vie de famille",es:"Festines, política y vida familiar",it:"Banchetti, politica e vita familiare",ja:"宴会、政治、家族の生活",zh:"宴会、政治与家庭生活"},
   tips:{en:"The tapestry behind you was woven in Brussels in 1598.",fr:"La tapisserie fut tissée à Bruxelles en 1598.",es:"El tapiz fue tejido en Bruselas en 1598.",it:"L'arazzo fu tessuto a Bruxelles nel 1598.",ja:"背後のタペストリーは1598年にブリュッセルで織られました。",zh:"您身后的挂毯编织于1598年的布鲁塞尔。"},
   texts:{en:"The Banquet Room is where the family hosted visiting nobles and dignitaries. The long oak table seats 24 guests and dates from 1623. Look at the ceiling fresco — painted by a Flemish artist brought specifically to Mespelbrunn. The candlesticks are solid silver, polished to this day by the family.",fr:"La Salle de Banquet accueillait nobles et dignitaires. La longue table en chêne date de 1623. La fresque du plafond fut peinte par un artiste flamand. Les chandeliers sont en argent massif.",es:"La Sala de Banquetes recibía nobles y dignatarios. La larga mesa de roble data de 1623. El fresco fue pintado por un artista flamenco. Los candelabros son de plata maciza.",it:"La Sala Banchetti ospitava nobili e dignitari. Il tavolo in quercia risale al 1623. Il fresco fu dipinto da un artista fiammingo. I candelieri sono in argento massiccio.",ja:"宴会の間では家族が貴族や高官をもてなしました。オーク材のテーブルは1623年のものです。天井のフレスコ画はフランドルの芸術家が描きました。",zh:"宴会厅是家族招待贵族和显贵的场所。长橡木桌建于1623年。天花板壁画由佛兰德艺术家绘制。"},dur:"3:52"},
  {id:4,icon:"📚",names:{en:"Library",fr:"Bibliothèque",es:"Biblioteca",it:"Biblioteca",ja:"図書室",zh:"图书室"},
   subs:{en:"Knowledge, power & Renaissance thought",fr:"Savoir, pouvoir et pensée Renaissance",es:"Conocimiento, poder y pensamiento renacentista",it:"Conoscenza, potere e pensiero rinascimentale",ja:"知識、権力、ルネサンスの思想",zh:"知识、权力与文艺复兴思想"},
   tips:{en:"The oldest book here dates from 1423 — hand-written on vellum.",fr:"Le plus ancien livre date de 1423.",es:"El libro más antiguo data de 1423.",it:"Il libro più antico risale al 1423.",ja:"最古の本は1423年のものです。",zh:"这里最古老的书可追溯至1423年。"},
   texts:{en:"The library holds over 3,000 original volumes, some predating the printing press. The family collected maps, theological texts and early scientific works. The globe in the corner was made in Nuremberg in 1571 — it still shows the New World as largely unknown territory.",fr:"La bibliothèque contient plus de 3 000 volumes originaux, certains antérieurs à l'imprimerie. Le globe fut fabriqué à Nuremberg en 1571.",es:"La biblioteca alberga más de 3.000 volúmenes originales. El globo del rincón fue fabricado en Núremberg en 1571.",it:"La biblioteca conserva oltre 3.000 volumi originali. Il globo fu realizzato a Norimberga nel 1571.",ja:"図書室には3,000冊以上の本があります。隅の地球儀は1571年にニュルンベルクで作られました。",zh:"图书室收藏了3000多册原版书籍。角落里的地球仪制作于1571年的纽伦堡。"},dur:"3:38"},
  {id:5,icon:"🛏",names:{en:"Master Bedroom",fr:"Chambre Principale",es:"Dormitorio Principal",it:"Camera da Letto",ja:"主寝室",zh:"主卧室"},
   subs:{en:"Private life behind castle walls",fr:"La vie privée derrière les murs",es:"La vida privada en el castillo",it:"La vita privata oltre le mura",ja:"城壁の内側の私生活",zh:"城墙内的私人生活"},
   tips:{en:"The room is always 14°C — no heating to preserve the original walls.",fr:"La pièce est toujours à 14°C pour préserver les murs.",es:"La habitación se mantiene a 14°C para preservar las paredes.",it:"La stanza è sempre a 14°C per preservare le pareti.",ja:"この部屋は常に14℃です。",zh:"房间常年保持14°C。"},
   texts:{en:"This is the most intimate room in the castle. The canopy bed dates from 1680. Notice how small it is: people in this era slept semi-upright, believing lying flat was dangerous. The painted portraits on the wall are the 12th and 13th generations of the family.",fr:"La chambre la plus intime du château. Le lit à baldaquin date de 1680. Les gens dormaient semi-debout. Les portraits représentent la 12e et 13e génération.",es:"La habitación más íntima. La cama con dosel data de 1680. La gente dormía semiincorporada. Los retratos son la 12ª y 13ª generación.",it:"La stanza più intima. Il letto a baldacchino risale al 1680. Le persone dormivano semisedute. I ritratti sono la 12a e 13a generazione.",ja:"城で最も親密な部屋。天蓋付きベッドは1680年のものです。人々は半身を起こして眠っていました。",zh:"城堡中最私密的房间。天篷床可追溯至1680年。人们半直立睡觉。"},dur:"3:15"},
  {id:6,icon:"⛪",names:{en:"Castle Chapel",fr:"Chapelle du Château",es:"Capilla del Castillo",it:"Cappella del Castello",ja:"城礼拝堂",zh:"城堡礼拜堂"},
   subs:{en:"Faith, death & the Echter legacy",fr:"Foi, mort et l'héritage Echter",es:"Fe, muerte y el legado Echter",it:"Fede, morte e l'eredità Echter",ja:"信仰、死、エクター家の遺産",zh:"信仰、死亡与埃克特家族遗产"},
   tips:{en:"Julius Echter founded the University of Würzburg in 1582.",fr:"Julius Echter a fondé l'Université de Würzburg en 1582.",es:"Julius Echter fundó la Universidad de Wurzburgo en 1582.",it:"Julius Echter fondò l'Università di Würzburg nel 1582.",ja:"ユリウス・エクターは1582年にヴュルツブルク大学を創設しました。",zh:"尤利乌斯·埃克特于1582年创立了维尔茨堡大学。"},
   texts:{en:"The chapel is the oldest part of the castle, predating the Renaissance renovation by nearly a century. Buried beneath the stone floor are members of the Echter family going back to the 15th century. The stained glass windows were donated by Julius Echter von Mespelbrunn, Prince-Bishop of Würzburg.",fr:"La chapelle est la partie la plus ancienne. Des membres de la famille Echter sont enterrés sous le sol depuis le XVe siècle. Les vitraux ont été offerts par Julius Echter, prince-évêque de Wurtzbourg.",es:"La capilla es la parte más antigua. Miembros de la familia Echter están enterrados desde el siglo XV. Las vidrieras fueron donadas por Julius Echter von Mespelbrunn.",it:"La cappella è la parte più antica. Sotto il pavimento sono sepolti membri degli Echter dal XV secolo. Le vetrate furono donate da Julius Echter von Mespelbrunn.",ja:"礼拝堂は城で最も古い部分。石の床の下には15世紀のエクター家の人々が眠っています。ステンドグラスはユリウス・エクターが寄贈しました。",zh:"礼拜堂是城堡中最古老的部分。石地板下埋葬着15世纪以来的埃克特家族成员。彩色玻璃窗由尤利乌斯·埃克特捐赠。"},dur:"4:28"},
  {id:7,icon:"🌊",names:{en:"Inner Courtyard",fr:"Cour Intérieure",es:"Patio Interior",it:"Cortile Interno",ja:"中庭",zh:"内院"},
   subs:{en:"The moat, the mill & Spessart silence",fr:"Les douves, le moulin et le silence",es:"El foso, el molino y el silencio",it:"Il fossato, il mulino e il silenzio",ja:"堀、水車、シュペッサートの静寂",zh:"护城河、磨坊与斯佩萨特的寂静"},
   tips:{en:"No signal here — that's the product. You are in 1550.",fr:"Pas de signal ici — c'est le produit. Vous êtes en 1550.",es:"Sin señal — ese es el producto. Está en 1550.",it:"Nessun segnale — questo è il prodotto. Siete nel 1550.",ja:"電波なし——それが商品です。あなたは1550年にいます。",zh:"没有信号——这就是产品。您身处1550年。"},
   texts:{en:"You are now standing in the inner courtyard — surrounded on all sides by the original moat, still filled with water from the Elsava stream. Mespelbrunn is one of the few true water castles in Germany. The mill to your left has operated continuously since the 14th century. There is no mobile phone signal here. This valley has looked like this for 600 years.",fr:"Vous êtes dans la cour intérieure entourée des douves d'origine. Mespelbrunn est l'un des rares châteaux d'eau d'Allemagne. Le moulin fonctionne depuis le XIVe siècle. Il n'y a pas de signal ici.",es:"Está en el patio interior rodeado por el foso original. Mespelbrunn es uno de los pocos castillos acuáticos de Alemania. El molino funciona desde el siglo XIV. No hay señal aquí.",it:"Siete nel cortile interno circondato dal fossato originale. Mespelbrunn è uno dei pochi castelli d'acqua in Germania. Il mulino funziona dal XIV secolo.",ja:"今、あなたは中庭に立っています。オリジナルの堀に四方を囲まれています。メスペルブルンはドイツで数少ない本物の水城の一つです。携帯の電波はここには入りません。",zh:"您现在站在内院——四面被原始护城河包围。梅斯佩尔布伦是德国为数不多的真正水城之一。左边的磨坊自14世纪以来持续运转。这里没有手机信号。"},dur:"2:58"}
];

const langList=[{c:"en",l:"🇬🇧 EN"},{c:"fr",l:"🇫🇷 FR"},{c:"es",l:"🇪🇸 ES"},{c:"it",l:"🇮🇹 IT"},{c:"ja",l:"🇯🇵 JA"},{c:"zh",l:"🇨🇳 ZH"}];
const langNames={en:"English",fr:"Français",es:"Español",it:"Italiano",ja:"日本語",zh:"中文"};
const langCodes={en:"en-GB",fr:"fr-FR",es:"es-ES",it:"it-IT",ja:"ja-JP",zh:"zh-CN"};

let cur=0,lang="en",playing=false,prog=0,ticker=null,utter=null,textOpen=false;
let touchStartX=0,touchStartY=0;

function parseDur(d){const[m,s]=d.split(":").map(Number);return m*60+s}
function fmt(s){const m=Math.floor(s/60),sec=Math.floor(s%60);return m+":"+(sec<10?"0":"")+sec}

function speak(){
  if(!window.speechSynthesis){document.getElementById("warn").classList.add("on");return false}
  window.speechSynthesis.cancel();
  const text=rooms[cur].texts[lang]||rooms[cur].texts.en;
  utter=new SpeechSynthesisUtterance(text);
  utter.lang=langCodes[lang]||"en-GB";
  utter.rate=0.9;
  utter.pitch=1.0;
  const voices=window.speechSynthesis.getVoices();
  const code=langCodes[lang]||"en-GB";
  const match=voices.find(v=>v.lang===code)||voices.find(v=>v.lang.startsWith(code.split("-")[0]));
  if(match)utter.voice=match;
  const total=parseDur(rooms[cur].dur);
  let elapsed=Math.round((prog/100)*total);
  utter.onstart=()=>{
    document.getElementById("speakBadge").classList.add("on");
    document.getElementById("speakLbl").textContent="Speaking in "+langNames[lang]+"...";
    ticker=setInterval(()=>{
      elapsed=Math.min(elapsed+1,total);
      prog=(elapsed/total)*100;
      document.getElementById("progFill").style.width=prog+"%";
      document.getElementById("elapsed").textContent=fmt(elapsed);
      if(elapsed>=total){clearInterval(ticker);stopAll()}
    },1000);
  };
  utter.onend=()=>stopAll();
  utter.onerror=()=>stopAll();
  window.speechSynthesis.speak(utter);
  return true;
}

function stopAll(){
  playing=false;clearInterval(ticker);
  if(window.speechSynthesis)window.speechSynthesis.cancel();
  const pb=document.getElementById("playBtn");
  if(pb)pb.textContent="▶";
  const sb=document.getElementById("speakBadge");
  if(sb)sb.classList.remove("on");
}

function togglePlay(){
  if(playing){stopAll();return}
  playing=true;
  document.getElementById("playBtn").textContent="⏸";
  if(!speak()){playing=false;document.getElementById("playBtn").textContent="▶"}
}

function skip(s){
  const total=parseDur(rooms[cur].dur);
  const cs=Math.round((prog/100)*total);
  const ns=Math.max(0,Math.min(total,cs+s));
  prog=(ns/total)*100;
  document.getElementById("progFill").style.width=prog+"%";
  document.getElementById("elapsed").textContent=fmt(ns);
}

function toggleText(){
  textOpen=!textOpen;
  document.getElementById("roomText").classList.toggle("open",textOpen);
  document.getElementById("readMoreBtn").textContent=textOpen?"Show less ▲":"Read more ▼";
}

function goRoom(n){
  if(n<0||n>=rooms.length)return;
  stopAll();prog=0;textOpen=false;cur=n;
  render();
  document.getElementById("mainBody").scrollTop=0;
}

function setLang(l,el){
  lang=l;
  document.querySelectorAll(".lb").forEach(b=>b.classList.remove("on"));
  el.classList.add("on");
  stopAll();prog=0;render();
}

function render(){
  const r=rooms[cur];
  const name=r.names[lang]||r.names.en;
  const total=parseDur(r.dur);
  document.getElementById("roomBadge").textContent="Room "+r.id;
  document.getElementById("roomEmoji").textContent=r.icon;
  const heroImg=document.getElementById("heroImg");
  if(r.id===1){heroImg.style.display="block";heroImg.src=CASTLE_IMG;document.getElementById("roomEmoji").style.display="none";}
  else{heroImg.style.display="none";document.getElementById("roomEmoji").style.display="block";}
  document.getElementById("roomName").textContent=name;
  document.getElementById("roomSub").textContent=r.subs[lang]||r.subs.en;
  document.getElementById("tipText").textContent=r.tips[lang]||r.tips.en;
  document.getElementById("roomText").textContent=r.texts[lang]||r.texts.en;
  document.getElementById("roomText").classList.toggle("open",textOpen);
  document.getElementById("readMoreBtn").textContent=textOpen?"Show less ▲":"Read more ▼";
  document.getElementById("pName").textContent=name;
  document.getElementById("pLang").textContent=langNames[lang]||lang;
  document.getElementById("pDur").textContent=r.dur;
  document.getElementById("totalTime").textContent=fmt(total);
  document.getElementById("elapsed").textContent=fmt(Math.round((prog/100)*total));
  document.getElementById("progFill").style.width=prog+"%";
  document.getElementById("playBtn").textContent=playing?"⏸":"▶";
  document.getElementById("prevBtn").disabled=cur===0;
  document.getElementById("nextBtn").disabled=cur===rooms.length-1;
  document.getElementById("roomGrid").innerHTML=rooms.map((rm,i)=>
    `<button class="rg${i===cur?" on":""}" onclick="goRoom(${i})"><span class="rg-icon">${rm.icon}</span><span class="rg-num">${rm.id}</span></button>`
  ).join("");
}

/* SWIPE */
document.getElementById("mainBody").addEventListener("touchstart",e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById("mainBody").addEventListener("touchend",e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0)goRoom(cur+1);
    else goRoom(cur-1);
  }
},{passive:true});

/* PWA INSTALL */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById("installBar").classList.add("on");
});
document.getElementById("installBtn").addEventListener("click",async()=>{
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const{outcome}=await deferredPrompt.userChoice;
  if(outcome==="accepted")document.getElementById("installBar").classList.remove("on");
  deferredPrompt=null;
});

/* SERVICE WORKER */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}

/* VOICES PRELOAD */
if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}

/* INIT */
const langEl=document.getElementById("langs");
langList.forEach(({c,l})=>{
  const b=document.createElement("button");
  b.className="lb"+(c==="en"?" on":"");
  b.textContent=l;
  b.onclick=function(){setLang(c,this)};
  langEl.appendChild(b);
});
render();

const PIN='1412';
let pinEntry='';
function pinKey(k){
  if(pinEntry.length>=4)return;
  pinEntry+=k;
  document.getElementById('d'+(pinEntry.length-1)).classList.add('filled');
  if(pinEntry.length===4){
    setTimeout(()=>{
      if(pinEntry===PIN){
        document.getElementById('pinScreen').style.display='none';
        sessionStorage.setItem('auth','1');
      } else {
        document.getElementById('pinError').classList.add('on');
        setTimeout(()=>{
          pinEntry='';
          for(let i=0;i<4;i++)document.getElementById('d'+i).classList.remove('filled');
          document.getElementById('pinError').classList.remove('on');
        },1000);
      }
    },200);
  }
}
function pinDel(){
  if(pinEntry.length===0)return;
  document.getElementById('d'+(pinEntry.length-1)).classList.remove('filled');
  pinEntry=pinEntry.slice(0,-1);
}
if(sessionStorage.getItem('auth')==='1'){
  document.getElementById('pinScreen').style.display='none';
}

</script>
